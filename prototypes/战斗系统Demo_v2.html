<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>《苍穹劫》战斗系统 v2.0 - 卡牌立绘版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            color: #c0c0c0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .demo-title {
            text-align: center;
            margin-bottom: 20px;
        }
        .demo-title h1 { color: #d4af37; font-size: 24px; margin-bottom: 5px; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .demo-title p { color: #666; font-size: 12px; }
        .start-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #6b3a1f, #4a2a15);
            border: 2px solid #d4af37;
            border-radius: 10px;
            color: #d4af37;
            font-size: 18px;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(212,175,55,0.3);
            transition: all 0.3s;
        }
        .start-btn:hover { 
            background: linear-gradient(135deg, #8b4a2f, #6a3a25);
            box-shadow: 0 0 30px rgba(212,175,55,0.5);
        }
        .start-btn:active { transform: scale(0.95); }
        
        /* 音量控制 */
        .audio-controls {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 4000;
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(30, 20, 40, 0.9);
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid rgba(100,80,120,0.4);
        }
        .audio-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(212,175,55,0.5);
            background: linear-gradient(180deg, rgba(60,50,70,0.8), rgba(40,30,50,0.9));
            color: #d4af37;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .audio-btn:hover {
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212,175,55,0.5);
        }
        .audio-btn.muted {
            opacity: 0.5;
            border-color: #666;
        }
        .volume-slider {
            width: 80px;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(60,50,70,0.8);
            border-radius: 3px;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #d4af37;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(212,175,55,0.5);
        }
        
        /* Canvas特效层 */
        #particleCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2050;
        }
    </style>
</head>
<body>
    <!-- 音量控制 -->
    <div class="audio-controls">
        <button class="audio-btn" id="musicToggle" title="背景音乐">🎵</button>
        <button class="audio-btn" id="sfxToggle" title="音效">🔊</button>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70" title="音量">
    </div>

    <div class="demo-title">
        <h1>⚔️ 《苍穹劫》战斗系统 v2.0</h1>
        <p>卡牌立绘风格 · 暗黑哥特美术 · 模块化版本</p>
    </div>
    <button class="start-btn" onclick="startDemo()">🎮 开始战斗</button>
    <p style="color:#888;font-size:12px;">点击体验全新卡牌立绘战斗系统</p>

    <!-- 战斗系统容器 -->
    <div class="battle-modal" id="battleModal">
        <div class="battle-bg"></div>
        <!-- Canvas特效层 -->
        <canvas id="particleCanvas"></canvas>
        
        <div class="battle-header">
            <div class="battle-title" id="battleTitle">⚔️ 遭遇战斗</div>
            <div class="battle-turn" id="battleTurn">回合 0</div>
        </div>
        
        <div class="battle-field">
            <div class="enemy-area" id="enemyArea"></div>
            <div class="action-bar-area" id="actionBarArea"></div>
            <div class="hero-area" id="heroArea"></div>
            <div class="battle-log" id="battleLog"></div>
            <div class="battle-actions" id="battleActions">
                <button class="battle-btn attack" onclick="doAutoBattle()">⚔️ 普通战斗</button>
                <button class="battle-btn skill" onclick="doBossBattle()">💀 Boss战</button>
                <button class="battle-btn retreat" onclick="closeBattle()">退出</button>
            </div>
        </div>
    </div>

    <!-- 战斗系统模块 -->
    <script src="battle-system.js"></script>
    
    <script>
        // 引用战斗系统模块
        const Battle = window.BattleSystem;
        
        // Demo启动函数
        function startDemo() { Battle.startBattle(false); }
        function doAutoBattle() { Battle.closeBattle(); setTimeout(() => Battle.startBattle(false), 300); }
        function doBossBattle() { Battle.closeBattle(); setTimeout(() => Battle.startBattle(true), 300); }
        function closeBattle() { Battle.closeBattle(); }
        
        // 音量控制事件
        document.getElementById('musicToggle').addEventListener('click', function() {
            const audio = Battle.getAudioSystem();
            audio.init();
            const isOn = audio.toggleMusic();
            this.textContent = isOn ? '🎵' : '🔇';
            this.classList.toggle('muted', !isOn);
        });
        
        document.getElementById('sfxToggle').addEventListener('click', function() {
            const audio = Battle.getAudioSystem();
            audio.init();
            const isOn = audio.toggleSfx();
            this.textContent = isOn ? '🔊' : '🔈';
            this.classList.toggle('muted', !isOn);
        });
        
        document.getElementById('volumeSlider').addEventListener('input', function() {
            const audio = Battle.getAudioSystem();
            audio.init();
            audio.setVolume(this.value / 100);
        });
    </script>
</body>
</html>
