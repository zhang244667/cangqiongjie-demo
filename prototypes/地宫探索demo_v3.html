<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《苍穹劫》地宫探索Demo v3 - 盗墓长生印风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            color: #c0c0c0;
            overflow-x: hidden;
        }
        
        .game-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
        }
        
        /* 顶部标题 */
        .header {
            text-align: center;
            margin-bottom: 15px;
            padding: 15px;
            background: rgba(20, 15, 30, 0.9);
            border: 1px solid #3a2a5a;
            border-radius: 8px;
        }
        
        .header h1 {
            font-size: 22px;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            margin-bottom: 5px;
        }
        
        .header .subtitle {
            font-size: 12px;
            color: #666;
        }
        
        /* 状态栏 */
        .status-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: rgba(30, 20, 40, 0.9);
            border: 1px solid #3a2a5a;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
        }
        
        .stat-item {
            text-align: center;
            padding: 8px 5px;
            background: rgba(50, 40, 70, 0.5);
            border-radius: 5px;
        }
        
        .stat-label {
            font-size: 10px;
            color: #888;
            margin-bottom: 3px;
        }
        
        .stat-value {
            font-size: 14px;
            font-weight: bold;
        }
        
        .hp-value { color: #ff6b6b; }
        .torch-value { color: #ffa500; }
        .floor-value { color: #6bcfff; }
        .food-value { color: #6bff6b; }
        .gold-value { color: #ffd700; }
        
        /* 主布局 */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 220px;
            gap: 15px;
        }
        
        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }
        
        /* 地图区域 */
        .map-section {
            background: rgba(20, 15, 30, 0.9);
            border: 1px solid #3a2a5a;
            border-radius: 8px;
            padding: 15px;
        }
        
        .map-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .map-title .torch-icon {
            color: #ffa500;
        }
        
        #gameMap {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 2px;
            background: #0a0a15;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        .cell {
            aspect-ratio: 1;
            background: #1a1a25;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.2s;
            position: relative;
        }
        
        /* 迷雾效果 */
        .cell.fog {
            background: #0a0a10 !important;
            color: transparent !important;
        }
        
        .cell.fog::after {
            content: '?';
            color: #333;
            font-size: 10px;
        }
        
        /* 单格视野（无火把） */
        .cell.dim {
            background: #151520;
            opacity: 0.7;
        }
        
        /* 视野内的格子 */
        .cell.visible {
            background: #1f1f2f;
        }
        
        /* 格子类型 */
        .cell.wall { background: #2a2a3a; }
        .cell.floor { background: #1a1a25; cursor: pointer; }
        .cell.floor:hover { background: #252535; }
        .cell.player { 
            background: #4a6fa5; 
            color: #fff;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(74, 111, 165, 0.5);
        }
        .cell.enemy { 
            background: #8b3a3a; 
            color: #ff6b6b;
        }
        .cell.boss {
            background: #5a2a5a;
            color: #ff00ff;
            font-weight: bold;
        }
        .cell.chest { 
            background: #3a3a2a; 
            color: #ffd700;
        }
        .cell.trap { 
            background: #3a2a2a;
        }
        .cell.door { 
            background: #2a3a4a; 
            color: #6bcfff;
        }
        .cell.stairs { 
            background: #2a4a3a; 
            color: #6bff6b;
        }
        .cell.mechanism {
            background: #4a3a2a;
            color: #ffa500;
        }
        .cell.mechanism.active {
            background: #6a5a3a;
            box-shadow: 0 0 8px rgba(255, 165, 0, 0.5);
        }
        
        /* 操作提示 */
        .action-hint {
            text-align: center;
            font-size: 12px;
            color: #666;
            padding: 8px;
            background: rgba(30, 20, 40, 0.5);
            border-radius: 5px;
        }
        
        /* 右侧面板 */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .panel-section {
            background: rgba(20, 15, 30, 0.9);
            border: 1px solid #3a2a5a;
            border-radius: 8px;
            padding: 12px;
        }
        
        .panel-title {
            font-size: 13px;
            color: #d4af37;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #3a2a5a;
        }
        
        /* 队伍信息 */
        .party-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .party-member {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: rgba(40, 30, 60, 0.5);
            border-radius: 5px;
            font-size: 11px;
        }
        
        .member-avatar {
            width: 32px;
            height: 32px;
            background: #3a3a5a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .member-info {
            flex: 1;
        }
        
        .member-name {
            font-weight: bold;
            color: #ddd;
            margin-bottom: 2px;
        }
        
        .member-hp {
            font-size: 10px;
            color: #888;
        }
        
        .hp-bar {
            width: 100%;
            height: 4px;
            background: #2a2040;
            border-radius: 2px;
            margin-top: 3px;
            overflow: hidden;
        }
        
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ff8888);
            transition: width 0.3s;
        }
        
        /* 物品栏 */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }
        
        .item-slot {
            aspect-ratio: 1;
            background: rgba(40, 30, 60, 0.5);
            border: 1px solid #3a2a5a;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .item-slot:hover {
            background: rgba(60, 50, 80, 0.5);
            border-color: #5a4a7a;
        }
        
        .item-slot .icon {
            font-size: 16px;
            margin-bottom: 2px;
        }
        
        .item-slot .count {
            color: #888;
        }
        
        /* 日志 */
        .log-section {
            max-height: 150px;
            overflow-y: auto;
        }
        
        .log-entry {
            font-size: 11px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(60, 50, 80, 0.3);
            color: #888;
        }
        
        .log-entry.warning { color: #ffa500; }
        .log-entry.danger { color: #ff6b6b; }
        .log-entry.success { color: #6bff6b; }
        .log-entry.info { color: #6bcfff; }
        
        /* 战斗界面 */
        .battle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .battle-overlay.active {
            display: flex;
        }
        
        .battle-container {
            width: 90%;
            max-width: 600px;
            background: linear-gradient(135deg, #1a0a2e 0%, #2a1a3e 100%);
            border: 2px solid #4a3a6a;
            border-radius: 15px;
            padding: 20px;
        }
        
        .battle-title {
            text-align: center;
            font-size: 18px;
            color: #ff6b6b;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.3);
        }
        
        /* 敌人区域 */
        .enemy-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(60, 30, 30, 0.3);
            border-radius: 10px;
        }
        
        .enemy-unit {
            text-align: center;
        }
        
        .enemy-sprite {
            width: 80px;
            height: 80px;
            background: #3a2a3a;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 8px;
            border: 2px solid #5a3a5a;
        }
        
        .enemy-name {
            font-size: 12px;
            color: #ddd;
            margin-bottom: 5px;
        }
        
        .enemy-hp-bar {
            width: 80px;
            height: 8px;
            background: #2a1a2a;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .enemy-hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff6666);
            transition: width 0.3s;
        }
        
        /* 我方区域 */
        .party-area {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .party-unit {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(30, 40, 60, 0.5);
            border-radius: 8px;
            border: 1px solid #3a4a5a;
        }
        
        .party-unit.active {
            border-color: #6bcfff;
            box-shadow: 0 0 10px rgba(107, 207, 255, 0.3);
        }
        
        .party-unit .avatar {
            width: 40px;
            height: 40px;
            background: #3a4a5a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .party-unit .info {
            flex: 1;
        }
        
        .party-unit .name {
            font-size: 11px;
            font-weight: bold;
            color: #ddd;
        }
        
        .party-unit .hp-text {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
        }
        
        .party-unit .hp-bar {
            height: 6px;
            margin-top: 4px;
        }
        
        /* 技能按钮 */
        .skill-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .skill-btn {
            padding: 10px;
            background: rgba(60, 50, 100, 0.5);
            border: 1px solid #5a4a8a;
            border-radius: 8px;
            color: #ddd;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .skill-btn:hover:not(:disabled) {
            background: rgba(80, 70, 120, 0.5);
            border-color: #7a6aaa;
        }
        
        .skill-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .skill-btn .name {
            font-weight: bold;
            margin-bottom: 3px;
        }
        
        .skill-btn .cd {
            font-size: 9px;
            color: #888;
        }
        
        /* 战斗日志 */
        .battle-log {
            max-height: 100px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(20, 15, 30, 0.5);
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 11px;
        }
        
        .battle-log-entry {
            padding: 3px 0;
            color: #888;
        }
        
        .battle-log-entry.damage { color: #ff6b6b; }
        .battle-log-entry.heal { color: #6bff6b; }
        .battle-log-entry.buff { color: #ffd700; }
        
        /* Boss机关提示 */
        .boss-hint {
            text-align: center;
            padding: 10px;
            background: rgba(80, 60, 30, 0.3);
            border: 1px solid #6a5a3a;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #ffa500;
        }
        
        /* 机关界面 */
        .mechanism-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        
        .mechanism-overlay.active {
            display: flex;
        }
        
        .mechanism-container {
            width: 90%;
            max-width: 400px;
            background: linear-gradient(135deg, #2a1a1a 0%, #3a2a2a 100%);
            border: 2px solid #5a4a4a;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        
        .mechanism-title {
            font-size: 16px;
            color: #ffa500;
            margin-bottom: 15px;
        }
        
        .mechanism-desc {
            font-size: 12px;
            color: #888;
            margin-bottom: 20px;
        }
        
        /* 华容道机关 */
        .huarongdao {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }
        
        .hr-block {
            aspect-ratio: 1;
            background: #3a2a2a;
            border: 1px solid #5a4a4a;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #ddd;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .hr-block.empty {
            background: transparent;
            border-color: transparent;
            cursor: default;
        }
        
        .hr-block.target {
            background: #2a4a2a;
            border-color: #4a6a4a;
            color: #6bff6b;
        }
        
        .hr-block:hover:not(.empty) {
            background: #4a3a3a;
        }
        
        .mechanism-btn {
            padding: 10px 30px;
            background: rgba(80, 60, 30, 0.5);
            border: 1px solid #6a5a3a;
            border-radius: 8px;
            color: #ddd;
            font-size: 13px;
            cursor: pointer;
        }
        
        .mechanism-btn:hover {
            background: rgba(100, 80, 50, 0.5);
        }
        
        /* 结果提示 */
        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            z-index: 1001;
            align-items: center;
            justify-content: center;
        }
        
        .result-overlay.active {
            display: flex;
        }
        
        .result-container {
            text-align: center;
            padding: 40px;
        }
        
        .result-title {
            font-size: 28px;
            margin-bottom: 20px;
        }
        
        .result-title.victory { color: #6bff6b; }
        .result-title.defeat { color: #ff6b6b; }
        
        .result-desc {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }
        
        .result-btn {
            padding: 12px 40px;
            background: rgba(60, 50, 100, 0.5);
            border: 1px solid #6a5a9a;
            border-radius: 8px;
            color: #ddd;
            font-size: 14px;
            cursor: pointer;
        }
        
        .result-btn:hover {
            background: rgba(80, 70, 120, 0.5);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 顶部标题 -->
        <div class="header">
            <h1>🕯️ 地宫探索 Demo v3</h1>
            <div class="subtitle">基于《盗墓长生印》设计 | 火把视野 + 独立战斗 + 机关联动</div>
        </div>
        
        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="stat-item">
                <div class="stat-label">队伍生命</div>
                <div class="stat-value hp-value" id="partyHp">400/400</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">🔥 火把</div>
                <div class="stat-value torch-value" id="torchCount">3</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">当前层</div>
                <div class="stat-value floor-value" id="currentFloor">1</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">干粮</div>
                <div class="stat-value food-value" id="foodCount">5</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">古币</div>
                <div class="stat-value gold-value" id="goldCount">0</div>
            </div>
        </div>
        
        <!-- 主布局 -->
        <div class="main-layout">
            <!-- 左侧：地图区域 -->
            <div class="left-panel">
                <div class="map-section">
                    <div class="map-title">
                        <span class="torch-icon">🔥</span>
                        <span>地宫地图</span>
                        <span style="color: #666; font-size: 10px;">（火把视野：周围5格）</span>
                    </div>
                    <div id="gameMap"></div>
                    <div class="action-hint">
                        点击格子移动 | 火把用完后视野缩小至1格 | 找到 🔮 机关削弱Boss
                    </div>
                </div>
            </div>
            
            <!-- 右侧面板 -->
            <div class="right-panel">
                <!-- 队伍信息 -->
                <div class="panel-section">
                    <div class="panel-title">👥 探险队伍</div>
                    <div class="party-list" id="partyList"></div>
                </div>
                
                <!-- 物品栏 -->
                <div class="panel-section">
                    <div class="panel-title">🎒 物品栏</div>
                    <div class="inventory-grid" id="inventoryGrid"></div>
                </div>
                
                <!-- 探索日志 -->
                <div class="panel-section">
                    <div class="panel-title">📜 探索日志</div>
                    <div class="log-section" id="logSection"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 战斗界面 -->
    <div class="battle-overlay" id="battleOverlay">
        <div class="battle-container">
            <div class="battle-title" id="battleTitle">⚔️ 遭遇战</div>
            
            <!-- Boss机关提示 -->
            <div class="boss-hint" id="bossHint" style="display: none;">
                ⚠️ Boss被护盾保护，减伤 <span id="shieldPercent">80%</span><br>
                <small>解开关卡中的机关可削弱护盾</small>
            </div>
            
            <!-- 敌人区域 -->
            <div class="enemy-area" id="enemyArea"></div>
            
            <!-- 我方区域 -->
            <div class="party-area" id="battlePartyArea"></div>
            
            <!-- 技能按钮 -->
            <div class="skill-buttons" id="skillButtons"></div>
            
            <!-- 战斗日志 -->
            <div class="battle-log" id="battleLog"></div>
            
            <div style="text-align: center;">
                <button class="mechanism-btn" id="fleeBtn">撤退</button>
            </div>
        </div>
    </div>
    
    <!-- 机关界面 -->
    <div class="mechanism-overlay" id="mechanismOverlay">
        <div class="mechanism-container">
            <div class="mechanism-title" id="mechanismTitle">🔐 八宝盒机关</div>
            <div class="mechanism-desc" id="mechanismDesc">将方块移动到目标位置</div>
            <div class="huarongdao" id="huarongdao"></div>
            <button class="mechanism-btn" id="closeMechanism">返回探索</button>
        </div>
    </div>
    
    <!-- 结果界面 -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-container">
            <div class="result-title" id="resultTitle">🎉 胜利</div>
            <div class="result-desc" id="resultDesc">成功击败敌人</div>
            <button class="result-btn" id="resultBtn">继续探索</button>
        </div>
    </div>

    <script>
        // ==================== 游戏状态 ====================
        const gameState = {
            // 玩家状态
            player: { x: 1, y: 1 },
            torches: 3,          // 火把数量
            torchSteps: 50,      // 当前火把剩余步数
            food: 5,
            gold: 0,
            floor: 1,
            
            // 队伍
            party: [
                { name: '吕烽', hp: 100, maxHp: 100, atk: 15, def: 5, role: '前锋', skills: ['普攻', '蓄力斩', '嘲讽'] },
                { name: '彩儿', hp: 80, maxHp: 80, atk: 10, def: 3, role: '治疗', skills: ['普攻', '治疗术', '净化'] },
                { name: '胡东', hp: 90, maxHp: 90, atk: 18, def: 4, role: '输出', skills: ['普攻', '连环斩', '闪避'] },
                { name: '潘雄', hp: 120, maxHp: 120, atk: 12, def: 8, role: '守护', skills: ['普攻', '守护', '狂暴'] }
            ],
            
            // Boss护盾（机关影响）
            bossShield: 80,      // 减伤百分比
            mechanismsActive: 4, // 剩余机关数量
            
            // 地图数据
            mapWidth: 12,
            mapHeight: 10,
            map: [],
            revealed: [],        // 已探索的格子
            
            // 物品
            inventory: {
                torch: 3,
                food: 5,
                antidote: 2,
                key: 0
            }
        };
        
        // 地图符号
        const CELL_TYPES = {
            WALL: '#',
            FLOOR: '.',
            PLAYER: 'P',
            ENEMY: 'E',
            BOSS: 'B',
            CHEST: 'C',
            TRAP: 'T',
            DOOR: 'D',
            STAIRS: 'S',
            MECHANISM: 'M'
        };
        
        // ==================== 地图生成 ====================
        function generateMap() {
            const width = gameState.mapWidth;
            const height = gameState.mapHeight;
            
            // 初始化全墙壁
            gameState.map = Array(height).fill(null).map(() => Array(width).fill(CELL_TYPES.WALL));
            gameState.revealed = Array(height).fill(null).map(() => Array(width).fill(false));
            
            // 简单房间生成
            // 主走廊
            for (let x = 1; x < width - 1; x++) {
                gameState.map[1][x] = CELL_TYPES.FLOOR;
                gameState.map[4][x] = CELL_TYPES.FLOOR;
                gameState.map[7][x] = CELL_TYPES.FLOOR;
            }
            
            // 垂直连接
            for (let y = 1; y < height - 1; y++) {
                gameState.map[y][2] = CELL_TYPES.FLOOR;
                gameState.map[y][5] = CELL_TYPES.FLOOR;
                gameState.map[y][8] = CELL_TYPES.FLOOR;
                gameState.map[y][10] = CELL_TYPES.FLOOR;
            }
            
            // 放置机关（4个）
            gameState.map[2][4] = CELL_TYPES.MECHANISM;
            gameState.map[3][7] = CELL_TYPES.MECHANISM;
            gameState.map[6][3] = CELL_TYPES.MECHANISM;
            gameState.map[5][9] = CELL_TYPES.MECHANISM;
            
            // 放置敌人
            gameState.map[3][3] = CELL_TYPES.ENEMY;
            gameState.map[5][6] = CELL_TYPES.ENEMY;
            gameState.map[6][8] = CELL_TYPES.ENEMY;
            
            // 放置宝箱
            gameState.map[2][8] = CELL_TYPES.CHEST;
            gameState.map[6][2] = CELL_TYPES.CHEST;
            
            // 放置陷阱
            gameState.map[4][6] = CELL_TYPES.TRAP;
            gameState.map[7][4] = CELL_TYPES.TRAP;
            
            // 放置Boss（右下角）
            gameState.map[8][10] = CELL_TYPES.BOSS;
            
            // 楼梯（Boss后面）
            gameState.map[8][11] = CELL_TYPES.STAIRS;
            
            // 玩家起始位置
            gameState.map[1][1] = CELL_TYPES.PLAYER;
            gameState.player = { x: 1, y: 1 };
        }
        
        // ==================== 渲染地图 ====================
        function renderMap() {
            const mapEl = document.getElementById('gameMap');
            mapEl.innerHTML = '';
            
            const px = gameState.player.x;
            const py = gameState.player.y;
            
            // 火把视野范围
            const visionRange = gameState.torches > 0 ? 5 : 1;
            
            for (let y = 0; y < gameState.mapHeight; y++) {
                for (let x = 0; x < gameState.mapWidth; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    const distance = Math.abs(x - px) + Math.abs(y - py);
                    const inVision = distance <= visionRange;
                    const isRevealed = gameState.revealed[y][x];
                    
                    // 视野与迷雾
                    if (!isRevealed && !inVision) {
                        cell.classList.add('fog');
                    } else if (!inVision && isRevealed) {
                        cell.classList.add('dim');
                    } else {
                        cell.classList.add('visible');
                        gameState.revealed[y][x] = true;
                    }
                    
                    // 格子类型
                    const type = gameState.map[y][x];
                    
                    if (x === px && y === py) {
                        cell.classList.add('player');
                        cell.textContent = '🧭';
                    } else if (inVision || isRevealed) {
                        switch (type) {
                            case CELL_TYPES.WALL:
                                cell.classList.add('wall');
                                cell.textContent = '▓';
                                break;
                            case CELL_TYPES.FLOOR:
                            case CELL_TYPES.PLAYER:
                                cell.classList.add('floor');
                                cell.textContent = '';
                                break;
                            case CELL_TYPES.ENEMY:
                                cell.classList.add('enemy');
                                cell.textContent = '👹';
                                break;
                            case CELL_TYPES.BOSS:
                                cell.classList.add('boss');
                                cell.textContent = '💀';
                                break;
                            case CELL_TYPES.CHEST:
                                cell.classList.add('chest');
                                cell.textContent = '📦';
                                break;
                            case CELL_TYPES.TRAP:
                                cell.classList.add('trap');
                                cell.textContent = inVision ? '⚠️' : '';
                                break;
                            case CELL_TYPES.MECHANISM:
                                const isActive = gameState.map[y][x] === 'M_ACTIVE';
                                cell.classList.add('mechanism');
                                if (isActive) cell.classList.add('active');
                                cell.textContent = isActive ? '✅' : '🔮';
                                break;
                            case 'M_ACTIVE':
                                cell.classList.add('mechanism', 'active');
                                cell.textContent = '✅';
                                break;
                            case CELL_TYPES.STAIRS:
                                cell.classList.add('stairs');
                                cell.textContent = '🚪';
                                break;
                            default:
                                cell.classList.add('floor');
                        }
                    }
                    
                    // 点击移动
                    if (inVision && (type === CELL_TYPES.FLOOR || type === CELL_TYPES.PLAYER)) {
                        cell.onclick = () => tryMove(x, y);
                    } else if (inVision) {
                        cell.onclick = () => tryInteract(x, y);
                    }
                    
                    mapEl.appendChild(cell);
                }
            }
        }
        
        // ==================== 移动与交互 ====================
        function tryMove(x, y) {
            const px = gameState.player.x;
            const py = gameState.player.y;
            const distance = Math.abs(x - px) + Math.abs(y - py);
            
            if (distance !== 1) return;
            
            // 消耗火把步数
            if (gameState.torches > 0) {
                gameState.torchSteps--;
                if (gameState.torchSteps <= 0) {
                    gameState.torches--;
                    gameState.torchSteps = 50;
                    addLog('火把燃尽了，换了一个新的', 'warning');
                }
            }
            
            // 更新位置
            gameState.map[py][px] = CELL_TYPES.FLOOR;
            gameState.map[y][x] = CELL_TYPES.PLAYER;
            gameState.player = { x, y };
            
            updateUI();
            renderMap();
        }
        
        function tryInteract(x, y) {
            const type = gameState.map[y][x];
            const distance = Math.abs(x - gameState.player.x) + Math.abs(y - gameState.player.y);
            
            if (distance > 1) {
                addLog('距离太远，无法交互', 'warning');
                return;
            }
            
            switch (type) {
                case CELL_TYPES.ENEMY:
                    startBattle('enemy', x, y);
                    break;
                case CELL_TYPES.BOSS:
                    startBattle('boss', x, y);
                    break;
                case CELL_TYPES.CHEST:
                    openChest(x, y);
                    break;
                case CELL_TYPES.TRAP:
                    triggerTrap(x, y);
                    break;
                case CELL_TYPES.MECHANISM:
                    openMechanism(x, y);
                    break;
                case CELL_TYPES.STAIRS:
                    nextFloor();
                    break;
            }
        }
        
        // ==================== 机关系统 ====================
        function openMechanism(x, y) {
            const overlay = document.getElementById('mechanismOverlay');
            overlay.classList.add('active');
            
            // 生成简单的华容道谜题
            const puzzle = document.getElementById('huarongdao');
            puzzle.innerHTML = '';
            
            const blocks = ['1', '2', '3', '4', '5', '6', '', '7', '🎯'];
            let emptyIndex = 6;
            
            function renderPuzzle() {
                puzzle.innerHTML = '';
                blocks.forEach((block, index) => {
                    const div = document.createElement('div');
                    div.className = 'hr-block';
                    if (block === '') {
                        div.classList.add('empty');
                    } else if (block === '🎯') {
                        div.classList.add('target');
                        div.textContent = block;
                    } else {
                        div.textContent = block;
                        div.onclick = () => {
                            // 检查是否可以移动
                            const canMove = Math.abs(index - emptyIndex) === 1 || 
                                           Math.abs(index - emptyIndex) === 3;
                            if (canMove) {
                                blocks[emptyIndex] = blocks[index];
                                blocks[index] = '';
                                emptyIndex = index;
                                renderPuzzle();
                                
                                // 检查是否完成
                                if (blocks[8] === '🎯') {
                                    setTimeout(() => {
                                        solveMechanism(x, y);
                                        overlay.classList.remove('active');
                                    }, 300);
                                }
                            }
                        };
                    }
                    puzzle.appendChild(div);
                });
            }
            
            renderPuzzle();
        }
        
        function solveMechanism(x, y) {
            gameState.map[y][x] = 'M_ACTIVE';
            gameState.mechanismsActive--;
            gameState.bossShield = Math.max(0, gameState.bossShield - 20);
            
            addLog(`✅ 解开一个机关！Boss护盾削弱20%，当前减伤${gameState.bossShield}%`, 'success');
            renderMap();
        }
        
        document.getElementById('closeMechanism').onclick = () => {
            document.getElementById('mechanismOverlay').classList.remove('active');
        };
        
        // ==================== 战斗系统 ====================
        let battleState = {
            enemies: [],
            currentUnit: 0,
            turn: 1,
            log: []
        };
        
        function startBattle(type, x, y) {
            const overlay = document.getElementById('battleOverlay');
            overlay.classList.add('active');
            
            // 敌人配置
            if (type === 'enemy') {
                battleState.enemies = [{
                    name: '古墓守卫',
                    hp: 80,
                    maxHp: 80,
                    atk: 12,
                    def: 3,
                    sprite: '👹'
                }];
                document.getElementById('battleTitle').textContent = '⚔️ 遭遇战';
                document.getElementById('bossHint').style.display = 'none';
            } else {
                // Boss战
                battleState.enemies = [{
                    name: '尸王',
                    hp: 500,
                    maxHp: 500,
                    atk: 25,
                    def: 10,
                    sprite: '💀',
                    isBoss: true
                }];
                document.getElementById('battleTitle').textContent = '💀 Boss战';
                
                // 显示护盾提示
                const hint = document.getElementById('bossHint');
                if (gameState.bossShield > 0) {
                    hint.style.display = 'block';
                    document.getElementById('shieldPercent').textContent = gameState.bossShield + '%';
                } else {
                    hint.style.display = 'none';
                }
            }
            
            battleState.currentUnit = 0;
            battleState.turn = 1;
            battleState.log = [];
            battleState.enemyX = x;
            battleState.enemyY = y;
            
            renderBattle();
        }
        
        function renderBattle() {
            // 敌人区域
            const enemyArea = document.getElementById('enemyArea');
            enemyArea.innerHTML = '';
            
            battleState.enemies.forEach(enemy => {
                const unit = document.createElement('div');
                unit.className = 'enemy-unit';
                unit.innerHTML = `
                    <div class="enemy-sprite">${enemy.sprite}</div>
                    <div class="enemy-name">${enemy.name}</div>
                    <div class="enemy-hp-bar">
                        <div class="enemy-hp-fill" style="width: ${(enemy.hp / enemy.maxHp) * 100}%"></div>
                    </div>
                `;
                enemyArea.appendChild(unit);
            });
            
            // 我方区域
            const partyArea = document.getElementById('battlePartyArea');
            partyArea.innerHTML = '';
            
            gameState.party.forEach((member, index) => {
                const unit = document.createElement('div');
                unit.className = 'party-unit' + (index === battleState.currentUnit ? ' active' : '');
                unit.innerHTML = `
                    <div class="avatar">👤</div>
                    <div class="info">
                        <div class="name">${member.name}</div>
                        <div class="hp-text">${member.hp}/${member.maxHp}</div>
                        <div class="hp-bar">
                            <div class="hp-fill" style="width: ${(member.hp / member.maxHp) * 100}%"></div>
                        </div>
                    </div>
                `;
                partyArea.appendChild(unit);
            });
            
            // 技能按钮
            const skillBtns = document.getElementById('skillButtons');
            skillBtns.innerHTML = '';
            
            const currentMember = gameState.party[battleState.currentUnit];
            currentMember.skills.forEach((skill, index) => {
                const btn = document.createElement('button');
                btn.className = 'skill-btn';
                btn.innerHTML = `<div class="name">${skill}</div><div class="cd">CD: 0</div>`;
                btn.onclick = () => useSkill(index);
                skillBtns.appendChild(btn);
            });
            
            // 战斗日志
            const logEl = document.getElementById('battleLog');
            logEl.innerHTML = battleState.log.map(l => 
                `<div class="battle-log-entry ${l.type}">${l.text}</div>`
            ).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        function useSkill(skillIndex) {
            const actor = gameState.party[battleState.currentUnit];
            const skill = actor.skills[skillIndex];
            const target = battleState.enemies[0]; // 简化：默认攻击第一个敌人
            
            let damage = 0;
            let logText = '';
            let logType = 'damage';
            
            switch (skill) {
                case '普攻':
                    damage = Math.max(1, actor.atk - target.def);
                    // Boss护盾减伤
                    if (target.isBoss && gameState.bossShield > 0) {
                        damage = Math.floor(damage * (100 - gameState.bossShield) / 100);
                        logText = `${actor.name} 使用普攻，对 ${target.name} 造成 ${damage} 点伤害（护盾减伤${gameState.bossShield}%）`;
                    } else {
                        logText = `${actor.name} 使用普攻，对 ${target.name} 造成 ${damage} 点伤害`;
                    }
                    target.hp -= damage;
                    break;
                    
                case '蓄力斩':
                    damage = Math.max(1, actor.atk * 2 - target.def);
                    if (target.isBoss && gameState.bossShield > 0) {
                        damage = Math.floor(damage * (100 - gameState.bossShield) / 100);
                    }
                    target.hp -= damage;
                    logText = `${actor.name} 使用蓄力斩，造成 ${damage} 点暴击伤害！`;
                    break;
                    
                case '治疗术':
                    const heal = 30;
                    const healTarget = gameState.party.find(m => m.hp < m.maxHp);
                    if (healTarget) {
                        healTarget.hp = Math.min(healTarget.maxHp, healTarget.hp + heal);
                        logText = `${actor.name} 使用治疗术，为 ${healTarget.name} 恢复 ${heal} 点生命`;
                        logType = 'heal';
                    } else {
                        logText = `${actor.name} 使用治疗术，但全员满血`;
                    }
                    break;
                    
                default:
                    damage = Math.max(1, actor.atk - target.def);
                    if (target.isBoss && gameState.bossShield > 0) {
                        damage = Math.floor(damage * (100 - gameState.bossShield) / 100);
                    }
                    target.hp -= damage;
                    logText = `${actor.name} 使用 ${skill}，造成 ${damage} 点伤害`;
            }
            
            battleState.log.push({ text: logText, type: logType });
            
            // 检查敌人死亡
            if (target.hp <= 0) {
                battleState.log.push({ text: `${target.name} 被击败！`, type: 'buff' });
                battleState.enemies = battleState.enemies.filter(e => e.hp > 0);
            }
            
            // 检查战斗结束
            if (battleState.enemies.length === 0) {
                setTimeout(() => endBattle(true), 500);
                renderBattle();
                return;
            }
            
            // 下一个角色
            battleState.currentUnit++;
            if (battleState.currentUnit >= gameState.party.length) {
                // 敌人回合
                enemyTurn();
                battleState.currentUnit = 0;
                battleState.turn++;
            }
            
            // 检查队伍死亡
            if (gameState.party.every(m => m.hp <= 0)) {
                setTimeout(() => endBattle(false), 500);
            }
            
            renderBattle();
        }
        
        function enemyTurn() {
            battleState.enemies.forEach(enemy => {
                if (enemy.hp <= 0) return;
                
                // 随机选择目标
                const aliveParty = gameState.party.filter(m => m.hp > 0);
                if (aliveParty.length === 0) return;
                
                const target = aliveParty[Math.floor(Math.random() * aliveParty.length)];
                const damage = Math.max(1, enemy.atk - target.def);
                target.hp -= damage;
                
                battleState.log.push({
                    text: `${enemy.name} 攻击 ${target.name}，造成 ${damage} 点伤害`,
                    type: 'damage'
                });
                
                if (target.hp <= 0) {
                    battleState.log.push({ text: `${target.name} 倒下了！`, type: 'damage' });
                }
            });
        }
        
        function endBattle(victory) {
            document.getElementById('battleOverlay').classList.remove('active');
            
            const resultOverlay = document.getElementById('resultOverlay');
            const title = document.getElementById('resultTitle');
            const desc = document.getElementById('resultDesc');
            
            if (victory) {
                title.textContent = '🎉 胜利';
                title.className = 'result-title victory';
                
                const enemy = battleState.enemies[0] || { name: '敌人', isBoss: false };
                const goldReward = enemy.isBoss ? 500 : 50;
                gameState.gold += goldReward;
                
                desc.innerHTML = `击败了 ${enemy.name}！<br>获得 ${goldReward} 古币`;
                
                // 移除地图上的敌人
                gameState.map[battleState.enemyY][battleState.enemyX] = CELL_TYPES.FLOOR;
                
                if (enemy.isBoss) {
                    desc.innerHTML += '<br><br>恭喜通关Demo！';
                }
            } else {
                title.textContent = '💀 战败';
                title.className = 'result-title defeat';
                desc.innerHTML = '队伍全员阵亡<br>探索结束';
            }
            
            resultOverlay.classList.add('active');
            updateUI();
            renderMap();
        }
        
        document.getElementById('fleeBtn').onclick = () => {
            document.getElementById('battleOverlay').classList.remove('active');
            addLog('逃离战斗', 'warning');
        };
        
        document.getElementById('resultBtn').onclick = () => {
            document.getElementById('resultOverlay').classList.remove('active');
        };
        
        // ==================== 其他交互 ====================
        function openChest(x, y) {
            const rewards = ['torch', 'food', 'gold'];
            const reward = rewards[Math.floor(Math.random() * rewards.length)];
            
            switch (reward) {
                case 'torch':
                    gameState.torches++;
                    addLog('打开宝箱，获得火把×1', 'success');
                    break;
                case 'food':
                    gameState.food++;
                    addLog('打开宝箱，获得干粮×1', 'success');
                    break;
                case 'gold':
                    gameState.gold += 30;
                    addLog('打开宝箱，获得古币×30', 'success');
                    break;
            }
            
            gameState.map[y][x] = CELL_TYPES.FLOOR;
            updateUI();
            renderMap();
        }
        
        function triggerTrap(x, y) {
            const damage = 20;
            gameState.party[0].hp -= damage;
            addLog(`触发陷阱！${gameState.party[0].name} 受到 ${damage} 点伤害`, 'danger');
            
            gameState.map[y][x] = CELL_TYPES.FLOOR;
            updateUI();
            renderMap();
        }
        
        function nextFloor() {
            gameState.floor++;
            addLog(`进入第 ${gameState.floor} 层`, 'info');
            generateMap();
            renderMap();
        }
        
        // ==================== UI更新 ====================
        function updateUI() {
            // 更新状态栏
            const totalHp = gameState.party.reduce((sum, m) => sum + m.hp, 0);
            const totalMaxHp = gameState.party.reduce((sum, m) => sum + m.maxHp, 0);
            
            document.getElementById('partyHp').textContent = `${totalHp}/${totalMaxHp}`;
            document.getElementById('torchCount').textContent = `${gameState.torches} (${gameState.torchSteps}步)`;
            document.getElementById('currentFloor').textContent = gameState.floor;
            document.getElementById('foodCount').textContent = gameState.food;
            document.getElementById('goldCount').textContent = gameState.gold;
            
            // 更新队伍列表
            const partyList = document.getElementById('partyList');
            partyList.innerHTML = gameState.party.map(member => `
                <div class="party-member">
                    <div class="member-avatar">👤</div>
                    <div class="member-info">
                        <div class="member-name">${member.name} <small style="color:#666">${member.role}</small></div>
                        <div class="member-hp">${member.hp}/${member.maxHp}</div>
                        <div class="hp-bar">
                            <div class="hp-fill" style="width: ${(member.hp / member.maxHp) * 100}%"></div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // 更新物品栏
            const inv = document.getElementById('inventoryGrid');
            inv.innerHTML = `
                <div class="item-slot" onclick="useTorch()">
                    <div class="icon">🔥</div>
                    <div class="count">${gameState.inventory.torch}</div>
                </div>
                <div class="item-slot" onclick="useFood()">
                    <div class="icon">🍖</div>
                    <div class="count">${gameState.inventory.food}</div>
                </div>
                <div class="item-slot" onclick="useAntidote()">
                    <div class="icon">💊</div>
                    <div class="count">${gameState.inventory.antidote}</div>
                </div>
                <div class="item-slot">
                    <div class="icon">🔑</div>
                    <div class="count">${gameState.inventory.key}</div>
                </div>
            `;
        }
        
        function useTorch() {
            if (gameState.inventory.torch > 0) {
                gameState.inventory.torch--;
                gameState.torches++;
                gameState.torchSteps = 50;
                addLog('使用火把，视野范围恢复', 'success');
                updateUI();
                renderMap();
            }
        }
        
        function useFood() {
            if (gameState.inventory.food > 0) {
                gameState.inventory.food--;
                const healTarget = gameState.party.find(m => m.hp < m.maxHp);
                if (healTarget) {
                    const heal = 20;
                    healTarget.hp = Math.min(healTarget.maxHp, healTarget.hp + heal);
                    addLog(`使用干粮，${healTarget.name} 恢复 ${heal} 点生命`, 'success');
                }
                updateUI();
            }
        }
        
        function useAntidote() {
            addLog('没有中毒状态', 'info');
        }
        
        function addLog(text, type = '') {
            const logSection = document.getElementById('logSection');
            const entry = document.createElement('div');
            entry.className = 'log-entry' + (type ? ' ' + type : '');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            logSection.insertBefore(entry, logSection.firstChild);
        }
        
        // ==================== 初始化 ====================
        function init() {
            generateMap();
            updateUI();
            renderMap();
            addLog('进入地宫，小心机关！', 'info');
            addLog('提示：找到并解开4个🔮机关可以削弱Boss护盾', 'info');
        }
        
        init();
    </script>
</body>
</html>
