<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>苍穹劫·摸金传人 - 主界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* 主容器 */
        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            margin: 0 auto;
            overflow: hidden;
        }

        /* ========== 背景场景 ========== */
        .scene-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.coze.cn/s/NuBDmB8KHF8/') center/cover no-repeat;
            z-index: 1;
        }

        /* 场景叠加层（增强氛围） */
        .scene-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                180deg,
                rgba(10, 10, 20, 0.4) 0%,
                rgba(10, 10, 20, 0.2) 30%,
                rgba(10, 10, 20, 0.3) 70%,
                rgba(10, 10, 20, 0.7) 100%
            );
            z-index: 2;
            pointer-events: none;
        }

        /* ========== 顶部资源栏 ========== */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: linear-gradient(180deg, rgba(15, 10, 25, 0.95) 0%, rgba(15, 10, 25, 0.7) 80%, transparent 100%);
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .player-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            background: linear-gradient(135deg, #2a2040, #1a1530);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-icon {
            font-size: 24px;
        }

        .player-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .player-name {
            font-size: 14px;
            color: #d4af37;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }

        .player-level {
            font-size: 11px;
            color: #8a8a9a;
        }

        .player-level span {
            color: #d4af37;
        }

        .resources {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
        }

        .resource-row {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #e0e0e0;
        }

        .resource-icon {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .resource-icon.gold {
            color: #ffd700;
        }

        .resource-icon.diamond {
            color: #00d4ff;
        }

        .resource-icon.stamina {
            color: #7cfc00;
        }

        /* ========== 场景交互入口 ========== */
        .scene-entries {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* 通用入口样式 */
        .entry-point {
            position: absolute;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .entry-point:hover, .entry-point:active {
            transform: scale(1.05);
        }

        /* 古墓入口 - 中央偏下，最显眼 */
        .entry-dungeon {
            bottom: 28%;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 120px;
        }

        .entry-dungeon::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 80px;
            background: radial-gradient(ellipse, rgba(212, 175, 55, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: glowPulse 2s ease-in-out infinite;
        }

        .entry-icon {
            font-size: 42px;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.5));
        }

        .entry-label {
            font-size: 13px;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8), 0 0 20px rgba(212, 175, 55, 0.3);
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 休息帐篷 - 左侧 */
        .entry-camp {
            top: 32%;
            left: 5%;
            width: 90px;
            height: 80px;
        }

        .entry-camp .entry-icon {
            font-size: 36px;
            filter: drop-shadow(0 0 5px rgba(255, 200, 100, 0.4));
        }

        .entry-camp .entry-label {
            font-size: 11px;
            color: #ffc864;
        }

        /* 星盘祭坛 - 右侧，有光效动画 */
        .entry-summon {
            top: 25%;
            right: 3%;
            width: 100px;
            height: 90px;
        }

        .entry-summon::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(128, 90, 213, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            animation: purpleGlow 1.5s ease-in-out infinite;
        }

        .entry-summon .entry-icon {
            font-size: 38px;
            filter: drop-shadow(0 0 10px rgba(128, 90, 213, 0.6));
        }

        .entry-summon .entry-label {
            font-size: 11px;
            color: #b088ff;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8), 0 0 15px rgba(128, 90, 213, 0.4);
        }

        /* 古董摊 - 左下角 */
        .entry-shop {
            bottom: 12%;
            right: 8%;
            width: 80px;
            height: 70px;
        }

        .entry-shop .entry-icon {
            font-size: 30px;
            filter: drop-shadow(0 0 5px rgba(200, 160, 100, 0.4));
        }

        .entry-shop .entry-label {
            font-size: 10px;
            color: #c8a064;
        }

        /* 告示板 - 右下角 */
        .entry-quest {
            bottom: 12%;
            left: 8%;
            width: 75px;
            height: 65px;
        }

        .entry-quest .entry-icon {
            font-size: 28px;
            filter: drop-shadow(0 0 5px rgba(180, 180, 160, 0.4));
        }

        .entry-quest .entry-label {
            font-size: 10px;
            color: #b4b4a0;
        }

        /* ========== 底部快捷栏 ========== */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: linear-gradient(0deg, rgba(15, 10, 25, 0.95) 0%, rgba(15, 10, 25, 0.8) 80%, transparent 100%);
            padding: 15px 20px 25px;
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }

        .quick-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 10px 5px;
            background: rgba(40, 30, 60, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quick-btn:hover, .quick-btn:active {
            background: rgba(60, 50, 90, 0.8);
            border-color: #d4af37;
            transform: translateY(-2px);
        }

        .quick-btn-icon {
            font-size: 24px;
            color: #d4af37;
        }

        .quick-btn-text {
            font-size: 11px;
            color: #a0a0b0;
        }

        /* ========== 开发中提示弹窗 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1530 0%, #2a2040 100%);
            border: 2px solid #d4af37;
            border-radius: 16px;
            padding: 30px 40px;
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.3s ease;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .modal-title {
            font-size: 18px;
            color: #d4af37;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .modal-desc {
            font-size: 13px;
            color: #8a8a9a;
            margin-bottom: 20px;
        }

        .modal-btn {
            background: linear-gradient(135deg, #d4af37 0%, #b8960c 100%);
            border: none;
            border-radius: 20px;
            padding: 10px 30px;
            font-size: 14px;
            color: #1a1530;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .modal-btn:hover, .modal-btn:active {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        /* ========== 动画效果 ========== */
        @keyframes glowPulse {
            0%, 100% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        @keyframes purpleGlow {
            0%, 100% {
                opacity: 0.4;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1.3);
            }
        }

        /* 点击反馈动画 */
        .entry-point.clicked {
            animation: clickFeedback 0.3s ease;
        }

        @keyframes clickFeedback {
            0% { transform: scale(1); }
            50% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        /* 悬浮提示 */
        .entry-hint {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 15, 30, 0.9);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 5px;
            padding: 4px 10px;
            font-size: 10px;
            color: #d4af37;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .entry-point:hover .entry-hint {
            opacity: 1;
        }

        /* 星盘粒子效果 */
        .star-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(200, 150, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp 3s ease-in-out infinite;
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0);
            }
            20% {
                opacity: 1;
                transform: translateY(-10px) scale(1);
            }
            80% {
                opacity: 0.5;
                transform: translateY(-40px) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(0);
            }
        }

        /* 古墓光晕 */
        .dungeon-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 100px;
            background: radial-gradient(ellipse, rgba(212, 175, 55, 0.4) 0%, transparent 60%);
            animation: dungeonBreath 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes dungeonBreath {
            0%, 100% {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 0.7;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        /* ========== 响应式适配 ========== */
        @media (max-height: 700px) {
            .top-bar {
                padding: 8px 12px;
            }
            .player-avatar {
                width: 38px;
                height: 38px;
            }
            .bottom-bar {
                padding: 10px 15px 20px;
            }
            .entry-dungeon {
                bottom: 20%;
            }
        }

        @media (max-width: 360px) {
            .entry-dungeon {
                width: 110px;
                height: 80px;
            }
            .entry-icon {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 背景场景 -->
        <div class="scene-bg"></div>
        <div class="scene-overlay"></div>

        <!-- 顶部资源栏 -->
        <div class="top-bar">
            <div class="player-info">
                <div class="player-avatar">
                    <span class="avatar-icon">🧙</span>
                </div>
                <div class="player-details">
                    <div class="player-name">盗墓传人</div>
                    <div class="player-level">Lv.<span>1</span></div>
                </div>
            </div>
            <div class="resources">
                <div class="resource-row">
                    <span class="resource-icon gold">💰</span>
                    <span id="gold-count">12,580</span>
                </div>
                <div class="resource-row">
                    <span class="resource-icon diamond">💎</span>
                    <span id="diamond-count">350</span>
                </div>
                <div class="resource-row">
                    <span class="resource-icon stamina">⚡</span>
                    <span id="stamina-count">120/120</span>
                </div>
            </div>
        </div>

        <!-- 场景交互入口 -->
        <div class="scene-entries">
            <!-- 古墓入口 - 中央偏下 -->
            <div class="entry-point entry-dungeon" data-action="dungeon" data-href="地宫探索demo_v10_剧情版.html">
                <div class="dungeon-glow"></div>
                <span class="entry-icon">🏛️</span>
                <span class="entry-label">探 险</span>
                <span class="entry-hint">进入地宫探索</span>
            </div>

            <!-- 休息帐篷 - 左侧 -->
            <div class="entry-point entry-camp" data-action="character">
                <span class="entry-icon">⛺</span>
                <span class="entry-label">角 色</span>
                <span class="entry-hint">角色系统</span>
            </div>

            <!-- 星盘祭坛 - 右侧 -->
            <div class="entry-point entry-summon" data-action="summon">
                <span class="entry-icon">🔮</span>
                <span class="entry-label">召 唤</span>
                <span class="entry-hint">召唤伙伴</span>
                <!-- 粒子效果容器 -->
                <div class="star-particle" style="left: 20%; animation-delay: 0s;"></div>
                <div class="star-particle" style="left: 50%; animation-delay: 0.5s;"></div>
                <div class="star-particle" style="left: 80%; animation-delay: 1s;"></div>
            </div>

            <!-- 古董摊 - 左下角 -->
            <div class="entry-point entry-shop" data-action="shop">
                <span class="entry-icon">🏺</span>
                <span class="entry-label">商 城</span>
                <span class="entry-hint">购买物品</span>
            </div>

            <!-- 告示板 - 右下角 -->
            <div class="entry-point entry-quest" data-action="quest">
                <span class="entry-icon">📜</span>
                <span class="entry-label">任 务</span>
                <span class="entry-hint">查看任务</span>
            </div>
        </div>

        <!-- 底部快捷栏 -->
        <div class="bottom-bar">
            <div class="quick-btn" data-action="character">
                <span class="quick-btn-icon">👤</span>
                <span class="quick-btn-text">角色</span>
            </div>
            <div class="quick-btn" data-action="team">
                <span class="quick-btn-icon">⚔️</span>
                <span class="quick-btn-text">编队</span>
            </div>
            <div class="quick-btn" data-action="bag">
                <span class="quick-btn-icon">🎒</span>
                <span class="quick-btn-text">背包</span>
            </div>
            <div class="quick-btn" data-action="settings">
                <span class="quick-btn-icon">⚙️</span>
                <span class="quick-btn-text">设置</span>
            </div>
        </div>

        <!-- 关卡选择（已改为直接跳转） -->
    </div>

    <!-- 开发中提示弹窗 -->
    <div class="modal-overlay" id="devModal">
        <div class="modal-content">
            <div class="modal-icon">🔒</div>
            <div class="modal-title" id="modalTitle">系统开发中</div>
            <div class="modal-desc" id="modalDesc">该功能正在紧急开发中<br>敬请期待...</div>
            <button class="modal-btn" id="modalClose">确 定</button>
        </div>
    </div>

    <script>
        // 系统名称映射
        const systemNames = {
            character: { title: '角色系统', desc: '角色培养与进阶功能<br>正在设计中...' },
            summon: { title: '召唤系统', desc: '神秘召唤玩法<br>正在开发中...' },
            shop: { title: '商城系统', desc: '珍稀道具商店<br>即将上线...' },
            quest: { title: '任务系统', desc: '精彩任务奖励<br>敬请期待...' },
            team: { title: '编队系统', desc: '阵容搭配功能<br>正在开发中...' },
            bag: { title: '背包系统', desc: '道具背包功能<br>即将开放...' },
            settings: { title: '设置系统', desc: '游戏设置选项<br>正在配置...' }
        };

        // 点击入口
        document.querySelectorAll('.entry-point, .quick-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                
                // 添加点击反馈
                this.classList.add('clicked');
                setTimeout(() => this.classList.remove('clicked'), 300);

                const action = this.dataset.action;
                
                // 探险入口特殊处理 - 打开关卡选择
                if (action === 'dungeon') {
                    openLevelSelect();
                    return;
                }

                // 其他系统显示开发中
                const system = systemNames[action] || { title: '系统开发中', desc: '该功能正在开发中' };
                showDevModal(system.title, system.desc);
            });
        });

        // 打开关卡选择 - 直接跳转到关卡选择页面
        function openLevelSelect() {
            window.location.href = '地宫探索demo_v10_剧情版.html';
        }

        // 关闭弹窗
        function showDevModal(title, desc) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalDesc').innerHTML = desc;
            document.getElementById('devModal').classList.add('active');
        }

        // 关闭弹窗
        document.getElementById('modalClose').addEventListener('click', function() {
            document.getElementById('devModal').classList.remove('active');
        });

        document.getElementById('devModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('active');
            }
        });

        // 触摸反馈
        document.querySelectorAll('.entry-point, .quick-btn, .modal-btn').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.style.transform = 'scale(0.95)';
            });
            btn.addEventListener('touchend', function() {
                this.style.transform = '';
            });
        });
    </script>
</body>
</html>
