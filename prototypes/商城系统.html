<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>商城系统 - 苍穹劫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8B7355;
            --accent: #B8860B;
            --bg-dark: #1A1A1A;
            --bg-card: #2A2A2A;
            --bg-card-hover: #333333;
            --text-main: #F5DEB3;
            --text-sub: #A0A0A0;
            --border-normal: #444444;
            --rarity-N: #888888;
            --rarity-R: #4CAF50;
            --rarity-SR: #2196F3;
            --rarity-SSR: #9B59B6;
            --rarity-UR: #FFD700;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .screen {
            display: none;
            flex-direction: column;
            min-height: 100vh;
            max-width: 430px;
            margin: 0 auto;
            background: var(--bg-dark);
        }

        .screen.active {
            display: flex;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: linear-gradient(180deg, #2A2A2A 0%, #1A1A1A 100%);
            border-bottom: 1px solid var(--border-normal);
        }

        .header-btn {
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border-normal);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
        }

        .currency-bar {
            display: flex;
            justify-content: space-around;
            padding: 10px 16px;
            background: rgba(40, 30, 50, 0.8);
            border-bottom: 1px solid var(--border-normal);
        }

        .currency-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }

        .currency-icon {
            font-size: 18px;
        }

        .currency-value {
            font-weight: 600;
            color: var(--accent);
        }

        .shop-tabs {
            display: flex;
            padding: 8px;
            gap: 4px;
            background: #1A1A1A;
            overflow-x: auto;
        }

        .shop-tab {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-normal);
            border-radius: 20px;
            color: var(--text-sub);
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .shop-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #1A1A1A;
        }

        .shop-content {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
        }

        .shop-section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            padding-left: 4px;
            color: var(--text-sub);
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .shop-item {
            background: var(--bg-card);
            border: 1px solid var(--border-normal);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .shop-item:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .shop-item:active {
            transform: scale(0.98);
        }

        .shop-item-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 8px;
            background: var(--bg-dark);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            border: 2px solid var(--border-normal);
        }

        .shop-item-name {
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 4px;
        }

        .shop-item-desc {
            font-size: 10px;
            color: var(--text-sub);
            text-align: center;
            margin-bottom: 8px;
            height: 28px;
            overflow: hidden;
        }

        .shop-item-price {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
        }

        .shop-item-price.cheap {
            color: var(--rarity-R);
        }

        .limited-tag {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            position: absolute;
            top: 8px;
            right: 8px;
        }

        .hot-tag {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            position: absolute;
            top: 8px;
            left: 8px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            width: 100%;
            max-width: 320px;
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            padding: 16px;
            text-align: center;
            background: linear-gradient(180deg, rgba(60, 45, 80, 0.9) 0%, rgba(40, 30, 60, 0.9) 100%);
            border-bottom: 1px solid var(--border-normal);
        }

        .modal-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
        }

        .modal-content {
            padding: 20px 16px;
        }

        .modal-desc {
            font-size: 13px;
            color: var(--text-sub);
            text-align: center;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .modal-price {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .modal-quantity {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .quantity-btn {
            width: 36px;
            height: 36px;
            background: var(--bg-dark);
            border: 1px solid var(--border-normal);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 18px;
            cursor: pointer;
        }

        .quantity-btn:hover {
            border-color: var(--accent);
        }

        .quantity-value {
            font-size: 20px;
            font-weight: 600;
            min-width: 40px;
            text-align: center;
        }

        .modal-total {
            text-align: center;
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 16px;
        }

        .modal-total-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn.cancel {
            background: var(--bg-dark);
            color: var(--text-main);
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, var(--accent), #DAA520);
            color: #1A1A1A;
        }

        .modal-btn.confirm:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 300;
            border: 1px solid var(--accent);
        }
    </style>
</head>
<body>
    <div id="shopScreen" class="screen active">
        <div class="header">
            <button class="header-btn" onclick="goBack()">←</button>
            <span class="header-title">商城</span>
            <button class="header-btn">📜</button>
        </div>

        <div class="currency-bar">
            <div class="currency-item">
                <span class="currency-icon">💰</span>
                <span class="currency-value" id="goldAmount">125,000</span>
            </div>
            <div class="currency-item">
                <span class="currency-icon">💎</span>
                <span class="currency-value" id="diamondAmount">5,000</span>
            </div>
            <div class="currency-item">
                <span class="currency-icon">🎫</span>
                <span class="currency-value" id="ticketAmount">1,280</span>
            </div>
        </div>

        <div class="shop-tabs">
            <div class="shop-tab active" data-type="all" onclick="switchShopTab('all')">全部</div>
            <div class="shop-tab" data-type="hero" onclick="switchShopTab('hero')">英雄</div>
            <div class="shop-tab" data-type="material" onclick="switchShopTab('material')">材料</div>
            <div class="shop-tab" data-type="consume" onclick="switchShopTab('consume')">消耗</div>
            <div class="shop-tab" data-type="treasure" onclick="switchShopTab('treasure')">宝物</div>
        </div>

        <div class="shop-content" id="shopContent">
            <div class="shop-section-title">🔥 热门推荐</div>
            <div class="shop-grid" id="hotGrid"></div>
        </div>
    </div>

    <div class="modal-overlay" id="buyModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-icon" id="modalIcon">💎</div>
                <div class="modal-title" id="modalTitle">商品名称</div>
            </div>
            <div class="modal-content">
                <div class="modal-desc" id="modalDesc">商品描述</div>

                <div class="modal-quantity">
                    <button class="quantity-btn" onclick="changeQuantity(-1)">−</button>
                    <span class="quantity-value" id="quantityValue">1</span>
                    <button class="quantity-btn" onclick="changeQuantity(1)">+</button>
                </div>

                <div class="modal-total">
                    总计: <span class="modal-total-value" id="modalTotal">0</span>
                    <span id="modalCurrency">💰</span>
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeBuyModal()">取消</button>
                <button class="modal-btn confirm" id="buyConfirmBtn" onclick="confirmPurchase()">购买</button>
            </div>
        </div>
    </div>

    <script src="game-data-manager.js"></script>
    <script>
        const playerData = GameDataManager.data.player;

        const shopItems = [
            {
                id: 'summon_ticket_10',
                name: '召唤券 x10',
                icon: '🎫',
                desc: '可用于普通召唤或高级召唤',
                price: 2800,
                currency: 'diamonds',
                type: 'consume',
                hot: true,
                max: 99
            },
            {
                id: 'summon_ticket_1',
                name: '召唤券 x1',
                icon: '🎫',
                desc: '可用于普通召唤或高级召唤',
                price: 280,
                currency: 'diamonds',
                type: 'consume',
                max: 999
            },
            {
                id: 'exp_potion_large',
                name: '经验药水(大)',
                icon: '🧪',
                desc: '使用后立即获得大量经验值',
                price: 100,
                currency: 'gold',
                type: 'consume',
                max: 99
            },
            {
                id: 'exp_potion_medium',
                name: '经验药水(中)',
                icon: '🧴',
                desc: '使用后获得中等经验值',
                price: 50,
                currency: 'gold',
                type: 'consume',
                max: 999
            },
            {
                id: 'break_stone',
                name: '突破石',
                icon: '💎',
                desc: '用于英雄突破',
                price: 500,
                currency: 'gold',
                type: 'material',
                max: 999
            },
            {
                id: 'heritage_material',
                name: '传承材料',
                icon: '📿',
                desc: '用于英雄突破',
                price: 1000,
                currency: 'gold',
                type: 'material',
                max: 999
            },
            {
                id: 'treasure_exp_stone',
                name: '宝物经验石',
                icon: '💫',
                desc: '用于强化宝物等级',
                price: 200,
                currency: 'gold',
                type: 'material',
                max: 999
            },
            {
                id: 'gold_pack_small',
                name: '金币袋(小)',
                icon: '💰',
                desc: '内含10,000金币',
                price: 100,
                currency: 'diamonds',
                type: 'consume',
                max: 99
            },
            {
                id: 'gold_pack_large',
                name: '金币袋(大)',
                icon: '💰',
                desc: '内含100,000金币',
                price: 800,
                currency: 'diamonds',
                type: 'consume',
                hot: true,
                max: 99
            },
            {
                id: 'diamond_pack',
                name: '钻石 x680',
                icon: '💎',
                desc: '月卡限定礼包，额外赠送180钻石',
                price: 60,
                currency: 'rmb',
                type: 'consume',
                limited: true,
                max: 1
            }
        ];

        let currentShopTab = 'all';
        let currentItem = null;
        let purchaseQuantity = 1;

        function switchShopTab(tab) {
            currentShopTab = tab;
            document.querySelectorAll('.shop-tab').forEach(t => {
                t.classList.toggle('active', t.dataset.type === tab);
            });
            renderShop();
        }

        function renderShop() {
            const hotGrid = document.getElementById('hotGrid');
            let items = shopItems;

            if (currentShopTab !== 'all') {
                items = items.filter(item => item.type === currentShopTab);
            }

            const hotItems = items.filter(item => item.hot || item.limited);
            const normalItems = items.filter(item => !item.hot && !item.limited);

            hotGrid.innerHTML = [...hotItems, ...normalItems].map(item => {
                const currencyIcon = item.currency === 'diamonds' ? '💎' : (item.currency === 'gold' ? '💰' : '¥');
                const priceClass = item.price < 100 ? 'cheap' : '';

                return `
                    <div class="shop-item" onclick="openBuyModal('${item.id}')">
                        ${item.hot ? '<span class="hot-tag">热</span>' : ''}
                        ${item.limited ? '<span class="limited-tag">限</span>' : ''}
                        <div class="shop-item-icon">${item.icon}</div>
                        <div class="shop-item-name">${item.name}</div>
                        <div class="shop-item-desc">${item.desc}</div>
                        <div class="shop-item-price ${priceClass}">${currencyIcon} ${item.price}</div>
                    </div>
                `;
            }).join('');

            if (hotGrid.innerHTML === '') {
                hotGrid.innerHTML = '<div style="grid-column: span 2; text-align: center; color: var(--text-sub); padding: 40px;">该分类暂无商品</div>';
            }
        }

        function openBuyModal(itemId) {
            currentItem = shopItems.find(item => item.id === itemId);
            if (!currentItem) return;

            purchaseQuantity = 1;
            document.getElementById('modalIcon').textContent = currentItem.icon;
            document.getElementById('modalTitle').textContent = currentItem.name;
            document.getElementById('modalDesc').textContent = currentItem.desc;
            updateModalTotal();
            document.getElementById('buyModal').classList.add('active');
        }

        function closeBuyModal() {
            document.getElementById('buyModal').classList.remove('active');
            currentItem = null;
        }

        function changeQuantity(delta) {
            const newQty = purchaseQuantity + delta;
            if (newQty < 1) return;
            if (newQty > currentItem.max) {
                showToast('已达购买上限');
                return;
            }
            purchaseQuantity = newQty;
            document.getElementById('quantityValue').textContent = purchaseQuantity;
            updateModalTotal();
        }

        function updateModalTotal() {
            const total = currentItem.price * purchaseQuantity;
            const currencyIcon = currentItem.currency === 'diamonds' ? '💎' : (currentItem.currency === 'gold' ? '💰' : '¥');

            document.getElementById('modalTotal').textContent = total.toLocaleString();
            document.getElementById('modalCurrency').textContent = currencyIcon;

            const playerCurrency = currentItem.currency === 'diamonds' ? playerData.diamonds :
                                  (currentItem.currency === 'gold' ? playerData.gold : 0);
            const canAfford = playerCurrency >= total;

            document.getElementById('buyConfirmBtn').disabled = !canAfford;
            if (!canAfford) {
                document.getElementById('buyConfirmBtn').textContent = '货币不足';
            } else {
                document.getElementById('buyConfirmBtn').textContent = '购买';
            }
        }

        function confirmPurchase() {
            if (!currentItem) return;

            const total = currentItem.price * purchaseQuantity;
            const currencyField = currentItem.currency === 'diamonds' ? 'diamonds' : 'gold';

            if (playerData[currencyField] < total) {
                showToast('货币不足');
                return;
            }

            playerData[currencyField] -= total;
            updateCurrencyDisplay();

            let toastMsg = `购买成功: ${currentItem.name} x${purchaseQuantity}`;

            if (currentItem.currency === 'diamonds' && currentItem.id.includes('ticket')) {
                playerData.tickets += purchaseQuantity * (currentItem.id.includes('_10') ? 10 : 1);
                toastMsg = `获得召唤券 x${purchaseQuantity * (currentItem.id.includes('_10') ? 10 : 1)}`;
            }

            showToast(toastMsg);
            closeBuyModal();
        }

        function updateCurrencyDisplay() {
            document.getElementById('goldAmount').textContent = playerData.gold.toLocaleString();
            document.getElementById('diamondAmount').textContent = playerData.diamonds.toLocaleString();
            document.getElementById('ticketAmount').textContent = playerData.tickets.toLocaleString();
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function goBack() {
            GameDataManager.save();
            window.location.href = 'main_interface_v3.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            GameDataManager.init();
            renderShop();
            updateCurrencyDisplay();
        });
    </script>
</body>
</html>
