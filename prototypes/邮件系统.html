<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>邮件中心 - 苍穹劫</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --accent: #d4af37;
            --accent-dark: #8b7355;
            --text-primary: #e8e8e8;
            --text-secondary: #888;
            --success: #4caf50;
            --danger: #f44336;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            max-width: 430px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: linear-gradient(180deg, rgba(30,20,40,0.95) 0%, rgba(20,15,30,0.9) 100%);
            border-bottom: 1px solid rgba(212,175,55,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-btn {
            background: rgba(212,175,55,0.1);
            border: 1px solid rgba(212,175,55,0.3);
            color: var(--accent);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }

        .header-btn:active { transform: scale(0.95); }

        .header-title {
            font-size: 18px;
            color: var(--accent);
        }

        .tabs {
            display: flex;
            padding: 10px 15px;
            gap: 8px;
            background: var(--bg-secondary);
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(180deg, rgba(212,175,55,0.2) 0%, rgba(212,175,55,0.1) 100%);
            border-color: var(--accent);
            color: var(--accent);
        }

        .tab .count {
            display: inline-block;
            background: var(--danger);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 4px;
        }

        .mail-list {
            padding: 15px;
            padding-bottom: 100px;
        }

        .mail-item {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.3s;
        }

        .mail-item:active { transform: scale(0.98); }

        .mail-item.unread {
            border-left: 3px solid var(--accent);
        }

        .mail-item.has-attachment {
            background: linear-gradient(90deg, rgba(212,175,55,0.1) 0%, var(--bg-card) 30%);
        }

        .mail-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .mail-icon {
            font-size: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }

        .mail-info { flex: 1; }

        .mail-title {
            font-size: 15px;
            color: var(--text-primary);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mail-title .red-dot {
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
        }

        .mail-preview {
            font-size: 12px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mail-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .mail-time {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .mail-tags {
            display: flex;
            gap: 5px;
        }

        .mail-tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(212,175,55,0.2);
            color: var(--accent);
        }

        .attachment-tag {
            background: rgba(76,175,80,0.2);
            color: var(--success);
        }

        .attachment-tag.claimed {
            background: rgba(255,255,255,0.1);
            color: var(--text-secondary);
        }

        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            display: none;
            flex-direction: column;
            max-width: 430px;
            margin: 0 auto;
        }

        .detail-overlay.active { display: flex; }

        .detail-header {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(212,175,55,0.2);
        }

        .detail-header .header-title { flex: 1; }

        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .detail-title {
            font-size: 18px;
            color: var(--accent);
            margin-bottom: 15px;
        }

        .detail-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .detail-meta span { margin-right: 15px; }

        .detail-body {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-primary);
            white-space: pre-wrap;
        }

        .detail-attachments {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }

        .detail-attachments-title {
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .attachment-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .attachment-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }

        .attachment-icon { font-size: 24px; margin-bottom: 5px; }

        .attachment-name {
            font-size: 10px;
            color: var(--text-secondary);
            text-align: center;
        }

        .attachment-amount {
            font-size: 12px;
            color: var(--accent);
            margin-top: 3px;
        }

        .claim-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
            border: none;
            border-radius: 8px;
            color: #1a1a1a;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .claim-btn:disabled {
            background: rgba(255,255,255,0.1);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 80px 30px;
            color: var(--text-secondary);
        }

        .empty-icon { font-size: 64px; margin-bottom: 20px; }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: var(--accent);
            padding: 15px 30px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            z-index: 300;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="header-btn" onclick="goBack()">← 返回</button>
        <span class="header-title">邮件中心</span>
        <button class="header-btn" onclick="markAllRead()">全部已读</button>
    </div>

    <div class="tabs">
        <div class="tab active" data-type="all" onclick="switchTab('all')">
            全部<span class="count" id="allCount">0</span>
        </div>
        <div class="tab" data-type="system" onclick="switchTab('system')">系统</div>
        <div class="tab" data-type="attachment" onclick="switchTab('attachment')">
            附件<span class="count" id="attachCount">0</span>
        </div>
    </div>

    <div class="mail-list" id="mailList"></div>

    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-header">
            <button class="header-btn" onclick="closeDetail()">← 返回</button>
            <span class="header-title" id="detailTitle">邮件详情</span>
            <div style="width: 50px;"></div>
        </div>
        <div class="detail-content" id="detailContent"></div>
    </div>

    <script src="game-data-manager.js"></script>
    <script>
        let currentTab = 'all';
        let currentMail = null;

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.type === tab);
            });
            renderMailList();
        }

        function renderMailList() {
            const mailData = GameDataManager.data.mail;
            let mails = mailData.list;

            if (currentTab === 'system') {
                mails = mails.filter(m => m.type === 'system');
            } else if (currentTab === 'attachment') {
                mails = mails.filter(m => m.hasAttachment);
            }

            const unread = mailData.unreadCount;
            document.getElementById('allCount').textContent = unread > 0 ? unread : '';
            document.getElementById('attachCount').textContent = mails.filter(m => m.hasAttachment && !m.attachmentClaimed).length;

            const list = document.getElementById('mailList');

            if (mails.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div>暂无邮件</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = mails.map(mail => {
                const isUnread = !mail.isRead;
                const hasAttachment = mail.hasAttachment && !mail.attachmentClaimed;

                let icon = '📧';
                if (mail.type === 'system') icon = '📢';
                if (mail.type === 'reward') icon = '🎁';
                if (mail.type === 'announcement') icon = '📜';

                return `
                    <div class="mail-item ${isUnread ? 'unread' : ''} ${hasAttachment ? 'has-attachment' : ''}" onclick="openMail('${mail.id}')">
                        <div class="mail-header">
                            <div class="mail-icon">${icon}</div>
                            <div class="mail-info">
                                <div class="mail-title">
                                    ${isUnread ? '<span class="red-dot"></span>' : ''}
                                    ${mail.title}
                                </div>
                                <div class="mail-preview">${mail.content.substring(0, 50)}...</div>
                            </div>
                        </div>
                        <div class="mail-meta">
                            <span class="mail-time">${formatTime(mail.time)}</span>
                            <div class="mail-tags">
                                ${mail.type !== 'system' ? `<span class="mail-tag">${mail.type === 'reward' ? '奖励' : mail.type}</span>` : ''}
                                ${mail.hasAttachment ? `<span class="mail-tag attachment-tag ${mail.attachmentClaimed ? 'claimed' : ''}">${mail.attachmentClaimed ? '已领取' : '附件'}</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
            return `${date.getMonth() + 1}/${date.getDate()}`;
        }

        function openMail(mailId) {
            const mailData = GameDataManager.data.mail;
            currentMail = mailData.list.find(m => m.id === mailId);
            if (!currentMail) return;

            if (!currentMail.isRead) {
                currentMail.isRead = true;
                mailData.unreadCount = Math.max(0, mailData.unreadCount - 1);
                GameDataManager.save();
                renderMailList();
            }

            document.getElementById('detailTitle').textContent = currentMail.title;

            let attachmentHtml = '';
            if (currentMail.hasAttachment && currentMail.items) {
                attachmentHtml = `
                    <div class="detail-attachments">
                        <div class="detail-attachments-title">📦 附件</div>
                        <div class="attachment-grid">
                            ${currentMail.items.map(item => {
                                let icon = '💰';
                                let name = '金币';
                                if (item.type === 'diamond') { icon = '💎'; name = '钻石'; }
                                if (item.type === 'item') { icon = '📦'; name = item.id.includes('ticket') ? '召唤券' : '道具'; }
                                return `
                                    <div class="attachment-item">
                                        <span class="attachment-icon">${icon}</span>
                                        <span class="attachment-name">${name}</span>
                                        <span class="attachment-amount">×${item.amount}</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                    <button class="claim-btn" onclick="claimAttachment('${currentMail.id}')" ${currentMail.attachmentClaimed ? 'disabled' : ''}>
                        ${currentMail.attachmentClaimed ? '已领取' : '领取附件'}
                    </button>
                `;
            }

            document.getElementById('detailContent').innerHTML = `
                <div class="detail-body">${currentMail.content}</div>
                ${attachmentHtml}
            `;

            document.getElementById('detailOverlay').classList.add('active');
        }

        function closeDetail() {
            document.getElementById('detailOverlay').classList.remove('active');
            currentMail = null;
        }

        function claimAttachment(mailId) {
            if (GameDataManager.claimMailAttachment(mailId)) {
                showToast('领取成功！');
                renderMailList();
                openMail(mailId);
            }
        }

        function markAllRead() {
            const mailData = GameDataManager.data.mail;
            mailData.list.forEach(m => m.isRead = true);
            mailData.unreadCount = 0;
            GameDataManager.save();
            renderMailList();
            showToast('已全部标记为已读');
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        }

        function goBack() {
            GameDataManager.save();
            window.location.href = 'main_interface_v3.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            GameDataManager.init();
            renderMailList();
        });
    </script>
</body>
</html>
