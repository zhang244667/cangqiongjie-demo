<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>任务中心 - 苍穹劫</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --accent: #d4af37;
            --accent-dark: #8b7355;
            --text-primary: #e8e8e8;
            --text-secondary: #888;
            --rarity-N: #9e9e9e;
            --rarity-R: #4caf50;
            --rarity-SR: #2196f3;
            --rarity-SSR: #9c27b0;
            --rarity-UR: #ffd700;
            --success: #4caf50;
            --danger: #f44336;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            max-width: 430px;
            margin: 0 auto;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: linear-gradient(180deg, rgba(30,20,40,0.95) 0%, rgba(20,15,30,0.9) 100%);
            border-bottom: 1px solid rgba(212,175,55,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-btn {
            background: rgba(212,175,55,0.1);
            border: 1px solid rgba(212,175,55,0.3);
            color: var(--accent);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }

        .header-btn:active { transform: scale(0.95); }

        .header-title {
            font-size: 18px;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(212,175,55,0.3);
        }

        .tabs {
            display: flex;
            padding: 10px 15px;
            gap: 10px;
            background: var(--bg-secondary);
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(180deg, rgba(212,175,55,0.2) 0%, rgba(212,175,55,0.1) 100%);
            border-color: var(--accent);
            color: var(--accent);
        }

        .tab .badge {
            display: inline-block;
            background: var(--danger);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
        }

        .active-progress {
            margin: 15px;
            padding: 15px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid rgba(212,175,55,0.2);
        }

        .active-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-dark), var(--accent));
            border-radius: 4px;
            transition: width 0.3s;
        }

        .claim-all-btn {
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            background: linear-gradient(180deg, rgba(212,175,55,0.3) 0%, rgba(212,175,55,0.2) 100%);
            border: 1px solid var(--accent);
            border-radius: 8px;
            color: var(--accent);
            font-size: 14px;
            cursor: pointer;
        }

        .claim-all-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .task-list {
            padding: 0 15px 100px;
        }

        .task-item {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .task-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .task-icon {
            font-size: 24px;
        }

        .task-info { flex: 1; }

        .task-name {
            font-size: 15px;
            color: var(--text-primary);
            margin-bottom: 3px;
        }

        .task-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .task-reward {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .reward-tag {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 12px;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.05);
            padding: 3px 8px;
            border-radius: 4px;
        }

        .reward-tag.gold { color: #ffd700; }
        .reward-tag.diamond { color: #2196f3; }

        .task-progress {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .task-progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .task-progress-fill {
            height: 100%;
            background: var(--success);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .task-progress-fill.completed {
            background: var(--accent);
        }

        .task-progress-text {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 50px;
            text-align: right;
        }

        .task-action {
            margin-top: 10px;
        }

        .task-btn {
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }

        .task-btn.claim {
            background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: #1a1a1a;
        }

        .task-btn.claim:active { transform: scale(0.95); }

        .task-btn.claimed {
            background: rgba(255,255,255,0.1);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        .task-btn.goto {
            background: rgba(212,175,55,0.2);
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .task-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .task-status.can-claim {
            color: var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .task-type-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(212,175,55,0.2);
            color: var(--accent);
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: var(--accent);
            padding: 15px 30px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
        }

        .empty-icon { font-size: 48px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <button class="header-btn" onclick="goBack()">← 返回</button>
        <span class="header-title">任务中心</span>
        <button class="header-btn" onclick="refreshTasks()">刷新</button>
    </div>

    <div class="tabs">
        <div class="tab active" data-type="daily" onclick="switchTab('daily')">
            日常<span class="badge" id="dailyBadge">0</span>
        </div>
        <div class="tab" data-type="weekly" onclick="switchTab('weekly')">
            周常<span class="badge" id="weeklyBadge">0</span>
        </div>
        <div class="tab" data-type="achievements" onclick="switchTab('achievements')">
            成就
        </div>
    </div>

    <div class="active-progress">
        <div class="active-title">今日活跃度：<span id="activeValue">0</span>/100</div>
        <div class="progress-bar">
            <div class="progress-fill" id="activeFill" style="width: 0%"></div>
        </div>
        <button class="claim-all-btn" id="claimAllBtn" onclick="claimAllTasks()" disabled>
            一键领取奖励
        </button>
    </div>

    <div class="task-list" id="taskList"></div>

    <script src="game-data-manager.js"></script>
    <script>
        let currentTab = 'daily';

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.type === tab);
            });
            renderTasks();
        }

        function renderTasks() {
            const tasks = GameDataManager.data.tasks;
            const taskList = document.getElementById('taskList');
            const badges = {
                daily: document.getElementById('dailyBadge'),
                weekly: document.getElementById('weeklyBadge'),
                achievements: document.getElementById('achievementsBadge')
            };

            let currentTasks = [];
            if (currentTab === 'daily') currentTasks = tasks.daily;
            else if (currentTab === 'weekly') currentTasks = tasks.weekly;
            else currentTasks = tasks.achievements;

            let claimableCount = 0;
            let totalActive = 0;

            taskList.innerHTML = currentTasks.map(task => {
                const progress = Math.min((task.progress / task.target) * 100, 100);
                const isCompleted = task.progress >= task.target;
                const isClaimed = task.claimed;

                if (isCompleted && !isClaimed) {
                    claimableCount++;
                    badges[currentTab].textContent = claimableCount;
                    badges[currentTab].style.display = claimableCount > 0 ? 'inline-block' : 'none';
                }

                if (!isClaimed) totalActive++;

                let rewardsHtml = '';
                if (task.rewards) {
                    rewardsHtml = task.rewards.map(r => {
                        if (r.type === 'gold') return `<span class="reward-tag gold">💰${r.amount}</span>`;
                        if (r.type === 'diamond') return `<span class="reward-tag diamond">💎${r.amount}</span>`;
                        if (r.type === 'item') return `<span class="reward-tag">📦${r.name}×${r.count}</span>`;
                        return '';
                    }).join('');
                }

                let actionHtml = '';
                if (isClaimed) {
                    actionHtml = `<button class="task-btn claimed">已领取 ✓</button>`;
                } else if (isCompleted) {
                    actionHtml = `<button class="task-btn claim" onclick="claimTask('${task.id}')">领取</button>`;
                } else {
                    actionHtml = `<button class="task-btn goto" onclick="gotoTask('${task.type}')">前往</button>`;
                }

                const statusClass = isCompleted && !isClaimed ? 'can-claim' : '';
                const statusText = isClaimed ? '已完成' : (isCompleted ? '可领取' : '进行中');
                const progressClass = isCompleted ? 'completed' : '';

                const typeNames = { combat: '战斗', growth: '养成', resource: '资源', main: '主线' };

                return `
                    <div class="task-item">
                        <div class="task-header">
                            <span class="task-icon">${getTaskIcon(task.type)}</span>
                            <div class="task-info">
                                <div class="task-name">${task.name}</div>
                                <div class="task-desc">${task.desc}</div>
                            </div>
                            <span class="task-type-badge">${typeNames[task.type] || '其他'}</span>
                        </div>
                        <div class="task-progress">
                            <div class="task-progress-bar">
                                <div class="task-progress-fill ${progressClass}" style="width: ${progress}%"></div>
                            </div>
                            <span class="task-progress-text">${task.progress}/${task.target}</span>
                        </div>
                        <div class="task-reward">
                            ${rewardsHtml || '<span class="reward-tag">🌟 成就奖励</span>'}
                        </div>
                        <div class="task-action" style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="task-status ${statusClass}">${statusText}</span>
                            ${actionHtml}
                        </div>
                    </div>
                `;
            }).join('');

            updateActiveProgress();
            updateClaimAllButton();
        }

        function getTaskIcon(type) {
            const icons = {
                combat: '⚔️',
                growth: '📈',
                resource: '📦',
                main: '🎯',
                power: '💪'
            };
            return icons[type] || '📋';
        }

        function updateActiveProgress() {
            const tasks = GameDataManager.data.tasks;
            const allTasks = [...tasks.daily, ...tasks.weekly, ...tasks.achievements];
            let completed = 0;
            allTasks.forEach(t => {
                if (t.progress >= t.target) completed++;
            });
            const active = Math.min(completed * 10, 100);
            document.getElementById('activeValue').textContent = active;
            document.getElementById('activeFill').style.width = active + '%';
        }

        function updateClaimAllButton() {
            const tasks = GameDataManager.data.tasks;
            const allTasks = [...tasks.daily, ...tasks.weekly, ...tasks.achievements];
            const claimable = allTasks.filter(t => t.progress >= t.target && !t.claimed);
            const btn = document.getElementById('claimAllBtn');
            btn.disabled = claimable.length === 0;
            btn.textContent = claimable.length > 0 ? `一键领取 (${claimable.length})` : '暂无可领取奖励';
        }

        function claimTask(taskId) {
            const tasks = GameDataManager.data.tasks;
            const allTasks = [...tasks.daily, ...tasks.weekly, ...tasks.achievements];
            const task = allTasks.find(t => t.id === taskId);
            if (task && task.progress >= task.target && !task.claimed) {
                task.claimed = true;
                GameDataManager.save();

                if (task.rewards) {
                    task.rewards.forEach(r => {
                        if (r.type === 'gold') GameDataManager.addGold(r.amount);
                        else if (r.type === 'diamond') GameDataManager.addDiamonds(r.amount);
                        else if (r.type === 'item') GameDataManager.addToBackpack(r.id, r.count);
                    });
                }

                showToast('领取成功！');
                renderTasks();
            }
        }

        function claimAllTasks() {
            const tasks = GameDataManager.data.tasks;
            const allTasks = [...tasks.daily, ...tasks.weekly, ...tasks.achievements];
            let claimed = 0;
            allTasks.forEach(task => {
                if (task.progress >= task.target && !task.claimed) {
                    task.claimed = true;
                    if (task.rewards) {
                        task.rewards.forEach(r => {
                            if (r.type === 'gold') GameDataManager.addGold(r.amount);
                            else if (r.type === 'diamond') GameDataManager.addDiamonds(r.amount);
                            else if (r.type === 'item') GameDataManager.addToBackpack(r.id, r.count);
                        });
                    }
                    claimed++;
                }
            });
            GameDataManager.save();
            if (claimed > 0) {
                showToast(`领取了 ${claimed} 个任务奖励！`);
                renderTasks();
            }
        }

        function gotoTask(type) {
            showToast('前往相关系统...');
        }

        function refreshTasks() {
            renderTasks();
            showToast('任务已刷新');
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        }

        function goBack() {
            GameDataManager.save();
            window.location.href = 'main_interface_v3.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            GameDataManager.init();
            renderTasks();
        });
    </script>
</body>
</html>
