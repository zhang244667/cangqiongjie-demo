        function togglePartyDrawer() { document.getElementById('partyDrawer').classList.toggle('open'); }
        function toggleLogDrawer() { document.getElementById('logDrawer').classList.toggle('open'); }
        function toggleStoryDrawer() { document.getElementById('storyDrawer').classList.toggle('open'); }
        
        // ==================== 新战斗系统 ====================
        let battleState = {
            heroes: [],
            enemies: [],
            actionQueue: [],
            currentIndex: 0,
            turn: 0,
            logs: [],
            isRunning: false,
            isBoss: false
        };
        
        // 初始化英雄数据
        function initBattleHeroes() {
            battleHeroes = [
                { ...HERO_STATS.tieZhu, id: 'tieZhu', hp: HERO_STATS.tieZhu.hp, maxHp: HERO_STATS.tieZhu.hp, rage: 0 },
                { ...HERO_STATS.xingJiSi, id: 'xingJiSi', hp: HERO_STATS.xingJiSi.hp, maxHp: HERO_STATS.xingJiSi.hp, rage: 0 },
                { ...HERO_STATS.moJinShou, id: 'moJinShou', hp: HERO_STATS.moJinShou.hp, maxHp: HERO_STATS.moJinShou.hp, rage: 0 },
                { ...HERO_STATS.banShanKe, id: 'banShanKe', hp: HERO_STATS.banShanKe.hp, maxHp: HERO_STATS.banShanKe.hp, rage: 0 }
            ];
        }
        
        // 开始战斗
        function startBattle(isBoss = false) {
            battleState.isBoss = isBoss;
            battleState.turn = 0;
            battleState.logs = [];
            battleState.isRunning = false;
            
            // 初始化英雄
            initBattleHeroes();
            
            // 初始化敌人
            const enemyCount = isBoss ? 2 : 3;
            battleState.enemies = [];
            for (let i = 0; i < enemyCount; i++) {
                battleState.enemies.push({
                    id: `enemy_${i}`,
                    name: isBoss ? '星棺守卫' : '墓穴守卫',
                    icon: isBoss ? '💀' : '👹',
                    hp: isBoss ? 120 : 50,
                    maxHp: isBoss ? 120 : 50,
                    atk: isBoss ? 18 : 12,
                    def: isBoss ? 8 : 4,
                    speed: isBoss ? 75 : 90
                });
            }
            
            // 构建行动队列（按速度排序）
            rebuildActionQueue();
            battleState.turn = 1;
            
            // 显示战斗界面
            document.getElementById('battleTitle').textContent = isBoss ? '💀 Boss战' : '⚔️ 遭遇战斗';
            document.getElementById('battleModal').classList.add('active');
            
            renderBattle();
            
            // 开始自动战斗
            setTimeout(() => {
                battleState.isRunning = true;
                executeNextAction();
            }, 1000);
        }
        
        // 重建行动队列
        function rebuildActionQueue() {
            battleState.actionQueue = [];
            
            // 添加存活的英雄
            battleState.heroes.forEach(hero => {
                if (hero.hp > 0) {
                    battleState.actionQueue.push({ type: 'hero', id: hero.id, acted: false });
                }
            });
            
            // 添加存活的敌人
            battleState.enemies.forEach(enemy => {
                if (enemy.hp > 0) {
                    battleState.actionQueue.push({ type: 'enemy', id: enemy.id, acted: false });
                }
            });
            
            // 按速度排序
            battleState.actionQueue.sort((a, b) => {
                const speedA = a.type === 'hero' ? 
                    battleState.heroes.find(h => h.id === a.id).speed : 
                    battleState.enemies.find(e => e.id === a.id).speed;
                const speedB = b.type === 'hero' ? 
                    battleState.heroes.find(h => h.id === b.id).speed : 
                    battleState.enemies.find(e => e.id === b.id).speed;
                return speedB - speedA;
            });
        }
        
        // 执行下一个行动
        function executeNextAction() {
            if (!battleState.isRunning) return;
            
            // 找到下一个未行动的角色
            let nextIndex = -1;
            for (let i = 0; i < battleState.actionQueue.length; i++) {
                if (!battleState.actionQueue[i].acted) {
                    nextIndex = i;
                    break;
                }
            }
            
            // 如果所有人都行动过了，开始新回合
            if (nextIndex === -1) {
                battleState.turn++;
                battleState.actionQueue.forEach(a => a.acted = false);
                rebuildActionQueue();
                for (let i = 0; i < battleState.actionQueue.length; i++) {
                    if (!battleState.actionQueue[i].acted) {
                        nextIndex = i;
                        break;
                    }
                }
            }
            
            if (nextIndex === -1) {
                endBattle();
                return;
            }
            
            battleState.currentIndex = nextIndex;
            const currentAction = battleState.actionQueue[nextIndex];
            
            renderBattle();
            
            if (currentAction.type === 'hero') {
                // 英雄行动：自动普攻
                setTimeout(() => {
                    heroAutoAttack(currentAction.id);
                }, 800);
            } else {
                // 敌人行动
                setTimeout(() => {
                    enemyAttack(currentAction.id);
                }, 800);
            }
        }
        
        // 英雄自动普攻
        function heroAutoAttack(heroId) {
            playAttackSound(); // 普攻音效
            const hero = battleState.heroes.find(h => h.id === heroId);
            if (!hero || hero.hp <= 0) {
                battleState.actionQueue.find(a => a.id === heroId).acted = true;
                executeNextAction();
                return;
            }
            
            // 找到HP最低的敌人
            const aliveEnemies = battleState.enemies.filter(e => e.hp > 0);
            if (aliveEnemies.length === 0) {
                endBattle();
                return;
            }
            
            const target = aliveEnemies.reduce((min, e) => e.hp < min.hp ? e : min);
            
            // 计算伤害（15%暴击率）
            const isCrit = Math.random() < 0.15;
            const damage = calculateDamage(hero.atk, target.def, isCrit);
            target.hp = Math.max(0, target.hp - damage);
            
            // 获得怒气
            hero.rage = Math.min(100, hero.rage + 20);
            
            // === 触发动效 ===
            // 找到目标DOM元素并触发特效
            setTimeout(() => {
                const enemyElements = document.querySelectorAll('.enemy-unit');
                const targetIndex = battleState.enemies.findIndex(e => e.id === target.id);
                if (enemyElements[targetIndex]) {
                    const targetEl = enemyElements[targetIndex];
                    
                    // 伤害飘字
                    showDamageNumber(targetEl, damage, isCrit ? 'crit' : 'damage');
                    
                    // 受击抖动
                    shakeElement(targetEl, battleState.isBoss);
                    
                    // Boss受击屏幕震动
                    if (battleState.isBoss) {
                        screenShake();
                    }
                    
                    // 普攻特效
                    showAttackEffect(heroId, targetEl);
                    
                    // 如果击杀，触发死亡特效
                    if (target.hp <= 0) {
                        setTimeout(() => showDeathEffect(targetEl, battleState.isBoss), 200);
                    }
                }
            }, 100);
            
            addBattleLog(`${hero.icon}${hero.name} 对 ${target.icon}${target.name} 发动普攻${isCrit ? '，暴击！' : '，造成'} ${damage} 点伤害！`, 'player-attack');
            
            // 检查敌人死亡
            if (target.hp <= 0) {
                addBattleLog(`${target.icon}${target.name} 被击败了！`, 'enemy-death');
                hero.rage = Math.min(100, hero.rage + 15); // 击杀额外+15怒气
            }
            
            // 标记为已行动
            battleState.actionQueue.find(a => a.id === heroId).acted = true;
            
            renderBattle();
            
            // 检查战斗是否结束
            setTimeout(() => {
                if (battleState.enemies.every(e => e.hp <= 0)) {
                    endBattle();
                } else {
                    executeNextAction();
                }
            }, 600);
        }
        
        // 英雄释放技能（插队）
        function heroUseSkill(heroId) {
            playSkillSound(); // 技能音效
            const hero = battleState.heroes.find(h => h.id === heroId);
            if (!hero || hero.hp <= 0 || hero.rage < 100) return;
            
            // 找到HP最低的敌人
            const aliveEnemies = battleState.enemies.filter(e => e.hp > 0);
            if (aliveEnemies.length === 0) return;
            
            const target = aliveEnemies.reduce((min, e) => e.hp < min.hp ? e : min);
            
            // 技能伤害150%（必定暴击）
            const damage = Math.floor(calculateDamage(hero.atk * 1.5, target.def, true));
            target.hp = Math.max(0, target.hp - damage);
            
            // 怒气归零
            hero.rage = 0;
            
            // === 触发动效 ===
            setTimeout(() => {
                const enemyElements = document.querySelectorAll('.enemy-unit');
                const targetIndex = battleState.enemies.findIndex(e => e.id === target.id);
                if (enemyElements[targetIndex]) {
                    const targetEl = enemyElements[targetIndex];
                    
                    // 技能伤害飘字（必定暴击）
                    showDamageNumber(targetEl, damage, 'crit');
                    
                    // 严重抖动
                    shakeElement(targetEl, true);
                    
                    // 屏幕震动
                    screenShake();
                    
                    // 技能特效
                    showSkillEffect(heroId, targetEl);
                    
                    // 如果击杀，触发死亡特效
                    if (target.hp <= 0) {
                        setTimeout(() => showDeathEffect(targetEl, battleState.isBoss), 300);
                    }
                }
            }, 100);
            
            addBattleLog(`${hero.icon}${hero.name} 释放终极技能！对 ${target.icon}${target.name} 造成 ${damage} 点暴击伤害！`, 'player-skill');
            
            // 检查敌人死亡
            if (target.hp <= 0) {
                addBattleLog(`${target.icon}${target.name} 被击败了！`, 'enemy-death');
            }
            
            renderBattle();
            
            // 检查战斗是否结束
            setTimeout(() => {
                if (battleState.enemies.every(e => e.hp <= 0)) {
                    endBattle();
                }
            }, 800);
        }
        
        // 敌人攻击
        function enemyAttack(enemyId) {
            playHitSound(); // 受击音效
            const enemy = battleState.enemies.find(e => e.id === enemyId);
            if (!enemy || enemy.hp <= 0) {
                battleState.actionQueue.find(a => a.id === enemyId).acted = true;
                executeNextAction();
                return;
            }
            
            // 找到HP最高的英雄
            const aliveHeroes = battleState.heroes.filter(h => h.hp > 0);
            if (aliveHeroes.length === 0) {
                endBattle();
                return;
            }
            
            const target = aliveHeroes.reduce((max, h) => h.hp > max.hp ? h : max);
            
            // 计算伤害
            const damage = calculateDamage(enemy.atk, target.def);
            target.hp = Math.max(0, target.hp - damage);
            
            // 目标获得怒气
            target.rage = Math.min(100, target.rage + 5);
            
            // === 触发动效 ===
            setTimeout(() => {
                const heroElements = document.querySelectorAll('.hero-unit');
                const targetIndex = battleState.heroes.findIndex(h => h.id === target.id);
                if (heroElements[targetIndex]) {
                    const targetEl = heroElements[targetIndex];
                    
                    // 伤害飘字
                    showDamageNumber(targetEl, damage, 'damage');
                    
                    // 受击抖动
                    shakeElement(targetEl);
                    
                    // 闪烁效果
                    flashElement(targetEl);
                    
                    // 如果击杀，触发死亡特效
                    if (target.hp <= 0) {
                        setTimeout(() => showHeroDeathEffect(targetEl), 200);
                    }
                }
            }, 100);
            
            addBattleLog(`${enemy.icon}${enemy.name} 对 ${target.icon}${target.name} 发动攻击，造成 ${damage} 点伤害！`, 'enemy-attack');
            
            // 检查英雄死亡
            if (target.hp <= 0) {
                addBattleLog(`${target.icon}${target.name} 倒下了...`, 'hero-death');
            }
            
            // 标记为已行动
            battleState.actionQueue.find(a => a.id === enemyId).acted = true;
            
            renderBattle();
            
            // 检查战斗是否结束
            setTimeout(() => {
                if (battleState.heroes.every(h => h.hp <= 0)) {
                    endBattle();
                } else {
                    executeNextAction();
                }
            }, 600);
        }
        
        // 计算伤害
        function calculateDamage(atk, def, isCrit = false) {
            const baseDamage = Math.max(1, atk - def);
            const variance = Math.floor(Math.random() * 5) - 2;
            let damage = Math.max(1, baseDamage + variance);
            if (isCrit) {
                damage = Math.floor(damage * 1.5); // 暴击150%伤害
            }
            return damage;
        }
        
        // 添加战斗日志
        function addBattleLog(text, type) {
            battleState.logs.push({ text, type });
            if (battleState.logs.length > 50) {
                battleState.logs.shift();
            }
        }
        
        // 渲染战斗界面
        function renderBattle() {
            // 更新回合数
            document.getElementById('battleTurn').textContent = `回合 ${battleState.turn}`;
            
            // 复制英雄数据到战斗状态
            battleState.heroes = [...battleHeroes];
            
            // 渲染敌人区域
            const enemyArea = document.getElementById('enemyArea');
            enemyArea.innerHTML = battleState.enemies.map(e => `
                <div class="enemy-unit ${e.hp <= 0 ? 'dead' : ''}">
                    <div class="enemy-icon">${e.icon}</div>
                    <div class="enemy-name">${e.name}</div>
                    <div class="enemy-hp-bar">
                        <div class="enemy-hp-fill" style="width:${(e.hp/e.maxHp)*100}%"></div>
                    </div>
                    <div class="enemy-hp-text">${e.hp}/${e.maxHp}</div>
                </div>
            `).join('');
            
            // 渲染行动条
            const actionBarArea = document.getElementById('actionBarArea');
            const currentAction = battleState.actionQueue[battleState.currentIndex];
            
            actionBarArea.innerHTML = battleState.actionQueue.map((action, idx) => {
                const isHero = action.type === 'hero';
                const unit = isHero ? 
                    battleState.heroes.find(h => h.id === action.id) : 
                    battleState.enemies.find(e => e.id === action.id);
                const isCurrent = idx === battleState.currentIndex;
                const isDead = unit.hp <= 0;
                
                return `
                    <div class="action-slot ${action.type} ${isCurrent ? 'current' : ''} ${action.acted || isDead ? 'acted' : ''}">
                        <div class="action-icon">${unit.icon}</div>
                        <div class="action-name">${unit.name}</div>
                    </div>
                `;
            }).join('<span class="action-arrow">→</span>');
            
            // 渲染英雄区域
            const heroArea = document.getElementById('heroArea');
            const currentHeroAction = currentAction && currentAction.type === 'hero' ? currentAction.id : null;
            
            heroArea.innerHTML = battleState.heroes.map(h => {
                const isDead = h.hp <= 0;
                const isRageReady = h.rage >= 100;
                const isCurrentTurn = h.id === currentHeroAction;
                const isClickable = !isDead && isRageReady && battleState.isRunning;
                
                return `
                    <div class="hero-unit ${isDead ? 'dead' : ''} ${isRageReady ? 'ready' : ''} ${isCurrentTurn ? 'current-turn' : ''} ${isRageReady ? 'rage-ready-glow' : ''}"
                         ${isClickable ? `onclick="heroUseSkill('${h.id}')"` : ''}>
                        <div class="hero-icon ${isRageReady ? 'star-blink' : ''}">${h.icon}</div>
                        <div class="hero-name">${h.name}</div>
                        <div class="hero-hp-bar">
                            <div class="hero-hp-fill" style="width:${(h.hp/h.maxHp)*100}%"></div>
                        </div>
                        <div class="hero-hp-text">${h.hp}/${h.maxHp}</div>
                        <div class="rage-bar">
                            <div class="rage-fill rage-fill-animate ${h.rage >= 100 ? 'full' : ''}" style="width:${h.rage}%"></div>
                        </div>
                        <div class="rage-text ${h.rage >= 100 ? 'full' : ''} ${isRageReady ? 'star-blink' : ''}">
                            ${h.rage >= 100 ? '★ 点击放技能' : `怒气 ${h.rage}/100`}
                        </div>
                    </div>
                `;
            }).join('');
            
            // 渲染战斗日志
            const battleLog = document.getElementById('battleLog');
            battleLog.innerHTML = battleState.logs.slice(-8).map(log => `
                <div class="battle-log-entry ${log.type}">${log.text}</div>
            `).join('');
            battleLog.scrollTop = battleLog.scrollHeight;
            
            // 渲染操作按钮
            const battleActions = document.getElementById('battleActions');
            battleActions.innerHTML = `
                <button class="battle-btn retreat" onclick="doBattleRetreat()">撤退</button>
            `;
        }
        
        // 结束战斗
        function endBattle() {
            battleState.isRunning = false;
            
            // 检查胜负
            const allEnemiesDead = battleState.enemies.every(e => e.hp <= 0);
            const allHeroesDead = battleState.heroes.every(h => h.hp <= 0);
            
            if (allEnemiesDead) {
                // 胜利
                battleVictory();
            } else if (allHeroesDead) {
                // 失败
                battleDefeat();
            }
        }
        
        // 战斗胜利
        function battleVictory() {
            playVictorySound(); // 胜利音效
            gameState.battleCount++;
            gameState.killedEnemies += battleState.enemies.filter(e => e.hp <= 0).length;
            gameState.objectives.battles.current++;
            
            // 计算总HP损失
            let totalDamage = 0;
            battleState.heroes.forEach(h => {
                totalDamage += (h.maxHp - h.hp);
            });
            
            // 疲劳消耗=HP损失
            gameState.fatigue = Math.max(0, gameState.fatigue - totalDamage);
            
            // 英雄HP回满并显示治疗特效
            battleState.heroes.forEach((h, idx) => {
                const healAmount = h.maxHp - h.hp;
                h.hp = h.maxHp;
                
                // 延迟显示治疗特效
                if (healAmount > 0) {
                    setTimeout(() => {
                        const heroElements = document.querySelectorAll('.hero-unit');
                        if (heroElements[idx]) {
                            showHealEffect(heroElements[idx], healAmount);
                        }
                    }, idx * 150);
                }
            });
            battleHeroes = [...battleState.heroes];
            
            // 奖励金币
            const goldReward = battleState.isBoss ? 100 : 50;
            gameState.gold += goldReward;
            
            const isPerfect = gameState.killedEnemies >= gameState.totalEnemies;
            const bonusGold = isPerfect ? 100 : 0;
            gameState.gold += bonusGold;
            
            // === 战斗胜利特效 ===
            const battleModal = document.getElementById('battleModal');
            battleModal.classList.add('battle-victory-glow');
            
            // 显示胜利界面
            document.getElementById('battleLog').innerHTML += `
                <div class="battle-log-entry" style="text-align:center;font-size:14px;color:#6bff6b;padding:10px;animation:pulse-glow 0.5s;">
                    🎉 战斗胜利！获得 ${goldReward} 金币！
                </div>
            `;
            
            setTimeout(() => {
                battleModal.classList.remove('battle-victory-glow');
                document.getElementById('battleModal').classList.remove('active');
                
                // 如果是Boss战（星棺）
                if (battleState.isBoss) {
                    completeLevel3(isPerfect);
                } else {
                    addLog(`战斗胜利！获得 ${goldReward} 金币`, 'success');
                    updateStats();
                    renderParty();
                    saveGame();
                }
            }, 1500);
        }
        
        // 战斗失败
        function battleDefeat() {
            // === 战斗失败特效 ===
            const battleModal = document.getElementById('battleModal');
            battleModal.classList.add('battle-defeat-dark');
            
            document.getElementById('battleLog').innerHTML += `
                <div class="battle-log-entry" style="text-align:center;font-size:14px;color:#ff6b6b;padding:10px;">
                    💀 队伍全军覆没...
                </div>
            `;
            
            setTimeout(() => {
                battleModal.classList.remove('battle-defeat-dark');
                document.getElementById('battleModal').classList.remove('active');
                addLog('战斗失败...勉强撤退', 'danger');
                
                // 撤退惩罚
                gameState.fatigue = Math.max(0, gameState.fatigue - 15);
                gameState.hp = gameState.maxHp;
                
                // 英雄HP回满
                battleState.heroes.forEach(h => {
                    h.hp = h.maxHp;
                    h.rage = 0;
                });
                battleHeroes = [...battleState.heroes];
                
                updateStats();
                renderParty();
            }, 1500);
        }
        
        // 撤退
        function doBattleRetreat() {
            battleState.isRunning = false;
            document.getElementById('battleModal').classList.remove('active');
            
            // 英雄HP回满
            battleState.heroes.forEach(h => {
                h.hp = h.maxHp;
                h.rage = 0;
            });
            battleHeroes = [...battleState.heroes];
            
            // 撤退惩罚
            gameState.fatigue = Math.max(0, gameState.fatigue - 10);
            addLog('撤退成功，消耗 10 点疲劳度', 'info');
            updateStats();
            renderParty();
        }
        
        // 第三关通关
        function completeLevel3(isPerfect) {
            saveLevelProgress(currentLevel);
            const modal = document.getElementById('missionModal');
            const content = document.getElementById('missionContent');
            
            content.innerHTML = `
                <div class="mechanism-title">🎉 关卡完成</div>
                <div style="text-align:center;padding:20px;">
                    <div style="font-size:48px;">⚰️</div>
                    <div style="color:#d4af37;margin-top:10px;">星陨古墓</div>
                </div>
                <div style="background:rgba(0,0,0,0.3);padding:15px;border-radius:8px;">
                    <div style="display:flex;justify-content:space-between;margin:5px 0;">
                        <span>击杀敌人</span>
                        <span>${gameState.killedEnemies}/${gameState.totalEnemies}</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;margin:5px 0;">
                        <span>剩余疲劳度</span>
                        <span>${gameState.fatigue}/${gameState.maxFatigue}</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;margin:5px 0;color:#ffd700;">
                        <span>获得金币</span>
                        <span>+${150 + (isPerfect ? 100 : 0)}</span>
                    </div>
                </div>
                ${isPerfect ? '<div style="color:#6bff6b;text-align:center;margin-top:10px;">⭐ 完美通关！</div>' : ''}
                <button class="close-btn" onclick="exitToLevelSelect();closeMissionModal();" style="margin-top:15px;">返回关卡选择</button>
            `;
            
            modal.classList.add('active');
            updateStats();
            saveGame();
        }
        
        // 初始化
        window.addEventListener('resize', scrollToPlayer);
        
        window.addEventListener('DOMContentLoaded', function() {
            // 初始化英雄数据
            initBattleHeroes();
            renderParty();
            updateLevelCards();
            
            // 移动端兼容：动态绑定关卡卡片点击事件
            document.querySelectorAll('.level-card').forEach((card, index) => {
                const levelId = index + 1;
                // 同时绑定 click 和 touchend 事件
                card.addEventListener('click', function(e) {
                    e.preventDefault();
                    showMissionIntro(levelId);
                });
                card.addEventListener('touchend', function(e) {
                    e.preventDefault();
                    showMissionIntro(levelId);
                });
            });
            
            console.log('关卡卡片事件绑定完成，共', document.querySelectorAll('.level-card').length, '个');
        });
    </script>
</body>
</html>
