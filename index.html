<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>苍穹劫·摸金传人</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }
        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            margin: 0 auto;
            overflow: hidden;
        }
        .scene-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://www.coze.cn/s/NgQ87Mm-NNA/') center/cover no-repeat;
            z-index: 1;
        }
        .scene-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(10,10,20,0.4) 0%, rgba(10,10,20,0.2) 30%, rgba(10,10,20,0.3) 70%, rgba(10,10,20,0.7) 100%);
            z-index: 2;
            pointer-events: none;
        }
        .top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: linear-gradient(180deg, rgba(15,10,25,0.95) 0%, rgba(15,10,25,0.7) 80%, transparent 100%);
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .player-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            background: linear-gradient(135deg, #2a2040, #1a1530);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .player-details { flex: 1; }
        .player-name { font-size: 14px; color: #fff; font-weight: bold; }
        .player-level { font-size: 11px; color: #888; }
        .resources { display: flex; flex-direction: column; gap: 4px; }
        .resource-row { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #fff; }
        
        .scene-entries {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 10;
        }
        .entry-point {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .entry-point:active { transform: scale(0.95); }
        .entry-dungeon {
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 80px;
        }
        .entry-dungeon::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 80px;
            background: radial-gradient(ellipse, rgba(212,175,55,0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: glowPulse 2s ease-in-out infinite;
        }
        .entry-icon { font-size: 42px; margin-bottom: 5px; filter: drop-shadow(0 0 8px rgba(212,175,55,0.5)); }
        .entry-label { font-size: 13px; color: #d4af37; text-shadow: 0 0 10px rgba(0,0,0,0.8); font-weight: bold; letter-spacing: 2px; }
        .entry-camp { top: 32%; left: 5%; width: 90px; height: 80px; }
        .entry-camp .entry-icon { font-size: 36px; }
        .entry-camp .entry-label { font-size: 11px; color: #ffc864; }
        .entry-summon { top: 25%; right: 3%; width: 100px; height: 90px; }
        .entry-summon::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            background: radial-gradient(circle, rgba(128,90,213,0.4) 0%, transparent 70%);
            border-radius: 50%;
            animation: purpleGlow 1.5s ease-in-out infinite;
        }
        .entry-summon .entry-icon { font-size: 38px; filter: drop-shadow(0 0 10px rgba(128,90,213,0.6)); }
        .entry-summon .entry-label { font-size: 11px; color: #b088ff; }
        .entry-shop { bottom: 12%; right: 8%; width: 80px; height: 70px; }
        .entry-shop .entry-icon { font-size: 30px; }
        .entry-shop .entry-label { font-size: 10px; color: #c8a064; }
        .entry-quest { bottom: 12%; left: 8%; width: 75px; height: 65px; }
        .entry-quest .entry-icon { font-size: 28px; }
        .entry-quest .entry-label { font-size: 10px; color: #b4b4a0; }
        
        .bottom-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 100;
            background: linear-gradient(0deg, rgba(15,10,25,0.95) 0%, rgba(15,10,25,0.8) 80%, transparent 100%);
            padding: 15px 20px 25px;
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }
        .quick-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 10px 5px;
            background: rgba(40,30,60,0.6);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .quick-btn:active { background: rgba(60,50,90,0.8); border-color: #d4af37; transform: translateY(-2px); }
        .quick-btn-icon { font-size: 24px; color: #d4af37; }
        .quick-btn-text { font-size: 11px; color: #aaa; }
        
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: linear-gradient(135deg, #1a1530, #2a2040);
            border: 1px solid #d4af37;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            max-width: 300px;
        }
        .modal-icon { font-size: 48px; margin-bottom: 15px; }
        .modal-title { font-size: 18px; color: #d4af37; margin-bottom: 10px; font-weight: bold; }
        .modal-desc { font-size: 13px; color: #8a8a9a; margin-bottom: 20px; }
        .modal-btn {
            background: linear-gradient(135deg, #d4af37 0%, #b8960c 100%);
            border: none;
            border-radius: 20px;
            padding: 10px 30px;
            font-size: 14px;
            color: #1a1530;
            cursor: pointer;
            font-weight: bold;
        }
        
        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        }
        @keyframes purpleGlow {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.3); }
        }
        .dungeon-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 150px; height: 100px;
            background: radial-gradient(ellipse, rgba(212,175,55,0.4) 0%, transparent 60%);
            animation: dungeonBreath 3s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes dungeonBreath {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="scene-bg"></div>
        <div class="scene-overlay"></div>
        
        <div class="top-bar">
            <div class="player-avatar">🧙</div>
            <div class="player-details">
                <div class="player-name">摸金校尉</div>
                <div class="player-level">Lv.1</div>
            </div>
            <div class="resources">
                <div class="resource-row"><span>💰</span><span>12,580</span></div>
                <div class="resource-row"><span>💎</span><span>350</span></div>
            </div>
        </div>
        
        <div class="scene-entries">
            <div class="entry-point entry-dungeon" onclick="goToExplore()">
                <div class="dungeon-glow"></div>
                <span class="entry-icon">🏛️</span>
                <span class="entry-label">探 险</span>
            </div>
            <div class="entry-point entry-camp" onclick="showDevModal('角色系统')">
                <span class="entry-icon">⛺</span>
                <span class="entry-label">角 色</span>
            </div>
            <div class="entry-point entry-summon" onclick="showDevModal('召唤系统')">
                <span class="entry-icon">🔮</span>
                <span class="entry-label">召 唤</span>
            </div>
            <div class="entry-point entry-shop" onclick="showDevModal('商城系统')">
                <span class="entry-icon">🏺</span>
                <span class="entry-label">商 城</span>
            </div>
            <div class="entry-point entry-quest" onclick="showDevModal('任务系统')">
                <span class="entry-icon">📜</span>
                <span class="entry-label">任 务</span>
            </div>
        </div>
        
        <div class="bottom-bar">
            <div class="quick-btn" onclick="showDevModal('角色')">
                <span class="quick-btn-icon">👤</span>
                <span class="quick-btn-text">角色</span>
            </div>
            <div class="quick-btn" onclick="showDevModal('编队')">
                <span class="quick-btn-icon">⚔️</span>
                <span class="quick-btn-text">编队</span>
            </div>
            <div class="quick-btn" onclick="showDevModal('背包')">
                <span class="quick-btn-icon">🎒</span>
                <span class="quick-btn-text">背包</span>
            </div>
            <div class="quick-btn" onclick="showDevModal('设置')">
                <span class="quick-btn-icon">⚙️</span>
                <span class="quick-btn-text">设置</span>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="devModal">
        <div class="modal-content">
            <div class="modal-icon">🔒</div>
            <div class="modal-title" id="modalTitle">系统开发中</div>
            <div class="modal-desc">该功能正在开发中<br>敬请期待...</div>
            <button class="modal-btn" onclick="hideModal()">确 定</button>
        </div>
    </div>
    
    <script>
        function goToExplore() {
            window.location.href = 'game.html';
        }
        function showDevModal(title) {
            document.getElementById('modalTitle').textContent = title + '开发中';
            document.getElementById('devModal').classList.add('active');
        }
        function hideModal() {
            document.getElementById('devModal').classList.remove('active');
        }
        document.getElementById('devModal').addEventListener('click', function(e) {
            if (e.target === this) hideModal();
        });
    </script>
</body>
</html>
