<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>《苍穹劫》地宫探索 Demo v7 - 新战斗系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1a 100%);
            height: 100vh;
            color: #c0c0c0;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        /* 主容器 */
        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }
        
        /* ========== 关卡选择界面 ========== */
        .level-select-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, #0a0a15 0%, #1a1a2e 50%, #0f0f1a 100%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        
        .level-select-screen.hidden {
            display: none;
        }
        
        .game-title {
            text-align: center;
            padding: 30px 0;
        }
        
        .game-title h1 {
            font-size: 28px;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            margin-bottom: 8px;
        }
        
        .game-title .subtitle {
            font-size: 12px;
            color: #666;
        }
        
        .level-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
            padding-left: 5px;
            border-left: 3px solid #d4af37;
        }
        
        .level-card {
            background: rgba(30, 20, 50, 0.8);
            border: 1px solid #3a2a5a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .level-card:hover, .level-card:active {
            background: rgba(50, 40, 70, 0.9);
            border-color: #d4af37;
            transform: translateY(-2px);
        }
        
        .level-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .level-card.locked:hover {
            transform: none;
            background: rgba(30, 20, 50, 0.8);
            border-color: #3a2a5a;
        }
        
        .level-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .level-name {
            font-size: 18px;
            color: #d4af37;
            font-weight: bold;
        }
        
        .level-tag {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            background: #2a4a3a;
            color: #6bff6b;
        }
        
        .level-tag.new {
            background: #4a3a5a;
            color: #ff6bff;
        }
        
        .level-tag.combat {
            background: linear-gradient(135deg, #8b3a3a, #6b2a2a);
            color: #ff8888;
        }
        
        .level-desc {
            font-size: 13px;
            color: #999;
            line-height: 1.6;
        }
        
        /* ========== 游戏界面 ========== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(20, 15, 30, 0.95);
            border-bottom: 1px solid #3a2a5a;
            flex-shrink: 0;
        }
        
        .floor-info {
            font-size: 14px;
            color: #d4af37;
            font-weight: bold;
        }
        
        .fatigue-container {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
        }
        
        .hp-bar-wrapper {
            width: 120px;
            height: 12px;
            background: #2a2040;
            border-radius: 6px;
            overflow: hidden;
        }
        
        .hp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ff8888);
            transition: width 0.3s;
        }
        
        .hp-text {
            font-size: 12px;
            color: #ff6b6b;
            min-width: 45px;
        }
        
        .torch-info {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            color: #ffa500;
        }
        
        .objective-bar {
            background: rgba(30, 20, 40, 0.95);
            padding: 8px 15px;
            border-bottom: 1px solid #3a2a5a;
            flex-shrink: 0;
        }
        
        .objective-title {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }
        
        .objective-content {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #d4af37;
        }
        
        .objective-icon {
            font-size: 16px;
        }
        
        .objective-progress {
            font-size: 12px;
            color: #6bcfff;
        }
        
        .map-section {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: rgba(10, 10, 20, 0.9);
        }
        
        .map-viewport {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .map-scroll-container {
            position: absolute;
            transition: transform 0.15s ease-out;
        }
        
        #gameMap {
            display: grid;
            gap: 1px;
            padding: 5px;
        }
        
        .cell {
            width: 40px;
            height: 40px;
            background: #1a1a25;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid transparent;
        }
        
        .cell.fog { background: #0a0a10; color: #333; }
        .cell.fog:active { background: #151520; }
        .cell.player {
            background: linear-gradient(135deg, #4a6fa5, #3a5a8a);
            color: #fff;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(74, 111, 165, 0.6);
            cursor: default;
            border: 2px solid #6a9fd5;
        }
        .cell.wall { background: #2a2a35; color: #444; cursor: default; }
        .cell.enemy { background: #8b3a3a; color: #ff6b6b; }
        .cell.chest { background: #3a3a2a; color: #ffd700; }
        .cell.mechanism-luck { background: #2a4a3a; color: #6bff6b; }
        .cell.mechanism-knowledge { background: #3a4a5a; color: #6bcfff; }
        .cell.mechanism-hero { background: #4a3a5a; color: #ff6bff; }
        .cell.boss { background: #5a2a5a; color: #ff00ff; font-weight: bold; }
        .cell.stairs { background: linear-gradient(135deg, #2a4a3a, #3a5a4a); color: #6bff6b; border: 2px solid #4a8a5a; }
        .cell.story { background: #3a3a4a; color: #c0c0c0; }
        .cell.coffin { background: linear-gradient(135deg, #4a3a2a, #6a5a4a); color: #ffd700; border: 2px solid #d4af37; animation: coffin-glow 2s infinite; }
        .cell.buff-attack { background: linear-gradient(135deg, #5a3a3a, #7a4a4a); color: #ff6b6b; border: 1px solid #ff6b6b; }
        .cell.buff-fatigue { background: linear-gradient(135deg, #2a4a3a, #3a5a4a); color: #6bff6b; border: 1px solid #6bff6b; }
        
        @keyframes coffin-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
            50% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.6); }
        }
        
        .cell:active:not(.player):not(.wall) {
            transform: scale(0.95);
        }
        
        .bottom-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 10px 15px;
            background: rgba(20, 15, 30, 0.95);
            border-top: 1px solid #3a2a5a;
            flex-shrink: 0;
        }
        
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 5px;
            background: rgba(60, 50, 80, 0.8);
            border: 1px solid #4a4a6a;
            border-radius: 8px;
            color: #ddd;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .action-btn:active {
            background: rgba(80, 70, 100, 0.9);
            transform: scale(0.95);
        }
        
        .action-btn .btn-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }
        
        .action-btn .btn-label {
            font-size: 10px;
            color: #888;
        }
        
        .resources-bar {
            display: flex;
            justify-content: space-around;
            padding: 8px 15px;
            background: rgba(25, 18, 35, 0.95);
            border-top: 1px solid #3a2a5a;
            flex-shrink: 0;
        }
        
        .resource-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }
        
        .resource-icon { font-size: 16px; }
        .gold-value { color: #ffd700; }
        .mechanism-value { color: #6bff6b; }
        
        /* ========== 弹窗样式 ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #2a2a3e 100%);
            border: 2px solid #d4af37;
            border-radius: 12px;
            padding: 20px;
            max-width: 450px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .mechanism-image {
            width: 100%;
            height: 120px;
            background: #0a0a15;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            font-size: 48px;
        }
        
        .mechanism-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .mechanism-type.luck { background: #2a4a3a; color: #6bff6b; }
        .mechanism-type.knowledge { background: #3a4a5a; color: #6bcfff; }
        .mechanism-type.hero { background: #4a3a5a; color: #ff6bff; }
        .mechanism-type.story { background: #3a3a4a; color: #c0c0c0; }
        
        .mechanism-title {
            font-size: 18px;
            color: #d4af37;
            margin-bottom: 8px;
        }
        
        .mechanism-desc {
            color: #aaa;
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        
        .mechanism-question {
            background: rgba(50, 40, 70, 0.5);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            line-height: 1.5;
        }
        
        .hero-hint {
            background: rgba(255, 165, 0, 0.1);
            border: 1px solid #ffa500;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #ffa500;
        }
        
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .option-btn {
            padding: 12px 15px;
            background: rgba(60, 50, 80, 0.8);
            border: 1px solid #4a4a6a;
            border-radius: 8px;
            color: #ddd;
            font-size: 13px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        
        .option-btn:active {
            background: rgba(80, 70, 100, 0.9);
            border-color: #d4af37;
        }
        
        .option-btn .option-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            margin-left: 8px;
        }
        
        .option-btn .option-tag.matched { background: #2a4a3a; color: #6bff6b; }
        .option-btn .option-tag.unmatched { background: #4a3a3a; color: #ff6b6b; }
        
        .result-box {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .result-box.success { background: rgba(107, 255, 107, 0.1); border: 1px solid #6bff6b; color: #6bff6b; }
        .result-box.partial { background: rgba(255, 200, 100, 0.1); border: 1px solid #ffc864; color: #ffc864; }
        .result-box.fail { background: rgba(255, 107, 107, 0.1); border: 1px solid #ff6b6b; color: #ff6b6b; }
        
        .close-btn {
            margin-top: 15px;
            padding: 12px 20px;
            background: #d4af37;
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        
        /* 队伍/日志抽屉 */
        .party-drawer, .log-drawer {
            position: fixed;
            background: rgba(20, 15, 30, 0.98);
            z-index: 900;
            transition: transform 0.3s ease;
            overflow-y: auto;
            padding: 15px;
        }
        
        .party-drawer {
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            border-left: 2px solid #3a2a5a;
        }
        
        .party-drawer.open {
            right: 0;
        }
        
        .log-drawer {
            bottom: -250px;
            left: 0;
            right: 0;
            height: 250px;
            border-top: 2px solid #3a2a5a;
        }
        
        .log-drawer.open {
            bottom: 0;
        }
        
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #3a2a5a;
        }
        
        .drawer-title {
            font-size: 16px;
            color: #d4af37;
        }
        
        .drawer-close {
            font-size: 24px;
            color: #888;
            cursor: pointer;
        }
        
        .party-member {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(40, 30, 60, 0.5);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .member-avatar {
            width: 40px;
            height: 40px;
            background: #3a3a5a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .member-info { flex: 1; }
        .member-name { font-size: 13px; color: #ddd; font-weight: bold; }
        .member-trait { font-size: 11px; color: #ffa500; }
        .member-hp { font-size: 11px; color: #888; margin-top: 2px; }
        
        .hp-bar-mini {
            width: 100%;
            height: 4px;
            background: #2a2040;
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }
        
        .hp-fill-mini {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ff8888);
        }
        
        .log-entry {
            padding: 6px 0;
            border-bottom: 1px solid #2a2a3a;
            font-size: 12px;
            color: #aaa;
        }
        
        .log-entry.success { color: #6bff6b; }
        .log-entry.danger { color: #ff6b6b; }
        .log-entry.info { color: #6bcfff; }
        .log-entry.gold { color: #ffd700; }
        .log-entry.story { color: #d4af37; font-style: italic; }
        
        /* ========== 战斗系统样式 ========== */
        .battle-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 10px;
        }
        
        .battle-modal.active {
            display: flex;
        }
        
        .battle-header {
            text-align: center;
            padding: 8px;
            background: rgba(30, 20, 50, 0.8);
            border-radius: 8px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        
        .battle-title {
            font-size: 16px;
            color: #d4af37;
            font-weight: bold;
        }
        
        .battle-turn {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        
        /* 敌人区域 */
        .enemy-area {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            background: rgba(40, 20, 30, 0.6);
            border-radius: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        
        .enemy-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            background: rgba(60, 30, 40, 0.5);
            border-radius: 10px;
            min-width: 80px;
            transition: all 0.3s;
        }
        
        .enemy-unit.dead {
            opacity: 0.3;
            filter: grayscale(1);
        }
        
        .enemy-unit.target {
            border: 2px solid #ff6b6b;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.4);
        }
        
        .enemy-icon {
            font-size: 32px;
            margin-bottom: 5px;
        }
        
        .enemy-name {
            font-size: 11px;
            color: #ff8888;
            margin-bottom: 5px;
        }
        
        .enemy-hp-bar {
            width: 60px;
            height: 6px;
            background: #2a2040;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 3px;
        }
        
        .enemy-hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b3a3a, #ff6b6b);
            transition: width 0.3s;
        }
        
        .enemy-hp-text {
            font-size: 10px;
            color: #aaa;
        }
        
        /* 行动条区域 */
        .action-bar-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 10px;
            background: rgba(30, 30, 50, 0.6);
            border-radius: 8px;
            margin-bottom: 10px;
            overflow-x: auto;
            flex-shrink: 0;
            min-height: 70px;
        }
        
        .action-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px 8px;
            background: rgba(40, 40, 60, 0.5);
            border-radius: 8px;
            min-width: 50px;
            transition: all 0.3s;
        }
        
        .action-slot.hero {
            background: rgba(60, 60, 100, 0.5);
        }
        
        .action-slot.enemy {
            background: rgba(80, 40, 40, 0.5);
        }
        
        .action-slot.current {
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            border: 2px solid #d4af37;
        }
        
        .action-slot.acted {
            opacity: 0.4;
            filter: grayscale(0.5);
        }
        
        .action-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }
        
        .action-slot.current .action-icon {
            font-size: 26px;
            animation: pulse-glow 1s infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5)); }
            50% { filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.9)); }
        }
        
        .action-name {
            font-size: 9px;
            color: #888;
        }
        
        .action-arrow {
            color: #555;
            font-size: 14px;
            margin: 0 2px;
        }
        
        /* 英雄区域 */
        .hero-area {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
            background: rgba(20, 30, 50, 0.6);
            border-radius: 12px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        
        .hero-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            background: rgba(40, 50, 80, 0.5);
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .hero-unit.dead {
            opacity: 0.4;
            filter: grayscale(0.8);
            cursor: not-allowed;
        }
        
        .hero-unit.ready {
            border: 2px solid #6bff6b;
            box-shadow: 0 0 10px rgba(107, 255, 107, 0.4);
            animation: rage-ready 1s infinite;
        }
        
        @keyframes rage-ready {
            0%, 100% { box-shadow: 0 0 10px rgba(107, 255, 107, 0.4); }
            50% { box-shadow: 0 0 20px rgba(107, 255, 107, 0.7); }
        }
        
        .hero-unit.current-turn {
            border: 2px solid #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }
        
        .hero-icon {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .hero-name {
            font-size: 11px;
            color: #6bcfff;
            margin-bottom: 5px;
        }
        
        .hero-hp-bar {
            width: 70px;
            height: 8px;
            background: #2a2040;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 3px;
        }
        
        .hero-hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a6fa5, #6b9fd5);
            transition: width 0.3s;
        }
        
        .hero-hp-text {
            font-size: 10px;
            color: #aaa;
            margin-bottom: 5px;
        }
        
        /* 怒气条 */
        .rage-bar {
            width: 70px;
            height: 6px;

    <script>
        // ==================== 英雄配置（新战斗系统） ====================

        };

        // ==================== 关卡配置 ====================
        const LEVELS = {
            1: {
                name: '古老墓穴',

                story: `<p>你收到消息，城外山中有一座<span class="highlight">被遗忘的古墓</span>...</p>`,

                objectives: [

                    { icon: '🔧', title: '破解机关 x4', reward: '+120金币' }
                ]
            },
            3: {
                name: '星陨古墓',
                type: 'structured',
                mapSize: 16,
                story: `<p>传说<span class="highlight">星陨古墓</span>是一颗坠落天星砸出的深坑...</p>
                <p style="margin-top:12px;color:#ffcc00;">【新战斗系统测试关卡】</p>
                <p style="margin-top:8px;font-size:11px;color:#888;">• 英雄独立血条<br>• 行动条系统<br>• 怒气技能系统<br>• 自动普攻</p>`,
                objectives: [
                    { icon: '⚰️', title: '打开星棺', reward: '主要目标' },
                    { icon: '👹', title: '击败所有怪物', reward: '完美通关' }
                ],
                hasCombat: true,
                mechanismPool: {
                    luck: ['星辰宝箱'],
                    knowledge: ['星象石碑'],
                    hero: ['陨铁门']
                },
                storyFragments: [
                    { name: '陨石碎片', icon: '🌌', text: '一块散发着微光的陨石碎片...' },
                    { name: '星图残卷', icon: '📜', text: '残卷上绘制着十二星宫的图案...' }
                ]
            }
        };
        
        // ==================== 游戏状态 ====================
        let currentLevel = 1;
        const gameState = {
            mapSize: 20,
            map: [],
            playerPos: { x: 1, y: 1 },
            hp: 100,
            maxHp: 100,
            gold: 0,
            mechanismSolved: 0,
            mechanismTotal: 0,
            battleCount: 0,
            startTime: null,
            storyFound: 0,
            discoveredStories: [],
            usedMechanisms: { luck: [], knowledge: [], hero: [] },
            objectives: null,
            fatigue: 100,
            maxFatigue: 100,
            attackBuff: 0,
            totalEnemies: 0,
            killedEnemies: 0
        };
        
        // 队伍数据（新战斗系统：使用详细属性）
        let battleHeroes = [];
        
        // 机关数据（简化版）
        const mechanismsRandom = {
            luck: [
                { name: '神秘宝箱', icon: '🎁', desc: '一个看起来很可疑的宝箱...', question: '要打开这个宝箱吗？',
                  options: [
                      { text: 'A. 直接打开', result: 'random', successRate: 0.5 },
                      { text: 'B. 小心检查后打开', result: 'safe' },
                      { text: 'C. 放弃离开', result: 'skip' }
                  ]
                }
            ],
            knowledge: [
                { name: '天干地支锁', icon: '🔐', desc: '石门上刻着古老的符号...', question: '甲、乙、丙、丁之后是？',
                  options: [
                      { text: 'A. 戊', correct: true },
                      { text: 'B. 子', correct: false },
                      { text: 'C. 己', correct: false }
                  ]
                }
            ],
            hero: [
                { name: '铁闸门', icon: '🚪', desc: '一道锈迹斑斑的铁门挡住去路...', question: '如何通过？',
                  options: [
                      { text: 'A. 用力推开', trait: 'strength' },
                      { text: 'B. 寻找机关', trait: 'mechanism' },
                      { text: 'C. 硬闯过去', trait: null }
                  ]
                }
            ]
        };
        
        // ==================== 存档系统 ====================
        const SAVE_KEY = 'cangqiongjie_v7_save';
        const LEVEL_PROGRESS_KEY = 'cangqiongjie_level_progress';
        
        function saveGame() {
            const saveData = {
                levelId: currentLevel,
                state: { ...gameState }
            };
            try {
                localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
            } catch (e) { console.error('保存失败:', e); }
        }
        
        function loadGame() {
            try {
                const saveStr = localStorage.getItem(SAVE_KEY);
                return saveStr ? JSON.parse(saveStr) : null;
            } catch (e) { return null; }
        }
        
        function clearSave() { localStorage.removeItem(SAVE_KEY); }
        
        function resetAllData() {
            if (confirm('确定要重置所有数据吗？')) {
                localStorage.removeItem(SAVE_KEY);
                localStorage.removeItem(LEVEL_PROGRESS_KEY);
                location.reload();
            }
        }
        
        // ==================== UI 逻辑 ====================
        function showMissionIntro(levelId) {
            const level = LEVELS[levelId];
            currentLevel = levelId;
            
            const content = document.getElementById('missionContent');
            content.innerHTML = `
                <div class="mechanism-title">${level.name}</div>
                <div style="background:rgba(20,15,30,0.8);border-radius:8px;padding:15px;margin-bottom:15px;font-size:12px;line-height:1.6;">
                    ${level.story}
                </div>
                <div style="margin-bottom:15px;">
                    <div style="font-size:12px;color:#888;margin-bottom:8px;">🎯 任务目标</div>
                    ${level.objectives.map(obj => `
                        <div style="display:flex;align-items:center;gap:8px;padding:8px;background:rgba(40,30,60,0.5);border-radius:6px;margin-bottom:5px;">
                            <span>${obj.icon}</span>
                            <span style="flex:1;font-size:12px;">${obj.title}</span>
                            <span style="font-size:10px;color:#ffa500;">${obj.reward}</span>
                        </div>
                    `).join('')}
                </div>
                <button class="close-btn" onclick="startLevel(${levelId})">开始探索</button>
                <button class="close-btn" style="background:transparent;border:1px solid #4a4a6a;color:#888;margin-top:8px;" onclick="closeMissionModal()">返回</button>
            `;
            document.getElementById('missionModal').classList.add('active');
        }
        
        function closeMissionModal() {
            document.getElementById('missionModal').classList.remove('active');
        }
        
        function startLevel(levelId) {
            closeMissionModal();
            document.getElementById('levelSelectScreen').classList.add('hidden');
            document.getElementById('gameContainer').style.display = 'flex';
            initGame(levelId);
        }
        
        function exitToLevelSelect() {
            document.getElementById('gameContainer').style.display = 'none';
            document.getElementById('levelSelectScreen').classList.remove('hidden');
        }
        
        // ==================== 游戏核心 ====================
        function initGame(levelId) {
            const level = LEVELS[levelId];
            
            gameState.mapSize = level.mapSize;
            gameState.playerPos = { x: 1, y: 1 };
            gameState.hp = 100;
            gameState.gold = 0;
            gameState.mechanismSolved = 0;
            gameState.mechanismTotal = 0;
            gameState.battleCount = 0;
            gameState.startTime = Date.now();
            gameState.storyFound = 0;
            gameState.discoveredStories = [];
            gameState.fatigue = 100;
            gameState.totalEnemies = 0;
            gameState.killedEnemies = 0;
            gameState.objectives = {
                stairs: false,
                mechanisms: { current: 0, target: levelId === 1 ? 3 : 4 },
                battles: { current: 0, target: levelId === 1 ? 2 : 0 }
            };
            
            document.getElementById('levelTitle').textContent = `📍 ${level.name}`;
            document.getElementById('objectiveText').textContent = level.objectives[0].title;
            document.getElementById('logList').innerHTML = '';
            
            generateMap(levelId);
            revealArea(1, 1, 2);
            renderParty();
            renderMap();
            updateStats();
            saveGame();
            addLog(`你踏入了${level.name}...`, 'info');
        }
        
        function generateMap(levelId) {
            const size = gameState.mapSize;
            gameState.map = [];
            
            for (let y = 0; y < size; y++) {
                gameState.map[y] = [];
                for (let x = 0; x < size; x++) {
                    const cell = { x, y, type: 'floor', revealed: false };
                    if (x === 0 || x === size - 1 || y === 0 || y === size - 1) {
                        cell.type = 'wall';
                    } else if (x === 1 && y === 1) {
                        cell.type = 'player';
                        cell.revealed = true;
                    } else {
                        const rand = Math.random();
                        if (levelId === 3) {
                            if (rand < 0.06) { cell.type = 'enemy'; gameState.totalEnemies++; }
                            else if (rand < 0.08) { cell.type = 'boss'; gameState.totalEnemies++; }
                            else if (rand < 0.11) { cell.type = 'mechanism-luck'; gameState.mechanismTotal++; }
                            else if (rand < 0.13) { cell.type = 'mechanism-knowledge'; gameState.mechanismTotal++; }
                            else if (rand < 0.15) { cell.type = 'mechanism-hero'; gameState.mechanismTotal++; }
                            else if (rand < 0.17) cell.type = 'coffin';
                        } else {
                            if (rand < 0.05) cell.type = 'enemy';
                            else if (rand < 0.09) cell.type = 'chest';
                            else if (rand < 0.13) { cell.type = 'mechanism-luck'; gameState.mechanismTotal++; }
                            else if (rand < 0.17) { cell.type = 'mechanism-knowledge'; gameState.mechanismTotal++; }
                            else if (rand < 0.21) { cell.type = 'mechanism-hero'; gameState.mechanismTotal++; }
                        }
                    }
                    gameState.map[y][x] = cell;
                }
            }
            
            // 放置出口
            for (let attempts = 0; attempts < 100; attempts++) {
                const ex = Math.floor(Math.random() * (size - 4)) + 2;
                const ey = Math.floor(Math.random() * (size - 4)) + 2;
                if (gameState.map[ey][ex].type === 'floor' && 
                    (Math.abs(ex - 1) + Math.abs(ey - 1)) > size / 2) {
                    gameState.map[ey][ex].type = 'stairs';
                    break;
                }
            }
        }
        
        function renderParty() {
            document.getElementById('partyList').innerHTML = battleHeroes.map(h => `
                <div class="party-member">
                    <div class="member-avatar">${h.icon}</div>
                    <div class="member-info">
                        <div class="member-name">${h.name}</div>
                        <div class="member-trait">${h.class}</div>
                        <div class="member-hp">HP: ${h.hp}/${h.maxHp}</div>
                        <div class="hp-bar-mini">
                            <div class="hp-fill-mini" style="width:${(h.hp/h.maxHp)*100}%"></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderMap() {
            const container = document.getElementById('gameMap');
            const size = gameState.mapSize;
            container.style.gridTemplateColumns = `repeat(${size}, 40px)`;
            
            const icons = {
                'wall': '▪️', 'floor': '·', 'player': '👤', 'enemy': '👹',
                'chest': '📦', 'mechanism-luck': '🍀', 'mechanism-knowledge': '📖',
                'mechanism-hero': '⚡', 'boss': '💀', 'stairs': '🚪', 'fog': '?',
                'story': '📜', 'coffin': '⚰️', 'buff-attack': '⚔️', 'buff-fatigue': '💚'
            };
            
            let html = '';
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const cell = gameState.map[y][x];
                    const displayType = cell.revealed ? cell.type : 'fog';
                    html += `<div class="cell ${displayType}" onclick="handleCellClick(${x}, ${y})">${icons[displayType] || '?'}</div>`;
                }
            }
            container.innerHTML = html;
            scrollToPlayer();
        }
        
        function scrollToPlayer() {
            const viewport = document.querySelector('.map-viewport');
            const container = document.getElementById('mapScrollContainer');
            const cellSize = 42;
            const scrollX = -(gameState.playerPos.x * cellSize - viewport.clientWidth / 2 + cellSize / 2);
            const scrollY = -(gameState.playerPos.y * cellSize - viewport.clientHeight / 2 + cellSize / 2);
            const clampedX = Math.max(-(gameState.mapSize * cellSize - viewport.clientWidth), Math.min(0, scrollX));
            const clampedY = Math.max(-(gameState.mapSize * cellSize - viewport.clientHeight), Math.min(0, scrollY));
            container.style.transform = `translate(${clampedX}px, ${clampedY}px)`;
        }
        
        function handleCellClick(x, y) {
            const cell = gameState.map[y][x];
            if (cell.type === 'wall' || cell.type === 'player') return;
            
            const dx = Math.abs(x - gameState.playerPos.x);
            const dy = Math.abs(y - gameState.playerPos.y);
            
            if (dx + dy === 1) {
                movePlayerTo(x, y);
            }
        }
        
        function movePlayerTo(x, y) {
            const cell = gameState.map[y][x];
            const oldPos = gameState.playerPos;
            
            gameState.map[oldPos.y][oldPos.x].type = 'floor';
            gameState.map[oldPos.y][oldPos.x].revealed = true;
            gameState.playerPos = { x, y };
            cell.type = 'player';
            cell.revealed = true;
            
            revealArea(x, y, 2);
            renderMap();
            handleCellType(cell.type, x, y);
            saveGame();
        }
        
        function revealArea(cx, cy, r) {
            const size = gameState.mapSize;
            for (let dy = -r; dy <= r; dy++) {
                for (let dx = -r; dx <= r; dx++) {
                    const x = cx + dx, y = cy + dy;
                    if (x >= 0 && x < size && y >= 0 && y < size) {
                        gameState.map[y][x].revealed = true;
                    }
                }
            }
        }
        
        function handleCellType(type, x, y) {
            const level = LEVELS[currentLevel];
            
            switch (type) {
                case 'enemy':
                    if (level && level.hasCombat) {
                        startBattle(false);
                    } else {
                        addLog('遭遇敌人！', 'danger');
                    }
                    break;
                case 'boss':
                case 'coffin':
                    if (level && level.hasCombat) {
                        startBattle(type === 'boss');
                    } else {
                        addLog('遭遇Boss！', 'danger');
                    }
                    break;
                case 'chest':
                    const gold = Math.floor(Math.random() * 30) + 10;
                    gameState.gold += gold;
                    addLog(`发现宝箱！获得 ${gold} 金币`, 'gold');
                    updateStats();
                    break;
                case 'mechanism-luck':
                case 'mechanism-knowledge':
                case 'mechanism-hero':
                    showMechanismModal(type.replace('mechanism-', ''));
                    break;
                case 'stairs':
                    gameState.objectives.stairs = true;
                    addLog('发现出口！', 'success');
                    showSettlement();
                    break;
            }
        }
        
        function showMechanismModal(type) {
            const pool = mechanismsRandom[type];
            const mech = pool[Math.floor(Math.random() * pool.length)];
            
            const content = document.getElementById('modalContent');
            const typeNames = { luck: '运气型机关', knowledge: '知识型机关', hero: '英雄型机关' };
            
            content.innerHTML = `
                <div class="mechanism-type ${type}">${typeNames[type]}</div>
                <div class="mechanism-image">${mech.icon}</div>
                <div class="mechanism-title">${mech.name}</div>
                <div class="mechanism-desc">${mech.desc}</div>
                <div class="mechanism-question">${mech.question}</div>
                <div class="options-list">
                    ${mech.options.map((opt, idx) => `
                        <button class="option-btn" onclick="handleMechanismResult('${opt.result || opt.correct}')">${opt.text}</button>
                    `).join('')}
                </div>
            `;
            document.getElementById('mechanismModal').classList.add('active');
        }
        
        function handleMechanismResult(result) {
            let gold = 0, hpChange = 0;
            if (result === true || result === 'safe') {
                gold = Math.floor(Math.random() * 30) + 20;
                addLog(`机关破解成功！获得 ${gold} 金币`, 'success');
            } else if (result === false) {
                hpChange = -10;
                addLog('机关破解失败...损失生命', 'danger');
            } else if (result === 'skip') {
                addLog('你选择放弃了这个机关', 'info');
            } else {
                if (Math.random() < 0.5) {
                    gold = Math.floor(Math.random() * 30) + 20;
                    addLog(`机关破解成功！获得 ${gold} 金币`, 'success');
                } else {
                    hpChange = -10;
                    addLog('机关破解失败...损失生命', 'danger');
                }
            }
            
            gameState.gold += gold;
            gameState.hp = Math.max(0, gameState.hp + hpChange);
            gameState.mechanismSolved++;
            gameState.objectives.mechanisms.current++;
            
            closeModal();
            updateStats();
            checkObjectives();
        }
        
        function closeModal() {
            document.getElementById('mechanismModal').classList.remove('active');
        }
        
        function updateStats() {
            document.getElementById('goldValue').textContent = gameState.gold;
            document.getElementById('mechanismCount').textContent = `${gameState.mechanismSolved}/${gameState.mechanismTotal}`;
            document.getElementById('battleCount').textContent = gameState.battleCount;

            document.getElementById('fatigueBar').style.width = `${fatiguePercent}%`;

                fatigueBar.style.background = 'linear-gradient(90deg,#4a8a4a,#6bff6b)';
                document.getElementById('fatigueText').style.color = '#6bff6b';
            }
        }
        
        function addLog(text, type = 'info') {

            const entry = document.createElement('div');

        function checkObjectives() {

            if (obj.mechanisms.current >= obj.mechanisms.target) progressText += '🔧✓ ';
            if (obj.battles && obj.battles.current >= obj.battles.target) progressText += '⚔️✓ ';

        function togglePartyDrawer() { document.getElementById('partyDrawer').classList.toggle('open'); }
        function toggleLogDrawer() { document.getElementById('logDrawer').classList.toggle('open'); }
        function toggleStoryDrawer() { document.getElementById('storyDrawer').classList.toggle('open'); }
        
        // ==================== 新战斗系统 ====================
        let battleState = {
            heroes: [],
            enemies: [],
            actionQueue: [],
            currentIndex: 0,
            turn: 0,
            logs: [],
            isRunning: false,
            isBoss: false
        };
        
        // 初始化英雄数据
        function initBattleHeroes() {
            battleHeroes = [
                { ...HERO_STATS.tieZhu, id: 'tieZhu', hp: HERO_STATS.tieZhu.hp, maxHp: HERO_STATS.tieZhu.hp, rage: 0 },
                { ...HERO_STATS.xingJiSi, id: 'xingJiSi', hp: HERO_STATS.xingJiSi.hp, maxHp: HERO_STATS.xingJiSi.hp, rage: 0 },
                { ...HERO_STATS.moJinShou, id: 'moJinShou', hp: HERO_STATS.moJinShou.hp, maxHp: HERO_STATS.moJinShou.hp, rage: 0 },
                { ...HERO_STATS.banShanKe, id: 'banShanKe', hp: HERO_STATS.banShanKe.hp, maxHp: HERO_STATS.banShanKe.hp, rage: 0 }
            ];
        }
        
        // 开始战斗
        function startBattle(isBoss = false) {
            battleState.isBoss = isBoss;
            battleState.turn = 0;
            battleState.logs = [];
            battleState.isRunning = false;
            
            // 初始化英雄
            initBattleHeroes();
            
            // 初始化敌人
            const enemyCount = isBoss ? 2 : 3;
            battleState.enemies = [];
            for (let i = 0; i < enemyCount; i++) {
                battleState.enemies.push({
                    id: `enemy_${i}`,
                    name: isBoss ? '星棺守卫' : '墓穴守卫',
                    icon: isBoss ? '💀' : '👹',
                    hp: isBoss ? 120 : 50,
                    maxHp: isBoss ? 120 : 50,
                    atk: isBoss ? 18 : 12,
                    def: isBoss ? 8 : 4,
                    speed: isBoss ? 75 : 90
                });
            }
            
            // 构建行动队列（按速度排序）
            rebuildActionQueue();
            battleState.turn = 1;
            
            // 显示战斗界面
            document.getElementById('battleTitle').textContent = isBoss ? '💀 Boss战' : '⚔️ 遭遇战斗';
            document.getElementById('battleModal').classList.add('active');
            
            renderBattle();
            
            // 开始自动战斗
            setTimeout(() => {
                battleState.isRunning = true;
                executeNextAction();
            }, 1000);
        }
        
        // 重建行动队列
        function rebuildActionQueue() {
            battleState.actionQueue = [];
            
            // 添加存活的英雄
            battleState.heroes.forEach(hero => {
                if (hero.hp > 0) {
                    battleState.actionQueue.push({ type: 'hero', id: hero.id, acted: false });
                }
            });
            
            // 添加存活的敌人
            battleState.enemies.forEach(enemy => {
                if (enemy.hp > 0) {
                    battleState.actionQueue.push({ type: 'enemy', id: enemy.id, acted: false });
                }
            });
            
            // 按速度排序
            battleState.actionQueue.sort((a, b) => {
                const speedA = a.type === 'hero' ? 
                    battleState.heroes.find(h => h.id === a.id).speed : 
                    battleState.enemies.find(e => e.id === a.id).speed;
                const speedB = b.type === 'hero' ? 
                    battleState.heroes.find(h => h.id === b.id).speed : 
                    battleState.enemies.find(e => e.id === b.id).speed;
                return speedB - speedA;
            });
        }
        
        // 执行下一个行动
        function executeNextAction() {
            if (!battleState.isRunning) return;
            
            // 找到下一个未行动的角色
            let nextIndex = -1;
            for (let i = 0; i < battleState.actionQueue.length; i++) {
                if (!battleState.actionQueue[i].acted) {
                    nextIndex = i;
                    break;
                }
            }
            
            // 如果所有人都行动过了，开始新回合
            if (nextIndex === -1) {
                battleState.turn++;
                battleState.actionQueue.forEach(a => a.acted = false);
                rebuildActionQueue();
                for (let i = 0; i < battleState.actionQueue.length; i++) {
                    if (!battleState.actionQueue[i].acted) {
                        nextIndex = i;
                        break;
                    }
                }
            }
            
            if (nextIndex === -1) {
                endBattle();
                return;
            }
            
            battleState.currentIndex = nextIndex;
            const currentAction = battleState.actionQueue[nextIndex];
            
            renderBattle();
            
            if (currentAction.type === 'hero') {
                // 英雄行动：自动普攻
                setTimeout(() => {
                    heroAutoAttack(currentAction.id);
                }, 800);
            } else {
                // 敌人行动
                setTimeout(() => {
                    enemyAttack(currentAction.id);
                }, 800);
            }
        }
        
        // 英雄自动普攻
        function heroAutoAttack(heroId) {
            const hero = battleState.heroes.find(h => h.id === heroId);
            if (!hero || hero.hp <= 0) {
                battleState.actionQueue.find(a => a.id === heroId).acted = true;
                executeNextAction();
                return;
            }
            
            // 找到HP最低的敌人
            const aliveEnemies = battleState.enemies.filter(e => e.hp > 0);
            if (aliveEnemies.length === 0) {
                endBattle();
                return;
            }
            
            const target = aliveEnemies.reduce((min, e) => e.hp < min.hp ? e : min);
            
            // 计算伤害
            const damage = calculateDamage(hero.atk, target.def);
            target.hp = Math.max(0, target.hp - damage);
            
            // 获得怒气
            hero.rage = Math.min(100, hero.rage + 20);
            
            addBattleLog(`${hero.icon}${hero.name} 对 ${target.icon}${target.name} 发动普攻，造成 ${damage} 点伤害！`, 'player-attack');
            
            // 检查敌人死亡
            if (target.hp <= 0) {
                addBattleLog(`${target.icon}${target.name} 被击败了！`, 'enemy-death');
                hero.rage = Math.min(100, hero.rage + 15); // 击杀额外+15怒气
            }
            
            // 标记为已行动
            battleState.actionQueue.find(a => a.id === heroId).acted = true;
            
            renderBattle();
            
            // 检查战斗是否结束
            setTimeout(() => {
                if (battleState.enemies.every(e => e.hp <= 0)) {
                    endBattle();
                } else {
                    executeNextAction();
                }
            }, 600);
        }
        
        // 英雄释放技能（插队）
        function heroUseSkill(heroId) {
            const hero = battleState.heroes.find(h => h.id === heroId);
            if (!hero || hero.hp <= 0 || hero.rage < 100) return;
            
            // 找到HP最低的敌人
            const aliveEnemies = battleState.enemies.filter(e => e.hp > 0);
            if (aliveEnemies.length === 0) return;
            
            const target = aliveEnemies.reduce((min, e) => e.hp < min.hp ? e : min);
            
            // 技能伤害150%
            const damage = Math.floor(calculateDamage(hero.atk * 1.5, target.def));
            target.hp = Math.max(0, target.hp - damage);
            
            // 怒气归零
            hero.rage = 0;
            
            addBattleLog(`${hero.icon}${hero.name} 释放技能！对 ${target.icon}${target.name} 造成 ${damage} 点伤害！`, 'player-skill');
            
            // 检查敌人死亡
            if (target.hp <= 0) {
                addBattleLog(`${target.icon}${target.name} 被击败了！`, 'enemy-death');
            }
            
            renderBattle();
            
            // 检查战斗是否结束
            setTimeout(() => {
                if (battleState.enemies.every(e => e.hp <= 0)) {
                    endBattle();
                }
            }, 600);
        }
        
        // 敌人攻击
        function enemyAttack(enemyId) {
            const enemy = battleState.enemies.find(e => e.id === enemyId);
            if (!enemy || enemy.hp <= 0) {
                battleState.actionQueue.find(a => a.id === enemyId).acted = true;
                executeNextAction();
                return;
            }
            
            // 找到HP最高的英雄
            const aliveHeroes = battleState.heroes.filter(h => h.hp > 0);
            if (aliveHeroes.length === 0) {
                endBattle();
                return;
            }
            
            const target = aliveHeroes.reduce((max, h) => h.hp > max.hp ? h : max);
            
            // 计算伤害
            const damage = calculateDamage(enemy.atk, target.def);
            target.hp = Math.max(0, target.hp - damage);
            
            // 目标获得怒气
            target.rage = Math.min(100, target.rage + 5);
            
            addBattleLog(`${enemy.icon}${enemy.name} 对 ${target.icon}${target.name} 发动攻击，造成 ${damage} 点伤害！`, 'enemy-attack');
            
            // 检查英雄死亡
            if (target.hp <= 0) {
                addBattleLog(`${target.icon}${target.name} 倒下了...`, 'hero-death');
            }
            
            // 标记为已行动
            battleState.actionQueue.find(a => a.id === enemyId).acted = true;
            
            renderBattle();
            
            // 检查战斗是否结束
            setTimeout(() => {
                if (battleState.heroes.every(h => h.hp <= 0)) {
                    endBattle();
                } else {
                    executeNextAction();
                }
            }, 600);
        }
        
        // 计算伤害
        function calculateDamage(atk, def) {
            const baseDamage = Math.max(1, atk - def);
            const variance = Math.floor(Math.random() * 5) - 2;
            return Math.max(1, baseDamage + variance);
        }
        
        // 添加战斗日志
        function addBattleLog(text, type) {
            battleState.logs.push({ text, type });
            if (battleState.logs.length > 50) {
                battleState.logs.shift();
            }
        }
        
        // 渲染战斗界面
        function renderBattle() {
            // 更新回合数
            document.getElementById('battleTurn').textContent = `回合 ${battleState.turn}`;
            
            // 复制英雄数据到战斗状态
            battleState.heroes = [...battleHeroes];
            
            // 渲染敌人区域
            const enemyArea = document.getElementById('enemyArea');
            enemyArea.innerHTML = battleState.enemies.map(e => `
                <div class="enemy-unit ${e.hp <= 0 ? 'dead' : ''}">
                    <div class="enemy-icon">${e.icon}</div>
                    <div class="enemy-name">${e.name}</div>
                    <div class="enemy-hp-bar">
                        <div class="enemy-hp-fill" style="width:${(e.hp/e.maxHp)*100}%"></div>
                    </div>
                    <div class="enemy-hp-text">${e.hp}/${e.maxHp}</div>
                </div>
            `).join('');
            
            // 渲染行动条
            const actionBarArea = document.getElementById('actionBarArea');
            const currentAction = battleState.actionQueue[battleState.currentIndex];
            
            actionBarArea.innerHTML = battleState.actionQueue.map((action, idx) => {
                const isHero = action.type === 'hero';
                const unit = isHero ? 
                    battleState.heroes.find(h => h.id === action.id) : 
                    battleState.enemies.find(e => e.id === action.id);
                const isCurrent = idx === battleState.currentIndex;
                const isDead = unit.hp <= 0;
                
                return `
                    <div class="action-slot ${action.type} ${isCurrent ? 'current' : ''} ${action.acted || isDead ? 'acted' : ''}">
                        <div class="action-icon">${unit.icon}</div>
                        <div class="action-name">${unit.name}</div>
                    </div>
                `;
            }).join('<span class="action-arrow">→</span>');
            
            // 渲染英雄区域
            const heroArea = document.getElementById('heroArea');
            const currentHeroAction = currentAction && currentAction.type === 'hero' ? currentAction.id : null;
            
            heroArea.innerHTML = battleState.heroes.map(h => {
                const isDead = h.hp <= 0;
                const isRageReady = h.rage >= 100;
                const isCurrentTurn = h.id === currentHeroAction;
                const isClickable = !isDead && isRageReady && battleState.isRunning;
                
                return `
                    <div class="hero-unit ${isDead ? 'dead' : ''} ${isRageReady ? 'ready' : ''} ${isCurrentTurn ? 'current-turn' : ''}"
                         ${isClickable ? `onclick="heroUseSkill('${h.id}')"` : ''}>
                        <div class="hero-icon">${h.icon}</div>
                        <div class="hero-name">${h.name}</div>
                        <div class="hero-hp-bar">
                            <div class="hero-hp-fill" style="width:${(h.hp/h.maxHp)*100}%"></div>
                        </div>
                        <div class="hero-hp-text">${h.hp}/${h.maxHp}</div>
                        <div class="rage-bar">
                            <div class="rage-fill ${h.rage >= 100 ? 'full' : ''}" style="width:${h.rage}%"></div>
                        </div>
                        <div class="rage-text ${h.rage >= 100 ? 'full' : ''}">
                            ${h.rage >= 100 ? '★ 可放技能' : `怒气 ${h.rage}/100`}
                        </div>
                    </div>
                `;
            }).join('');
            
            // 渲染战斗日志
            const battleLog = document.getElementById('battleLog');
            battleLog.innerHTML = battleState.logs.slice(-8).map(log => `
                <div class="battle-log-entry ${log.type}">${log.text}</div>
            `).join('');
            battleLog.scrollTop = battleLog.scrollHeight;
            
            // 渲染操作按钮
            const battleActions = document.getElementById('battleActions');
            battleActions.innerHTML = `
                <button class="battle-btn retreat" onclick="doBattleRetreat()">撤退</button>
            `;
        }
        
        // 结束战斗
        function endBattle() {
            battleState.isRunning = false;
            
            // 检查胜负
            const allEnemiesDead = battleState.enemies.every(e => e.hp <= 0);
            const allHeroesDead = battleState.heroes.every(h => h.hp <= 0);
            
            if (allEnemiesDead) {
                // 胜利
                battleVictory();
            } else if (allHeroesDead) {
                // 失败
                battleDefeat();
            }
        }
        
        // 战斗胜利
        function battleVictory() {
            gameState.battleCount++;
            gameState.killedEnemies += battleState.enemies.filter(e => e.hp <= 0).length;
            gameState.objectives.battles.current++;
            
            // 计算总HP损失
            let totalDamage = 0;
            battleState.heroes.forEach(h => {
                totalDamage += (h.maxHp - h.hp);
            });
            
            // 疲劳消耗=HP损失
            gameState.fatigue = Math.max(0, gameState.fatigue - totalDamage);
            
            // 英雄HP回满
            battleState.heroes.forEach(h => {
                h.hp = h.maxHp;
            });
            battleHeroes = [...battleState.heroes];
            
            // 奖励金币
            const goldReward = battleState.isBoss ? 100 : 50;
            gameState.gold += goldReward;
            
            const isPerfect = gameState.killedEnemies >= gameState.totalEnemies;
            const bonusGold = isPerfect ? 100 : 0;
            gameState.gold += bonusGold;
            
            // 显示胜利界面
            document.getElementById('battleLog').innerHTML += `
                <div class="battle-log-entry" style="text-align:center;font-size:14px;color:#6bff6b;padding:10px;">
                    🎉 战斗胜利！获得 ${goldReward} 金币！
                </div>
            `;
            
            setTimeout(() => {
                document.getElementById('battleModal').classList.remove('active');
                
                // 如果是Boss战（星棺）
                if (battleState.isBoss) {
                    completeLevel3(isPerfect);
                } else {
                    addLog(`战斗胜利！获得 ${goldReward} 金币`, 'success');
                    updateStats();
                    renderParty();
                    saveGame();
                }
            }, 1500);
        }
        
        // 战斗失败
        function battleDefeat() {
            document.getElementById('battleLog').innerHTML += `
                <div class="battle-log-entry" style="text-align:center;font-size:14px;color:#ff6b6b;padding:10px;">
                    💀 队伍全军覆没...
                </div>
            `;
            
            setTimeout(() => {
                document.getElementById('battleModal').classList.remove('active');
                addLog('战斗失败...勉强撤退', 'danger');
                
                // 撤退惩罚
                gameState.fatigue = Math.max(0, gameState.fatigue - 15);
                gameState.hp = gameState.maxHp;
                
                // 英雄HP回满
                battleState.heroes.forEach(h => {
                    h.hp = h.maxHp;
                    h.rage = 0;
                });
                battleHeroes = [...battleState.heroes];
                
                updateStats();
                renderParty();
            }, 1500);
        }
        
        // 撤退
        function doBattleRetreat() {
            battleState.isRunning = false;
            document.getElementById('battleModal').classList.remove('active');
            
            // 英雄HP回满
            battleState.heroes.forEach(h => {
                h.hp = h.maxHp;
                h.rage = 0;
            });
            battleHeroes = [...battleState.heroes];
            
            // 撤退惩罚
            gameState.fatigue = Math.max(0, gameState.fatigue - 10);
            addLog('撤退成功，消耗 10 点疲劳度', 'info');
            updateStats();
            renderParty();
        }
        
        // 第三关通关
        function completeLevel3(isPerfect) {
            const modal = document.getElementById('missionModal');
            const content = document.getElementById('missionContent');
            
            content.innerHTML = `
                <div class="mechanism-title">🎉 关卡完成</div>
                <div style="text-align:center;padding:20px;">
                    <div style="font-size:48px;">⚰️</div>
                    <div style="color:#d4af37;margin-top:10px;">星陨古墓</div>
                </div>
                <div style="background:rgba(0,0,0,0.3);padding:15px;border-radius:8px;">
                    <div style="display:flex;justify-content:space-between;margin:5px 0;">
                        <span>击杀敌人</span>
                        <span>${gameState.killedEnemies}/${gameState.totalEnemies}</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;margin:5px 0;">
                        <span>剩余疲劳度</span>
                        <span>${gameState.fatigue}/${gameState.maxFatigue}</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;margin:5px 0;color:#ffd700;">
                        <span>获得金币</span>
                        <span>+${150 + (isPerfect ? 100 : 0)}</span>
                    </div>
                </div>
                ${isPerfect ? '<div style="color:#6bff6b;text-align:center;margin-top:10px;">⭐ 完美通关！</div>' : ''}
                <button class="close-btn" onclick="exitToLevelSelect();closeMissionModal();" style="margin-top:15px;">返回关卡选择</button>
            `;
            
            modal.classList.add('active');
            updateStats();
            saveGame();
        }
        
        // 初始化
        window.addEventListener('resize', scrollToPlayer);
        
        window.addEventListener('DOMContentLoaded', function() {
            // 初始化英雄数据
            initBattleHeroes();
            renderParty();
        });
    </script>
</body>
</html>
