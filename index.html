<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>《苍穹劫》地宫探索 Demo v9 - 战斗音效版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1a 100%);
            height: 100vh;
            color: #c0c0c0;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        /* 主容器 */
        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }
        
        /* ========== 关卡选择界面 ========== */
        .level-select-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, #0a0a15 0%, #1a1a2e 50%, #0f0f1a 100%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        
        .level-select-screen.hidden {
            display: none;
        }
        
        .game-title {
            text-align: center;
            padding: 30px 0;
        }
        
        .game-title h1 {
            font-size: 28px;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            margin-bottom: 8px;
        }
        
        .game-title .subtitle {
            font-size: 12px;
            color: #666;
        }
        
        .level-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
            padding-left: 5px;
            border-left: 3px solid #d4af37;
        }
        
        .level-card {
            background: rgba(30, 20, 50, 0.8);
            border: 1px solid #3a2a5a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .level-card:hover, .level-card:active {
            background: rgba(50, 40, 70, 0.9);
            border-color: #d4af37;
            transform: translateY(-2px);
        }
        
        .level-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .level-card.locked:hover {
            transform: none;
            background: rgba(30, 20, 50, 0.8);
            border-color: #3a2a5a;
        }
        
        .level-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .level-name {
            font-size: 18px;
            color: #d4af37;
            font-weight: bold;
        }
        
        .level-tag {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            background: #2a4a3a;
            color: #6bff6b;
        }
        
        .level-tag.new {
            background: #4a3a5a;
            color: #ff6bff;
        }
        
        .level-tag.combat {
            background: linear-gradient(135deg, #8b3a3a, #6b2a2a);
            color: #ff8888;
        }
        
        .level-desc {
            font-size: 13px;
            color: #999;
            line-height: 1.6;
        }
        
        /* ========== 游戏界面 ========== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(20, 15, 30, 0.95);
            border-bottom: 1px solid #3a2a5a;
            flex-shrink: 0;
        }
        
        .floor-info {
            font-size: 14px;
            color: #d4af37;
            font-weight: bold;
        }
        
        .fatigue-container {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
        }
        
        .hp-bar-wrapper {
            width: 120px;
            height: 12px;
            background: #2a2040;
            border-radius: 6px;
            overflow: hidden;
        }
        
        .hp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ff8888);
            transition: width 0.3s;
        }
        
        .hp-text {
            font-size: 12px;
            color: #ff6b6b;
            min-width: 45px;
        }
        
        .torch-info {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            color: #ffa500;
        }
        
        .objective-bar {
            background: rgba(30, 20, 40, 0.95);
            padding: 8px 15px;
            border-bottom: 1px solid #3a2a5a;
            flex-shrink: 0;
        }
        
        .objective-title {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }
        
        .objective-content {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #d4af37;
        }
        
        .objective-icon {
            font-size: 16px;
        }
        
        .objective-progress {
            font-size: 12px;
            color: #6bcfff;
        }
        
        .map-section {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: rgba(10, 10, 20, 0.9);
        }
        
        .map-viewport {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .map-scroll-container {
            position: absolute;
            transition: transform 0.15s ease-out;
        }
        
        #gameMap {
            display: grid;
            gap: 1px;
            padding: 5px;
        }
        
        .cell {
            width: 40px;
            height: 40px;
            background: #1a1a25;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid transparent;
        }
        
        .cell.fog { background: #0a0a10; color: #333; }
        .cell.fog:active { background: #151520; }
        .cell.player {
            background: linear-gradient(135deg, #4a6fa5, #3a5a8a);
            color: #fff;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(74, 111, 165, 0.6);
            cursor: default;
            border: 2px solid #6a9fd5;
        }
        .cell.wall { background: #2a2a35; color: #444; cursor: default; }
        .cell.enemy { background: #8b3a3a; color: #ff6b6b; }
        .cell.chest { background: #3a3a2a; color: #ffd700; }
        .cell.mechanism-luck { background: #2a4a3a; color: #6bff6b; }
        .cell.mechanism-knowledge { background: #3a4a5a; color: #6bcfff; }
        .cell.mechanism-hero { background: #4a3a5a; color: #ff6bff; }
        .cell.boss { background: #5a2a5a; color: #ff00ff; font-weight: bold; }
        .cell.stairs { background: linear-gradient(135deg, #2a4a3a, #3a5a4a); color: #6bff6b; border: 2px solid #4a8a5a; }
        .cell.story { background: #3a3a4a; color: #c0c0c0; }
        .cell.coffin { background: linear-gradient(135deg, #4a3a2a, #6a5a4a); color: #ffd700; border: 2px solid #d4af37; animation: coffin-glow 2s infinite; }
        .cell.buff-attack { background: linear-gradient(135deg, #5a3a3a, #7a4a4a); color: #ff6b6b; border: 1px solid #ff6b6b; }
        .cell.buff-fatigue { background: linear-gradient(135deg, #2a4a3a, #3a5a4a); color: #6bff6b; border: 1px solid #6bff6b; }
        
        @keyframes coffin-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
            50% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.6); }
        }
        
        .cell:active:not(.player):not(.wall) {
            transform: scale(0.95);
        }
        
        .bottom-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 10px 15px;
            background: rgba(20, 15, 30, 0.95);
            border-top: 1px solid #3a2a5a;
            flex-shrink: 0;
        }
        
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 5px;
            background: rgba(60, 50, 80, 0.8);
            border: 1px solid #4a4a6a;
            border-radius: 8px;
            color: #ddd;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .action-btn:active {
            background: rgba(80, 70, 100, 0.9);
            transform: scale(0.95);
        }
        
        .action-btn .btn-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }
        
        .action-btn .btn-label {
            font-size: 10px;
            color: #888;
        }
        
        .resources-bar {
            display: flex;
            justify-content: space-around;
            padding: 8px 15px;
            background: rgba(25, 18, 35, 0.95);
            border-top: 1px solid #3a2a5a;
            flex-shrink: 0;
        }
        
        .resource-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }
        
        .resource-icon { font-size: 16px; }
        .gold-value { color: #ffd700; }
        .mechanism-value { color: #6bff6b; }
        
        /* ========== 弹窗样式 ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #2a2a3e 100%);
            border: 2px solid #d4af37;
            border-radius: 12px;
            padding: 20px;
            max-width: 450px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .mechanism-image {
            width: 100%;
            height: 120px;
            background: #0a0a15;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            font-size: 48px;
        }
        
        .mechanism-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .mechanism-type.luck { background: #2a4a3a; color: #6bff6b; }
        .mechanism-type.knowledge { background: #3a4a5a; color: #6bcfff; }
        .mechanism-type.hero { background: #4a3a5a; color: #ff6bff; }
        .mechanism-type.story { background: #3a3a4a; color: #c0c0c0; }
        
        .mechanism-title {
            font-size: 18px;
            color: #d4af37;
            margin-bottom: 8px;
        }
        
        .mechanism-desc {
            color: #aaa;
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        
        .mechanism-question {
            background: rgba(50, 40, 70, 0.5);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            line-height: 1.5;
        }
        
        .hero-hint {
            background: rgba(255, 165, 0, 0.1);
            border: 1px solid #ffa500;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #ffa500;
        }
        
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .option-btn {
            padding: 12px 15px;
            background: rgba(60, 50, 80, 0.8);
            border: 1px solid #4a4a6a;
            border-radius: 8px;
            color: #ddd;
            font-size: 13px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        
        .option-btn:active {
            background: rgba(80, 70, 100, 0.9);
            border-color: #d4af37;
        }
        
        .option-btn .option-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            margin-left: 8px;
        }
        
        .option-btn .option-tag.matched { background: #2a4a3a; color: #6bff6b; }
        .option-btn .option-tag.unmatched { background: #4a3a3a; color: #ff6b6b; }
        
        .result-box {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .result-box.success { background: rgba(107, 255, 107, 0.1); border: 1px solid #6bff6b; color: #6bff6b; }
        .result-box.partial { background: rgba(255, 200, 100, 0.1); border: 1px solid #ffc864; color: #ffc864; }
        .result-box.fail { background: rgba(255, 107, 107, 0.1); border: 1px solid #ff6b6b; color: #ff6b6b; }
        
        .close-btn {
            margin-top: 15px;
            padding: 12px 20px;
            background: #d4af37;
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        
        /* 队伍/日志抽屉 */
        .party-drawer, .log-drawer {
            position: fixed;
            background: rgba(20, 15, 30, 0.98);
            z-index: 900;
            transition: transform 0.3s ease;
            overflow-y: auto;
            padding: 15px;
        }
        
        .party-drawer {
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            border-left: 2px solid #3a2a5a;
        }
        
        .party-drawer.open {
            right: 0;
        }
        
        .log-drawer {
            bottom: -250px;
            left: 0;
            right: 0;
            height: 250px;
            border-top: 2px solid #3a2a5a;
        }
        
        .log-drawer.open {
            bottom: 0;
        }
        
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #3a2a5a;
        }
        
        .drawer-title {
            font-size: 16px;
            color: #d4af37;
        }
        
        .drawer-close {
            font-size: 24px;
            color: #888;
            cursor: pointer;
        }
        
        .party-member {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(40, 30, 60, 0.5);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .member-avatar {
            width: 40px;
            height: 40px;
            background: #3a3a5a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .member-info { flex: 1; }
        .member-name { font-size: 13px; color: #ddd; font-weight: bold; }
        .member-trait { font-size: 11px; color: #ffa500; }
        .member-hp { font-size: 11px; color: #888; margin-top: 2px; }
        
        .hp-bar-mini {
            width: 100%;
            height: 4px;
            background: #2a2040;
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }
        
        .hp-fill-mini {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ff8888);
        }
        
        .log-entry {
            padding: 6px 0;
            border-bottom: 1px solid #2a2a3a;
            font-size: 12px;
            color: #aaa;
        }
        
        .log-entry.success { color: #6bff6b; }
        .log-entry.danger { color: #ff6b6b; }
        .log-entry.info { color: #6bcfff; }
        .log-entry.gold { color: #ffd700; }
        .log-entry.story { color: #d4af37; font-style: italic; }
        
        /* ========== 战斗系统样式 ========== */
        .battle-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 10px;
        }
        
        .battle-modal.active {
            display: flex;
        }
        
        .battle-header {
            text-align: center;
            padding: 8px;
            background: rgba(30, 20, 50, 0.8);
            border-radius: 8px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        
        .battle-title {
            font-size: 16px;
            color: #d4af37;
            font-weight: bold;
        }
        
        .battle-turn {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        
        /* 敌人区域 */
        .enemy-area {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            background: rgba(40, 20, 30, 0.6);
            border-radius: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        
        .enemy-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            background: rgba(60, 30, 40, 0.5);
            border-radius: 10px;
            min-width: 80px;
            transition: all 0.3s;
        }
        
        .enemy-unit.dead {
            opacity: 0.3;
            filter: grayscale(1);
        }
        
        .enemy-unit.target {
            border: 2px solid #ff6b6b;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.4);
        }
        
        .enemy-icon {
            font-size: 32px;
            margin-bottom: 5px;
        }
        
        .enemy-name {
            font-size: 11px;
            color: #ff8888;
            margin-bottom: 5px;
        }
        
        .enemy-hp-bar {
            width: 60px;
            height: 6px;
            background: #2a2040;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 3px;
        }
        
        .enemy-hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b3a3a, #ff6b6b);
            transition: width 0.3s;
        }
        
        .enemy-hp-text {
            font-size: 10px;
            color: #aaa;
        }
        
        /* 行动条区域 */
        .action-bar-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 10px;
            background: rgba(30, 30, 50, 0.6);
            border-radius: 8px;
            margin-bottom: 10px;
            overflow-x: auto;
            flex-shrink: 0;
            min-height: 70px;
        }
        
        .action-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px 8px;
            background: rgba(40, 40, 60, 0.5);
            border-radius: 8px;
            min-width: 50px;
            transition: all 0.3s;
        }
        
        .action-slot.hero {
            background: rgba(60, 60, 100, 0.5);
        }
        
        .action-slot.enemy {
            background: rgba(80, 40, 40, 0.5);
        }
        
        .action-slot.current {
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            border: 2px solid #d4af37;
        }
        
        .action-slot.acted {
            opacity: 0.4;
            filter: grayscale(0.5);
        }
        
        .action-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }
        
        .action-slot.current .action-icon {
            font-size: 26px;
            animation: pulse-glow 1s infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5)); }
            50% { filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.9)); }
        }
        
        .action-name {
            font-size: 9px;
            color: #888;
        }
        
        .action-arrow {
            color: #555;
            font-size: 14px;
            margin: 0 2px;
        }
        
        /* 英雄区域 */
        .hero-area {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
            background: rgba(20, 30, 50, 0.6);
            border-radius: 12px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        
        .hero-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            background: rgba(40, 50, 80, 0.5);
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .hero-unit.dead {
            opacity: 0.4;
            filter: grayscale(0.8);
            cursor: not-allowed;
        }
        
        .hero-unit.ready {
            border: 2px solid #6bff6b;
            box-shadow: 0 0 10px rgba(107, 255, 107, 0.4);
            animation: rage-ready 1s infinite;
        }
        
        @keyframes rage-ready {
            0%, 100% { box-shadow: 0 0 10px rgba(107, 255, 107, 0.4); }
            50% { box-shadow: 0 0 20px rgba(107, 255, 107, 0.7); }
        }
        
        .hero-unit.current-turn {
            border: 2px solid #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }
        
        .hero-icon {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .hero-name {
            font-size: 11px;
            color: #6bcfff;
            margin-bottom: 5px;
        }
        
        .hero-hp-bar {
            width: 70px;
            height: 8px;
            background: #2a2040;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 3px;
        }
        
        .hero-hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a6fa5, #6b9fd5);
            transition: width 0.3s;
        }
        
        .hero-hp-text {
            font-size: 10px;
            color: #aaa;
            margin-bottom: 5px;
        }
        
        /* 怒气条 */
        .rage-bar {
            width: 70px;
            height: 6px;
            background: #2a2040;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 3px;
        }
        
        .rage-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffa500, #ffcc00);
            transition: width 0.3s;
        }
        
        .rage-fill.full {
            background: linear-gradient(90deg, #ff6b6b, #ffcc00);
            animation: rage-pulse 0.5s infinite;
        }
        
        @keyframes rage-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .rage-text {
            font-size: 9px;
            color: #ffa500;
        }
        
        .rage-text.full {
            color: #ffcc00;
            font-weight: bold;
        }
        
        /* 战斗日志 */
        .battle-log {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 8px;
            overflow-y: auto;
            font-size: 11px;
            min-height: 80px;
            max-height: 120px;
        }
        
        .battle-log-entry {
            margin: 4px 0;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(40, 40, 60, 0.3);
        }
        
        .battle-log-entry.player-attack { color: #6bcfff; }
        .battle-log-entry.player-skill { color: #ffcc00; }
        .battle-log-entry.enemy-attack { color: #ff6b6b; }
        .battle-log-entry.system { color: #888; }
        .battle-log-entry.hero-death { color: #ff4444; }
        .battle-log-entry.enemy-death { color: #6bff6b; }
        
        /* 战斗操作区 */
        .battle-actions {
            display: flex;
            gap: 10px;
            padding: 10px;
            background: rgba(30, 20, 50, 0.8);
            border-radius: 8px;
            flex-shrink: 0;
        }
        
        .battle-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .battle-btn:active {
            transform: scale(0.95);
        }
        
        .battle-btn.attack {
            background: linear-gradient(135deg, #4a6fa5, #3a5a8a);
            color: #fff;
        }
        
        .battle-btn.skill {
            background: linear-gradient(135deg, #8b5a2b, #6b4a1b);
            color: #ffcc00;
        }
        
        .battle-btn.retreat {
            background: rgba(80, 60, 60, 0.8);
            color: #ff8888;
            flex: 0.5;
        }
        
        .battle-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 伤害数字动画 */
        .damage-number {
            position: absolute;
            font-size: 18px;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
            animation: damage-float 1s forwards;
            pointer-events: none;
            z-index: 100;
        }
        
        .damage-number.heal {
            color: #6bff6b;
        }
        
        .damage-number.crit {
            color: #ffcc00;
            font-size: 22px;
        }
        
        @keyframes damage-float {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-30px) scale(0.8); }
        }
        
        /* ========== 战斗动效系统 ========== */
        
        /* 伤害/治疗飘字 */
        .damage-number {
            position: absolute;
            font-size: 20px;
            font-weight: bold;
            color: #ff4444;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(255,68,68,0.5);
            animation: damage-float 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 2100;
            font-family: 'Arial Black', sans-serif;
        }
        
        .damage-number.heal {
            color: #44ff44;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(68,255,68,0.5);
        }
        
        .damage-number.crit {
            color: #ffcc00;
            font-size: 28px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 0 15px rgba(255,204,0,0.8), 0 0 30px rgba(255,204,0,0.4);
            animation: crit-float 0.8s ease-out forwards;
        }
        
        .damage-number.miss {
            color: #888;
            font-size: 14px;
            font-style: italic;
        }
        
        @keyframes damage-float {
            0% { opacity: 1; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; transform: translateY(-10px) scale(1.2); }
            40% { transform: translateY(-15px) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(0.6); }
        }
        
        @keyframes crit-float {
            0% { opacity: 1; transform: translateY(0) scale(0.3) rotate(-10deg); }
            10% { opacity: 1; transform: translateY(-5px) scale(1.4) rotate(5deg); }
            20% { opacity: 1; transform: translateY(-15px) scale(1.2) rotate(-3deg); }
            40% { transform: translateY(-25px) scale(1.1) rotate(2deg); }
            60% { transform: translateY(-35px) scale(1.05) rotate(-1deg); }
            100% { opacity: 0; transform: translateY(-60px) scale(0.5) rotate(0deg); }
        }
        
        /* 受击抖动效果 */
        .shake {
            animation: shake 0.3s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px) rotate(-2deg); }
            40% { transform: translateX(8px) rotate(2deg); }
            60% { transform: translateX(-5px) rotate(-1deg); }
            80% { transform: translateX(5px) rotate(1deg); }
        }
        
        /* 严重抖动（Boss受击） */
        .shake-heavy {
            animation: shake-heavy 0.4s ease-in-out;
        }
        
        @keyframes shake-heavy {
            0%, 100% { transform: translateX(0) translateY(0); }
            10% { transform: translateX(-10px) translateY(-3px); }
            20% { transform: translateX(10px) translateY(3px); }
            30% { transform: translateX(-8px) translateY(-2px); }
            40% { transform: translateX(8px) translateY(2px); }
            50% { transform: translateX(-6px) translateY(-2px); }
            60% { transform: translateX(6px) translateY(2px); }
            70% { transform: translateX(-4px) translateY(-1px); }
            80% { transform: translateX(4px) translateY(1px); }
            90% { transform: translateX(-2px); }
        }
        
        /* 屏幕震动效果 */
        .screen-shake {
            animation: screen-shake 0.3s ease-in-out;
        }
        
        @keyframes screen-shake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5px, -3px); }
            20% { transform: translate(5px, 3px); }
            30% { transform: translate(-4px, -2px); }
            40% { transform: translate(4px, 2px); }
            50% { transform: translate(-3px, -1px); }
            60% { transform: translate(3px, 1px); }
            70% { transform: translate(-2px, -1px); }
            80% { transform: translate(2px, 1px); }
            90% { transform: translate(-1px, 0); }
        }
        
        /* 闪烁效果（受击） */
        .flash-red {
            animation: flash-red 0.3s ease-out;
        }
        
        @keyframes flash-red {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(2) saturate(1.5) hue-rotate(-10deg); background-color: rgba(255,100,100,0.4); }
        }
        
        /* 死亡淡出 */
        .death-fade {
            animation: death-fade 0.6s ease-out forwards;
        }
        
        @keyframes death-fade {
            0% { opacity: 1; transform: scale(1); filter: grayscale(0); }
            30% { opacity: 0.8; transform: scale(1.1); }
            100% { opacity: 0.2; transform: scale(0.8); filter: grayscale(1); }
        }
        
        /* 怒气满发光脉冲 */
        .rage-ready-glow {
            animation: rage-ready-glow 1s ease-in-out infinite;
        }
        
        @keyframes rage-ready-glow {
            0%, 100% { 
                box-shadow: 0 0 10px rgba(255,165,0,0.4), 
                            inset 0 0 5px rgba(255,165,0,0.2);
            }
            50% { 
                box-shadow: 0 0 25px rgba(255,165,0,0.8), 
                            inset 0 0 15px rgba(255,165,0,0.4),
                            0 0 40px rgba(255,200,0,0.3);
            }
        }
        
        /* 星星闪烁 */
        .star-blink {
            animation: star-blink 0.5s ease-in-out infinite;
        }
        
        @keyframes star-blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        
        /* 行动条当前角色高亮 */
        .action-slot.current {
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
            border: 2px solid #d4af37;
            animation: current-pulse 1s ease-in-out infinite;
            z-index: 10;
        }
        
        @keyframes current-pulse {
            0%, 100% { 
                transform: scale(1.15);
                box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            }
            50% { 
                transform: scale(1.2);
                box-shadow: 0 0 25px rgba(212, 175, 55, 0.9);
            }
        }
        
        /* 行动条过渡动画 */
        .action-slot {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* ========== 英雄技能特效 ========== */
        
        /* 通用特效容器 */
        .skill-effect-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2090;
        }
        
        /* 铁柱 - 冲锋特效 */
        .charge-effect {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,200,100,0.8) 0%, rgba(255,150,50,0.4) 50%, transparent 70%);
            animation: charge-forward 0.4s ease-in forwards;
        }
        
        @keyframes charge-forward {
            0% { transform: translateX(0) scale(1); opacity: 1; }
            50% { transform: translateX(80px) scale(1.3); opacity: 1; }
            100% { transform: translateX(150px) scale(0.5); opacity: 0; }
        }
        
        /* 铁柱 - 冲击波 */
        .shockwave {
            position: absolute;
            border-radius: 50%;
            border: 4px solid rgba(255,200,100,0.8);
            animation: shockwave-expand 0.5s ease-out forwards;
        }
        
        @keyframes shockwave-expand {
            0% { transform: scale(0); opacity: 1; border-width: 8px; }
            100% { transform: scale(3); opacity: 0; border-width: 1px; }
        }
        
        /* 星祭司 - 星星粒子 */
        .star-particle {
            position: absolute;
            font-size: 20px;
            animation: star-fall 0.6s ease-in forwards;
        }
        
        @keyframes star-fall {
            0% { transform: translateY(-50px) rotate(0deg) scale(0); opacity: 0; }
            20% { opacity: 1; transform: translateY(-30px) rotate(72deg) scale(1.2); }
            80% { opacity: 1; }
            100% { transform: translateY(30px) rotate(360deg) scale(0.3); opacity: 0; }
        }
        
        /* 星祭司 - 星辰光柱 */
        .star-beam {
            position: absolute;
            width: 80px;
            height: 300px;
            background: linear-gradient(180deg, 
                rgba(148,0,211,0) 0%,
                rgba(148,0,211,0.3) 20%,
                rgba(148,0,211,0.8) 50%,
                rgba(75,0,130,0.6) 80%,
                rgba(138,43,226,0.3) 100%);
            animation: beam-fall 0.6s ease-out forwards;
            filter: blur(3px);
        }
        
        @keyframes beam-fall {
            0% { transform: translateY(-300px) scaleY(0.5); opacity: 0; }
            30% { transform: translateY(0) scaleY(1.2); opacity: 1; }
            70% { transform: translateY(0) scaleY(1); opacity: 0.8; }
            100% { transform: translateY(50px) scaleY(0.8); opacity: 0; }
        }
        
        /* 紫色粒子扩散 */
        .purple-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #da70d6 0%, #9400d3 100%);
            border-radius: 50%;
            animation: particle-spread 0.8s ease-out forwards;
        }
        
        @keyframes particle-spread {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        
        /* 摸金手 - 金色符文 */
        .rune-particle {
            position: absolute;
            font-size: 18px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255,215,0,0.8);
            animation: rune-fly 0.5s ease-in forwards;
        }
        
        @keyframes rune-fly {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
            50% { transform: translate(60px, -20px) rotate(180deg) scale(1.2); opacity: 1; }
            100% { transform: translate(120px, 0) rotate(360deg) scale(0.5); opacity: 0; }
        }
        
        /* 摸金手 - 罗盘旋转 */
        .compass-spin {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 4px solid transparent;
            border-top-color: #ffd700;
            border-bottom-color: #ffd700;
            border-radius: 50%;
            animation: compass-rotate 0.8s linear infinite, compass-glow 0.5s ease-out forwards;
        }
        
        @keyframes compass-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes compass-glow {
            0% { box-shadow: 0 0 20px rgba(255,215,0,0.5); }
            50% { box-shadow: 0 0 50px rgba(255,215,0,0.9), 0 0 80px rgba(255,215,0,0.5); }
            100% { box-shadow: 0 0 30px rgba(255,215,0,0.6); opacity: 0; }
        }
        
        /* 金色光波 */
        .golden-wave {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 6px solid rgba(255,215,0,0.8);
            border-radius: 50%;
            animation: golden-wave-expand 0.6s ease-out forwards;
        }
        
        @keyframes golden-wave-expand {
            0% { transform: scale(0); opacity: 1; border-width: 10px; }
            50% { opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; border-width: 2px; }
        }
        
        /* 搬山客 - 齿轮飞向 */
        .gear-particle {
            position: absolute;
            font-size: 22px;
            animation: gear-fly 0.5s ease-in forwards;
        }
        
        @keyframes gear-fly {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            30% { transform: translate(40px, -10px) rotate(108deg); }
            60% { transform: translate(80px, 5px) rotate(216deg); }
            100% { transform: translate(120px, 0) rotate(360deg); opacity: 0; }
        }
        
        /* 搬山客 - 机械火焰 */
        .mech-flame {
            position: absolute;
            width: 120px;
            height: 60px;
            background: linear-gradient(90deg, 
                rgba(255,100,0,0) 0%,
                rgba(255,150,0,0.6) 30%,
                rgba(255,200,0,0.9) 50%,
                rgba(255,150,0,0.6) 70%,
                rgba(255,100,0,0) 100%);
            clip-path: polygon(0% 50%, 30% 0%, 50% 30%, 70% 0%, 100% 50%, 70% 100%, 50% 70%, 30% 100%);
            animation: flame-burst 0.5s ease-out forwards;
            filter: blur(2px);
        }
        
        @keyframes flame-burst {
            0% { transform: scaleX(0.3) scaleY(0.5); opacity: 0; }
            30% { transform: scaleX(1.2) scaleY(1.3); opacity: 1; }
            60% { transform: scaleX(1) scaleY(1); opacity: 0.8; }
            100% { transform: scaleX(1.5) scaleY(0.6); opacity: 0; }
        }
        
        /* 机械展开 */
        .mech-expand {
            position: absolute;
            width: 150px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: mech-unfold 0.6s ease-out forwards;
        }
        
        .mech-arm {
            position: absolute;
            width: 40px;
            height: 8px;
            background: linear-gradient(90deg, #666, #888, #666);
            border-radius: 4px;
        }
        
        .mech-arm.left { left: 0; transform-origin: right center; animation: arm-left 0.6s ease-out forwards; }
        .mech-arm.right { right: 0; transform-origin: left center; animation: arm-right 0.6s ease-out forwards; }
        
        @keyframes arm-left {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-45deg); }
            100% { transform: rotate(-30deg); }
        }
        
        @keyframes arm-right {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(45deg); }
            100% { transform: rotate(30deg); }
        }
        
        @keyframes mech-unfold {
            0% { opacity: 0; transform: scale(0.5); }
            40% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1); }
        }
        
        /* 普攻特效闪光 */
        .attack-flash {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,200,0.5) 40%, transparent 70%);
            border-radius: 50%;
            animation: flash-pop 0.3s ease-out forwards;
            pointer-events: none;
        }
        
        @keyframes flash-pop {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        /* 技能释放光芒 */
        .skill-glow {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,220,100,0.4) 40%, transparent 70%);
            border-radius: 50%;
            animation: skill-glow-pulse 0.5s ease-out forwards;
        }
        
        @keyframes skill-glow-pulse {
            0% { transform: scale(0); opacity: 1; }
            40% { transform: scale(1.5); opacity: 0.9; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        
        /* 击杀特效 */
        .kill-burst {
            position: absolute;
            width: 30px;
            height: 30px;
            animation: kill-explode 0.5s ease-out forwards;
        }
        
        .kill-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ff6b6b;
            border-radius: 50%;
            animation: kill-particle-fly 0.5s ease-out forwards;
        }
        
        @keyframes kill-explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        @keyframes kill-particle-fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--kx), var(--ky)) scale(0); opacity: 0; }
        }
        
        /* 怒气积攒动画 */
        .rage-fill-animate {
            transition: width 0.3s ease-out;
        }
        
        /* 英雄死亡动画 */
        .hero-death-anim {
            animation: hero-death 0.8s ease-out forwards;
        }
        
        @keyframes hero-death {
            0% { transform: scale(1); filter: brightness(1); opacity: 1; }
            30% { transform: scale(1.1); filter: brightness(1.5) hue-rotate(-20deg); }
            100% { transform: scale(0.9); filter: grayscale(1) brightness(0.5); opacity: 0.4; }
        }
        
        /* 敌人死亡动画 */
        .enemy-death-anim {
            animation: enemy-death 0.8s ease-out forwards;
        }
        
        @keyframes enemy-death {
            0% { transform: scale(1); filter: brightness(1); opacity: 1; }
            30% { transform: scale(1.15); filter: brightness(1.3); }
            50% { transform: scale(1.1); }
            100% { transform: scale(0.7) translateY(10px); filter: grayscale(1) brightness(0.3); opacity: 0.2; }
        }
        
        /* 战斗胜利/失败特效 */
        .battle-victory-glow {
            animation: victory-flash 0.5s ease-out;
        }
        
        @keyframes victory-flash {
            0% { background-color: rgba(255,215,0,0.3); }
            100% { background-color: transparent; }
        }
        
        .battle-defeat-dark {
            animation: defeat-dark 0.5s ease-out;
        }
        
        @keyframes defeat-dark {
            0% { background-color: rgba(139,0,0,0.3); }
            100% { background-color: transparent; }
        }
        
        /* 目标选择光效 */
        .target-select {
            animation: target-pulse 0.8s ease-in-out infinite;
        }
        
        @keyframes target-pulse {
            0%, 100% { 
                box-shadow: 0 0 10px rgba(255,100,100,0.5);
                border-color: rgba(255,100,100,0.5);
            }
            50% { 
                box-shadow: 0 0 25px rgba(255,100,100,0.9);
                border-color: rgba(255,100,100,1);
            }
        }
        
        /* 治疗特效 */
        .heal-effect {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(100,255,100,0.6) 0%, rgba(50,200,50,0.3) 50%, transparent 70%);
            border-radius: 50%;
            animation: heal-pulse 0.6s ease-out forwards;
        }
        
        @keyframes heal-pulse {
            0% { transform: scale(0.5); opacity: 0; }
            30% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }
        
        /* 加号飘字（治疗） */
        .heal-plus {
            position: absolute;
            font-size: 18px;
            font-weight: bold;
            color: #44ff44;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(68,255,68,0.5);
            animation: heal-float 0.8s ease-out forwards;
            z-index: 2100;
        }
        
        @keyframes heal-float {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-5px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-40px) scale(0.8); opacity: 0; }
        }
        
        /* 结算界面 */
        .settlement-modal .modal-content {
            text-align: center;
        }
        
        .settlement-title {
            font-size: 24px;
            color: #d4af37;
            margin-bottom: 15px;
        }
        
        .settlement-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .stat-card {

                num.textContent = `暴击! ${damage}`;
            } else if (type === 'heal') {
                num.textContent = `+${damage}`;
            } else if (type === 'miss') {
                num.textContent = '闪避';
            } else {
                num.textContent = `-${damage}`;
            }
            
            num.style.left = `${rect.left + rect.width / 2 - 30}px`;

        // ==================== 战斗音效系统 ====================
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playAttackSound() {
            initAudio();
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 200;
                osc.type = 'square';
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } catch(e) { console.error('音效播放失败:', e); }
        }
        
        function playSkillSound() {
            initAudio();
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 400;
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } catch(e) { console.error('音效播放失败:', e); }
        }
        
        function playHitSound() {
            initAudio();
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 150;
                osc.type = 'triangle';
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.08);
            } catch(e) { console.error('音效播放失败:', e); }

        function playVictorySound() {

                [523, 659, 784].forEach((freq, i) => {
                    setTimeout(() => {

        // ==================== 游戏核心 ====================
        function initGame(levelId) {
            const level = LEVELS[levelId];
            
            gameState.mapSize = level.mapSize;
            gameState.playerPos = { x: 1, y: 1 };
            gameState.hp = 100;
            gameState.gold = 0;
            gameState.mechanismSolved = 0;
            gameState.mechanismTotal = 0;
            gameState.battleCount = 0;
            gameState.startTime = Date.now();
            gameState.storyFound = 0;
            gameState.discoveredStories = [];
            gameState.fatigue = 100;
            gameState.totalEnemies = 0;
            gameState.killedEnemies = 0;
            gameState.objectives = {
                stairs: false,
                mechanisms: { current: 0, target: levelId === 1 ? 3 : 4 },
                battles: { current: 0, target: levelId === 1 ? 2 : 0 }
            };
            
            document.getElementById('levelTitle').textContent = `📍 ${level.name}`;
            document.getElementById('objectiveText').textContent = level.objectives[0].title;
            document.getElementById('logList').innerHTML = '';
            
            generateMap(levelId);
            revealArea(1, 1, 2);
            renderParty();
            renderMap();
            updateStats();
            saveGame();
            addLog(`你踏入了${level.name}...`, 'info');
        }
        
        function generateMap(levelId) {
            const size = gameState.mapSize;
            gameState.map = [];
            
            for (let y = 0; y < size; y++) {
                gameState.map[y] = [];
                for (let x = 0; x < size; x++) {
                    const cell = { x, y, type: 'floor', revealed: false };
                    if (x === 0 || x === size - 1 || y === 0 || y === size - 1) {
                        cell.type = 'wall';
                    } else if (x === 1 && y === 1) {
                        cell.type = 'player';
                        cell.revealed = true;
                    } else {
                        const rand = Math.random();
                        if (levelId === 3) {
                            if (rand < 0.06) { cell.type = 'enemy'; gameState.totalEnemies++; }
                            else if (rand < 0.08) { cell.type = 'boss'; gameState.totalEnemies++; }
                            else if (rand < 0.11) { cell.type = 'mechanism-luck'; gameState.mechanismTotal++; }
                            else if (rand < 0.13) { cell.type = 'mechanism-knowledge'; gameState.mechanismTotal++; }
                            else if (rand < 0.15) { cell.type = 'mechanism-hero'; gameState.mechanismTotal++; }
                            else if (rand < 0.17) cell.type = 'coffin';
                        } else {
                            if (rand < 0.05) cell.type = 'enemy';
                            else if (rand < 0.09) cell.type = 'chest';
                            else if (rand < 0.13) { cell.type = 'mechanism-luck'; gameState.mechanismTotal++; }
                            else if (rand < 0.17) { cell.type = 'mechanism-knowledge'; gameState.mechanismTotal++; }
                            else if (rand < 0.21) { cell.type = 'mechanism-hero'; gameState.mechanismTotal++; }
                        }
                    }
                    gameState.map[y][x] = cell;
                }
            }
            
            // 放置出口
            for (let attempts = 0; attempts < 100; attempts++) {
                const ex = Math.floor(Math.random() * (size - 4)) + 2;
                const ey = Math.floor(Math.random() * (size - 4)) + 2;
                if (gameState.map[ey][ex].type === 'floor' && 
                    (Math.abs(ex - 1) + Math.abs(ey - 1)) > size / 2) {
                    gameState.map[ey][ex].type = 'stairs';
                    break;
                }
            }
        }
        
        function renderParty() {
            document.getElementById('partyList').innerHTML = battleHeroes.map(h => `
                <div class="party-member">
                    <div class="member-avatar">${h.icon}</div>
                    <div class="member-info">
                        <div class="member-name">${h.name}</div>
                        <div class="member-trait">${h.class}</div>
                        <div class="member-hp">HP: ${h.hp}/${h.maxHp}</div>
                        <div class="hp-bar-mini">
                            <div class="hp-fill-mini" style="width:${(h.hp/h.maxHp)*100}%"></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderMap() {
            const container = document.getElementById('gameMap');
            const size = gameState.mapSize;
            container.style.gridTemplateColumns = `repeat(${size}, 40px)`;
            
            const icons = {
                'wall': '▪️', 'floor': '·', 'player': '👤', 'enemy': '👹',
                'chest': '📦', 'mechanism-luck': '🍀', 'mechanism-knowledge': '📖',
                'mechanism-hero': '⚡', 'boss': '💀', 'stairs': '🚪', 'fog': '?',
                'story': '📜', 'coffin': '⚰️', 'buff-attack': '⚔️', 'buff-fatigue': '💚'
            };
            
            let html = '';
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const cell = gameState.map[y][x];
                    const displayType = cell.revealed ? cell.type : 'fog';
                    html += `<div class="cell ${displayType}" onclick="handleCellClick(${x}, ${y})">${icons[displayType] || '?'}</div>`;
                }
            }
            container.innerHTML = html;
            scrollToPlayer();
        }
        
        function scrollToPlayer() {
            const viewport = document.querySelector('.map-viewport');
            const container = document.getElementById('mapScrollContainer');
            const cellSize = 42;
            const scrollX = -(gameState.playerPos.x * cellSize - viewport.clientWidth / 2 + cellSize / 2);
            const scrollY = -(gameState.playerPos.y * cellSize - viewport.clientHeight / 2 + cellSize / 2);
            const clampedX = Math.max(-(gameState.mapSize * cellSize - viewport.clientWidth), Math.min(0, scrollX));
            const clampedY = Math.max(-(gameState.mapSize * cellSize - viewport.clientHeight), Math.min(0, scrollY));
            container.style.transform = `translate(${clampedX}px, ${clampedY}px)`;
        }
        
        function handleCellClick(x, y) {
            const cell = gameState.map[y][x];
            if (cell.type === 'wall' || cell.type === 'player') return;
            
            const dx = Math.abs(x - gameState.playerPos.x);
            const dy = Math.abs(y - gameState.playerPos.y);
            
            if (dx + dy === 1) {
                movePlayerTo(x, y);
            }
        }
        
        function movePlayerTo(x, y) {
            const cell = gameState.map[y][x];
            const oldPos = gameState.playerPos;
            
            gameState.map[oldPos.y][oldPos.x].type = 'floor';
            gameState.map[oldPos.y][oldPos.x].revealed = true;
            gameState.playerPos = { x, y };
            cell.type = 'player';
            cell.revealed = true;
            
            revealArea(x, y, 2);
            renderMap();
            handleCellType(cell.type, x, y);
            saveGame();
        }
        
        function revealArea(cx, cy, r) {
            const size = gameState.mapSize;
            for (let dy = -r; dy <= r; dy++) {
                for (let dx = -r; dx <= r; dx++) {
                    const x = cx + dx, y = cy + dy;
                    if (x >= 0 && x < size && y >= 0 && y < size) {
                        gameState.map[y][x].revealed = true;
                    }
                }
            }
        }
        
        function handleCellType(type, x, y) {
            const level = LEVELS[currentLevel];
            
            switch (type) {
                case 'enemy':
                    if (level && level.hasCombat) {
                        startBattle(false);
                    } else {
                        addLog('遭遇敌人！', 'danger');
                    }
                    break;
                case 'boss':
                case 'coffin':
                    if (level && level.hasCombat) {
                        startBattle(type === 'boss');
                    } else {
                        addLog('遭遇Boss！', 'danger');
                    }
                    break;
                case 'chest':
                    const gold = Math.floor(Math.random() * 30) + 10;
                    gameState.gold += gold;
                    addLog(`发现宝箱！获得 ${gold} 金币`, 'gold');
                    updateStats();
                    break;
                case 'mechanism-luck':
                case 'mechanism-knowledge':
                case 'mechanism-hero':
                    showMechanismModal(type.replace('mechanism-', ''));
                    break;
                case 'stairs':
                    gameState.objectives.stairs = true;
                    addLog('发现出口！', 'success');
                    showSettlement();
                    break;
            }
        }
        
        function showMechanismModal(type) {
            const pool = mechanismsRandom[type];
            const mech = pool[Math.floor(Math.random() * pool.length)];
            
            const content = document.getElementById('modalContent');
            const typeNames = { luck: '运气型机关', knowledge: '知识型机关', hero: '英雄型机关' };
            
            content.innerHTML = `
                <div class="mechanism-type ${type}">${typeNames[type]}</div>
                <div class="mechanism-image">${mech.icon}</div>
                <div class="mechanism-title">${mech.name}</div>
                <div class="mechanism-desc">${mech.desc}</div>
                <div class="mechanism-question">${mech.question}</div>
                <div class="options-list">
                    ${mech.options.map((opt, idx) => `
                        <button class="option-btn" onclick="handleMechanismResult('${opt.result || opt.correct}')">${opt.text}</button>
                    `).join('')}
                </div>
            `;
            document.getElementById('mechanismModal').classList.add('active');
        }
        
        function handleMechanismResult(result) {
            let gold = 0, hpChange = 0;
            if (result === true || result === 'safe') {
                gold = Math.floor(Math.random() * 30) + 20;
                addLog(`机关破解成功！获得 ${gold} 金币`, 'success');
            } else if (result === false) {
                hpChange = -10;
                addLog('机关破解失败...损失生命', 'danger');
            } else if (result === 'skip') {
                addLog('你选择放弃了这个机关', 'info');
            } else {
                if (Math.random() < 0.5) {
                    gold = Math.floor(Math.random() * 30) + 20;
                    addLog(`机关破解成功！获得 ${gold} 金币`, 'success');
                } else {
                    hpChange = -10;
                    addLog('机关破解失败...损失生命', 'danger');
                }
            }
            
            gameState.gold += gold;
            gameState.hp = Math.max(0, gameState.hp + hpChange);
            gameState.mechanismSolved++;
            gameState.objectives.mechanisms.current++;
            
            closeModal();
            updateStats();
            checkObjectives();
        }
        
        function closeModal() {
            document.getElementById('mechanismModal').classList.remove('active');
        }
        
        function updateStats() {
            document.getElementById('goldValue').textContent = gameState.gold;
            document.getElementById('mechanismCount').textContent = `${gameState.mechanismSolved}/${gameState.mechanismTotal}`;
            document.getElementById('battleCount').textContent = gameState.battleCount;
            
            const fatiguePercent = (gameState.fatigue / gameState.maxFatigue) * 100;
            document.getElementById('fatigueBar').style.width = `${fatiguePercent}%`;
            document.getElementById('fatigueText').textContent = gameState.fatigue;
            
            const fatigueBar = document.getElementById('fatigueBar');
            if (gameState.fatigue <= 20) {
                fatigueBar.style.background = 'linear-gradient(90deg,#8a4a4a,#ff6b6b)';
                document.getElementById('fatigueText').style.color = '#ff6b6b';
            } else {
                fatigueBar.style.background = 'linear-gradient(90deg,#4a8a4a,#6bff6b)';
                document.getElementById('fatigueText').style.color = '#6bff6b';
            }
        }
        
        function addLog(text, type = 'info') {
            const logList = document.getElementById('logList');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = text;
            logList.insertBefore(entry, logList.firstChild);

        function checkObjectives() {
            const obj = gameState.objectives;
            let progressText = '';
            if (obj.mechanisms.current >= obj.mechanisms.target) progressText += '🔧✓ ';
            if (obj.battles && obj.battles.current >= obj.battles.target) progressText += '⚔️✓ ';
            document.getElementById('objectiveProgress').textContent = progressText;
        }
        
        function showSettlement() {
            saveLevelProgress(currentLevel);
            
            const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            
            document.getElementById('settlementContent').innerHTML = `
                <div class="settlement-title">🎉 探索完成!</div>
                <div class="settlement-stats">
                    <div class="stat-card gold">
                        <div class="stat-label">获得金币</div>
                        <div class="stat-value">${gameState.gold}</div>
                    </div>
                    <div class="stat-card mechanism">
                        <div class="stat-label">破解机关</div>
                        <div class="stat-value">${gameState.mechanismSolved}</div>
                    </div>
                    <div class="stat-card battle">
                        <div class="stat-label">战斗次数</div>
                        <div class="stat-value">${gameState.battleCount}</div>
                    </div>
                    <div class="stat-card time">
                        <div class="stat-label">用时</div>

        function closeSettlement() {
            document.getElementById('settlementModal').classList.remove('active');
