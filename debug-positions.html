<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>位置调试工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        h1 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .instructions {
            background: rgba(0,0,0,0.3);
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            max-width: 600px;
            line-height: 1.8;
        }
        .instructions strong { color: #d4af37; }
        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 70vh;
            overflow: hidden;
            border: 2px solid #d4af37;
            border-radius: 10px;
        }
        .scene-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('assets/main_interface_bg.jpg') center/cover no-repeat;
        }
        .entry-point {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 3px dashed rgba(255,255,255,0.8);
            border-radius: 50%;
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            text-align: center;
            user-select: none;
            transition: box-shadow 0.2s;
        }
        .entry-point:hover { box-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .entry-point.active { border-color: #d4af37; box-shadow: 0 0 25px rgba(212,175,55,0.8); }
        .entry-dungeon { background: rgba(212,175,55,0.2); top: 60%; left: 40%; }
        .entry-camp { background: rgba(255,200,100,0.2); top: 25%; left: 10%; }
        .entry-summon { background: rgba(176,136,255,0.2); top: 25%; right: 10%; }
        .entry-shop { background: rgba(200,160,100,0.2); bottom: 15%; left: 10%; }
        .entry-quest { background: rgba(180,180,160,0.2); bottom: 15%; right: 10%; }
        .entry-label {
            background: rgba(0,0,0,0.7);
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 12px;
        }
        .output {
            margin-top: 20px;
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.8;
        }
        .output h3 { color: #d4af37; margin-bottom: 10px; }
        .copy-btn {
            margin-top: 15px;
            background: linear-gradient(135deg, #d4af37, #b8960c);
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            color: #1a1530;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .copy-btn:hover { transform: scale(1.05); }
        .reset-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #fff;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1>🎯 建筑位置调试工具</h1>

    <div class="instructions">
        <strong>使用说明：</strong><br>
        1. 拖动圆形标记到对应的建筑位置<br>
        2. 点击标记可查看当前坐标<br>
        3. 调整完成后点击"复制CSS"按钮<br>
        4. 将复制的代码替换到 index.html 中
    </div>

    <div class="game-container" id="gameContainer">
        <div class="scene-bg"></div>

        <div class="entry-point entry-dungeon" data-name="dungeon" data-label="探险">
            <span class="entry-label">探险</span>
        </div>

        <div class="entry-point entry-camp" data-name="camp" data-label="角色">
            <span class="entry-label">角色</span>
        </div>

        <div class="entry-point entry-summon" data-name="summon" data-label="召唤">
            <span class="entry-label">召唤</span>
        </div>

        <div class="entry-point entry-shop" data-name="shop" data-label="商城">
            <span class="entry-label">商城</span>
        </div>

        <div class="entry-point entry-quest" data-name="quest" data-label="任务">
            <span class="entry-label">任务</span>
        </div>
    </div>

    <div class="output" id="output">
        <h3>📋 CSS 代码：</h3>
        <pre id="cssCode"></pre>
        <button class="copy-btn" onclick="copyCSS()">复制CSS</button>
        <button class="copy-btn reset-btn" onclick="resetPositions()">重置</button>
    </div>

    <script>
        const container = document.getElementById('gameContainer');
        const points = document.querySelectorAll('.entry-point');
        let activePoint = null;
        let offsetX, offsetY;

        points.forEach(point => {
            point.addEventListener('mousedown', startDrag);
            point.addEventListener('touchstart', startDrag);
            point.addEventListener('click', (e) => {
                if (!point.dataset.moved) {
                    showPosition(point);
                }
                point.dataset.moved = '';
            });
        });

        function startDrag(e) {
            e.preventDefault();
            activePoint = e.currentTarget;
            activePoint.classList.add('active');

            const rect = container.getBoundingClientRect();
            const pointRect = activePoint.getBoundingClientRect();

            if (e.type === 'touchstart') {
                offsetX = e.touches[0].clientX - pointRect.left - pointRect.width/2;
                offsetY = e.touches[0].clientY - pointRect.top - pointRect.height/2;
            } else {
                offsetX = e.clientX - pointRect.left - pointRect.width/2;
                offsetY = e.clientY - pointRect.top - pointRect.height/2;
            }

            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', stopDrag);
            document.addEventListener('touchmove', drag);
            document.addEventListener('touchend', stopDrag);
        }

        function drag(e) {
            if (!activePoint) return;

            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

            const rect = container.getBoundingClientRect();
            let x = ((clientX - offsetX - rect.left) / rect.width * 100).toFixed(1);
            let y = ((clientY - offsetY - rect.top) / rect.height * 100).toFixed(1);

            x = Math.max(0, Math.min(100, x));
            y = Math.max(0, Math.min(100, y));

            activePoint.style.left = x + '%';
            activePoint.style.top = y + '%';
            activePoint.style.right = 'auto';
            activePoint.style.bottom = 'auto';

            activePoint.dataset.moved = 'true';
            updateCSS();
        }

        function stopDrag() {
            if (activePoint) {
                activePoint.classList.remove('active');
            }
            activePoint = null;
            document.removeEventListener('mousemove', drag);
            document.removeEventListener('mouseup', stopDrag);
            document.removeEventListener('touchmove', drag);
            document.removeEventListener('touchend', stopDrag);
        }

        function showPosition(point) {
            const name = point.dataset.name;
            const left = point.style.left || '50%';
            const top = point.style.top || '50%';
            console.log(`${name}: left: ${left}, top: ${top}`);
        }

        function updateCSS() {
            let css = `.entry-dungeon { left: ${points[0].style.left || '50%'}; top: ${points[0].style.top || '60%'}; }\n`;
            css += `.entry-camp { left: ${points[1].style.left || '10%'}; top: ${points[1].style.top || '25%'}; }\n`;
            css += `.entry-summon { right: ${points[2].style.right || '10%'}; top: ${points[2].style.top || '25%'}; }\n`;
            css += `.entry-shop { left: ${points[3].style.left || '10%'}; bottom: ${points[3].style.bottom || '15%'}; }\n`;
            css += `.entry-quest { right: ${points[4].style.right || '10%'}; bottom: ${points[4].style.bottom || '15%'}; }\n`;

            document.getElementById('cssCode').textContent = css;
        }

        function copyCSS() {
            const css = document.getElementById('cssCode').textContent;
            navigator.clipboard.writeText(css).then(() => {
                alert('CSS已复制到剪贴板！');
            });
        }

        function resetPositions() {
            points[0].style.left = '40%'; points[0].style.top = '60%';
            points[1].style.left = '10%'; points[1].style.top = '25%';
            points[2].style.right = '10%'; points[2].style.top = '25%';
            points[3].style.left = '10%'; points[3].style.bottom = '15%';
            points[4].style.right = '10%'; points[4].style.bottom = '15%';
            updateCSS();
        }

        updateCSS();
    </script>
</body>
</html>
